<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level 1 — Study Hub</title>
<meta name="description" content="CFA Level 1 study hub: English notes with Vietnamese translations, vocabulary, formulas and practice questions for all 10 topics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10222F;
  --ink-soft:#3D5060;
  --paper:#F6F6F1;
  --card:#FFFFFF;
  --line:#DFE0D6;
  --accent:#0E7A5F;
  --accent-soft:#E3F0EB;
  --amber:#B7791F;
  --amber-soft:#F8F0DF;
  --red:#B23A2F;
  --red-soft:#F7E8E6;
  --side-bg:#10222F;
  --side-ink:#EDEDE4;
  --side-dim:#8FA0AC;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --body:'Public Sans',system-ui,sans-serif;
  --disp:'Newsreader',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:var(--side-bg);color:var(--side-ink);padding:28px 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side::-webkit-scrollbar{width:8px}
.side::-webkit-scrollbar-thumb{background:#2C4152;border-radius:4px}
.main{min-width:0;padding:0 0 90px}
.wrap{max-width:880px;margin:0 auto;padding:0 34px}

/* ---------- sidebar ---------- */
.brand{padding:0 24px 20px;border-bottom:1px solid #223649}
.brand h1{font-family:var(--disp);font-weight:600;font-size:26px;letter-spacing:.2px;color:#fff}
.brand h1 span{color:#7FC5AF}
.brand p{font-size:12.5px;color:var(--side-dim);margin-top:4px}
.globalbar{display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid #223649}
.gbtn{flex:1;font:600 12px var(--body);color:var(--side-ink);background:#1B3243;border:1px solid #2C4658;border-radius:6px;padding:7px 8px;cursor:pointer;transition:background .15s}
.gbtn:hover{background:#254155}
.gbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.navsec{padding:16px 12px 4px}
.navlabel{font:600 11px var(--body);letter-spacing:1.4px;text-transform:uppercase;color:var(--side-dim);padding:0 12px 8px}
a.tlink{display:block;text-decoration:none;color:var(--side-ink);padding:9px 12px;border-radius:8px;margin-bottom:2px;transition:background .15s}
a.tlink:hover{background:#1B3243}
a.tlink.active{background:#1F3B4E}
a.tlink:focus-visible,button:focus-visible{outline:2px solid #7FC5AF;outline-offset:2px}
.tl-top{display:flex;align-items:baseline;gap:8px}
.tl-num{font:500 11px var(--mono);color:var(--side-dim);min-width:20px}
.tl-name{font-size:13.5px;font-weight:500;flex:1}
.tl-w{font:500 11px var(--mono);color:#7FC5AF}
.tl-bar{height:3px;background:#22384A;border-radius:2px;margin:7px 0 0 28px;overflow:hidden}
.tl-bar i{display:block;height:100%;background:linear-gradient(90deg,#0E7A5F,#7FC5AF);border-radius:2px}
.tl-prog{margin:5px 0 0 28px;font:400 10.5px var(--mono);color:var(--side-dim)}

/* ---------- topbar / mobile ---------- */
.mobilebar{display:none}

/* ---------- home ---------- */
.hero{padding:64px 0 30px;border-bottom:1px solid var(--line)}
.eyebrow{font:600 12px var(--body);letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.hero h2{font-family:var(--disp);font-size:clamp(34px,5vw,52px);font-weight:600;line-height:1.12;margin:12px 0 16px;max-width:16ch}
.hero p.lead{font-size:17.5px;color:var(--ink-soft);max-width:62ch}
.hero .vi-inline{margin-top:14px}
.examfacts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:34px 0 8px}
.fact{background:var(--card);padding:16px 18px}
.fact b{display:block;font:600 15px var(--mono);color:var(--ink)}
.fact span{font-size:12.5px;color:var(--ink-soft)}
.topicgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:34px 0}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 20px 16px;text-decoration:none;color:var(--ink);display:block;transition:border-color .15s,transform .15s}
.tcard:hover{border-color:var(--accent);transform:translateY(-2px)}
.tcard .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.tcard h3{font-family:var(--disp);font-size:20px;font-weight:600}
.tcard .w{font:600 12px var(--mono);color:var(--accent);white-space:nowrap}
.tcard p{font-size:13.5px;color:var(--ink-soft);margin-top:6px}
.tcard .bar{height:4px;background:var(--paper);border-radius:2px;margin-top:14px;overflow:hidden}
.tcard .bar i{display:block;height:100%;background:var(--accent);border-radius:2px}
.howto{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 28px;margin-bottom:40px}
.howto h3{font-family:var(--disp);font-size:22px;margin-bottom:10px}
.howto ol{padding-left:20px;font-size:14.5px;color:var(--ink-soft)}
.howto li{margin-bottom:6px}

/* ---------- topic page ---------- */
.thead{padding:56px 0 26px;border-bottom:1px solid var(--line)}
.thead .tnum{font:500 13px var(--mono);color:var(--accent);letter-spacing:1px}
.thead h2{font-family:var(--disp);font-size:clamp(30px,4.4vw,44px);font-weight:600;line-height:1.15;margin:8px 0 4px}
.thead .viName{font-family:var(--disp);font-style:italic;font-size:19px;color:var(--ink-soft)}
.weightline{display:flex;align-items:center;gap:14px;margin-top:20px}
.weightline .bar{flex:1;max-width:340px;height:6px;background:#E7E8DF;border-radius:3px;overflow:hidden}
.weightline .bar i{display:block;height:100%;background:var(--accent)}
.weightline b{font:600 13px var(--mono);color:var(--accent)}
.intro{padding:26px 0 4px}
.intro p{max-width:70ch;color:var(--ink-soft)}

/* modules */
.module{margin:34px 0}
.mhead{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.mhead .mnum{font:600 12px var(--mono);color:var(--amber)}
.mhead h3{font-family:var(--disp);font-size:26px;font-weight:600}
.section{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-bottom:14px}
.section h4{font-size:15px;font-weight:700;margin-bottom:8px}
.section .en p{margin-bottom:10px}
.section .en p:last-child{margin-bottom:0}
.section ul,.section ol{padding-left:22px;margin:8px 0}
.section li{margin-bottom:5px}
.section strong{font-weight:700}
.section em{font-style:italic}
table.simple{width:100%;border-collapse:collapse;font-size:14px;margin:10px 0}
table.simple th{text-align:left;font-weight:700;border-bottom:2px solid var(--ink);padding:7px 10px 7px 0}
table.simple td{border-bottom:1px solid var(--line);padding:7px 10px 7px 0;vertical-align:top}

/* VI toggle */
.vitoggle{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font:600 12px var(--body);color:var(--accent);background:var(--accent-soft);border:1px solid #BFDDD2;border-radius:999px;padding:5px 13px;cursor:pointer;transition:background .15s}
.vitoggle:hover{background:#D3E8E0}
.vitoggle .car{transition:transform .2s;font-size:10px}
.vitoggle.open .car{transform:rotate(90deg)}
.vi{display:none;margin-top:12px;padding:14px 16px;border-left:3px solid var(--accent);background:#F4F8F6;border-radius:0 8px 8px 0;font-size:14.5px;color:#2B4A40}
.vi.show{display:block}
.vi p{margin-bottom:8px}.vi p:last-child{margin-bottom:0}
.vi ul,.vi ol{padding-left:20px;margin:6px 0}

/* formulas */
.fblock{background:var(--amber-soft);border:1px solid #E8D9B8;border-radius:12px;padding:18px 22px;margin-bottom:14px}
.fblock h4{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.frow{display:grid;grid-template-columns:minmax(150px,220px) 1fr;gap:8px 18px;padding:8px 0;border-bottom:1px dashed #E0CFA5;font-size:14px}
.frow:last-child{border-bottom:none}
.frow .fn{font-weight:600}
.frow .fx{font-family:var(--mono);font-size:13.5px;color:#6B4E14}
.frow .fnote{grid-column:1/-1;font-size:12.5px;color:#8A6B2E;margin-top:-4px}

/* vocab */
.vocab{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin:26px 0}
.vocab h3{font-family:var(--disp);font-size:22px;margin-bottom:6px}
.vocab .hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}
table.vtab{width:100%;border-collapse:collapse;font-size:14px}
table.vtab th{text-align:left;font:600 11px var(--body);letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);border-bottom:2px solid var(--ink);padding:6px 10px 6px 0}
table.vtab td{border-bottom:1px solid var(--line);padding:8px 10px 8px 0;vertical-align:top}
table.vtab td.term{font-weight:700;white-space:nowrap}
table.vtab td.viM{color:var(--accent);font-weight:500}
.viCol{transition:filter .15s}
body.hideViVocab .viCol{filter:blur(5px);cursor:pointer}

/* quiz */
.check{background:var(--amber-soft);border:1px solid #EADFC4;border-radius:12px;padding:16px 18px 6px;margin:20px 0 4px}
.check>h4{font:600 12px var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.check .qcard{background:var(--card);padding:16px 18px}
.qset{margin:26px 0 8px}
.sethead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:16px}
.sethead h4{font-family:var(--disp);font-size:20px}
.setmeta{font:12px var(--mono);color:var(--ink-soft);white-space:nowrap}
.toc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin:0 0 26px}
.toc h3{font:600 12px var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
.toc a{display:flex;align-items:baseline;gap:10px;padding:6px 8px;border-radius:8px;color:var(--ink);text-decoration:none;font-size:14px}
.toc a:hover{background:var(--accent-soft)}
.toc .n{font:600 11px var(--mono);color:var(--accent);min-width:34px}
.toc .meta{margin-left:auto;font:11px var(--mono);color:var(--ink-soft);white-space:nowrap}
.toc .donebadge{color:var(--accent);font-weight:600}
.toc .group{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.toc .ctl{margin-top:12px;display:flex;gap:8px}
.toc .ctl button{font:600 11px var(--mono);letter-spacing:.5px;padding:5px 10px;border:1px solid var(--line);background:var(--paper);border-radius:8px;cursor:pointer;color:var(--ink-soft)}
.toc .ctl button:hover{border-color:var(--accent);color:var(--accent)}
.mhead{cursor:pointer;position:relative}
.mhead .chev{position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ink-soft);transition:transform .15s}
.module.collapsed .chev{transform:translateY(-50%) rotate(-90deg)}
.module.collapsed .mbody{display:none}
.subnav{margin:2px 0 8px 14px;border-left:2px solid rgba(255,255,255,.12);padding-left:8px}
.subnav a{display:flex;gap:7px;align-items:baseline;padding:4px 8px;border-radius:7px;color:var(--side-dim);font-size:12px;line-height:1.35;text-decoration:none}
.subnav a:hover{color:var(--side-ink);background:rgba(255,255,255,.06)}
.subnav .sn{font:600 10px var(--mono);color:var(--accent);min-width:26px}
.subnav .sep{margin:6px 8px 4px;border-top:1px dashed rgba(255,255,255,.15)}
.quiz{margin:34px 0 10px}
.quiz>h3{font-family:var(--disp);font-size:26px;margin-bottom:4px}
.quiz>.hint{font-size:13px;color:var(--ink-soft);margin-bottom:16px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:14px}
.qcard .qnum{font:600 11px var(--mono);color:var(--amber);letter-spacing:1px}
.qcard .qtext{font-weight:600;margin:6px 0 14px}
.opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;font:400 14.5px var(--body);color:var(--ink);transition:border-color .15s,background .15s}
.opt:hover{border-color:var(--ink-soft)}
.opt .ol{font:600 12px var(--mono);color:var(--ink-soft);margin-top:2px}
.opt.correct{background:var(--accent-soft);border-color:var(--accent)}
.opt.correct .ol{color:var(--accent)}
.opt.wrong{background:var(--red-soft);border-color:var(--red)}
.opt.wrong .ol{color:var(--red)}
.opt:disabled{cursor:default}
.expl{display:none;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;font-size:14px}
.expl.show{display:block}
.expl .verdict{font-weight:700;margin-bottom:6px}
.expl .verdict.ok{color:var(--accent)}
.expl .verdict.no{color:var(--red)}
.expl .vi{margin-top:10px}
.qscore{font:600 13px var(--mono);color:var(--accent);background:var(--accent-soft);border:1px solid #BFDDD2;border-radius:8px;display:inline-block;padding:8px 14px;margin-top:6px}

/* misc */
.pagenav{display:flex;justify-content:space-between;gap:12px;margin:44px 0 0;padding-top:22px;border-top:1px solid var(--line)}
.pagenav a{flex:1;text-decoration:none;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;transition:border-color .15s}
.pagenav a:hover{border-color:var(--accent)}
.pagenav .lab{font:600 11px var(--body);letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft)}
.pagenav .nm{font-family:var(--disp);font-size:17px;margin-top:3px}
.pagenav a.next{text-align:right}
.markdone{display:inline-flex;align-items:center;gap:8px;font:600 13px var(--body);color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;margin-top:10px}
.markdone.done{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-soft)}

@media (max-width:960px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:290px;z-index:40;transform:translateX(-100%);transition:transform .25s}
  .side.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .mobilebar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;background:var(--side-bg);color:#fff;padding:12px 18px}
  .mobilebar button{background:#1B3243;color:#fff;border:1px solid #2C4658;border-radius:8px;font:600 13px var(--body);padding:8px 13px;cursor:pointer}
  .mobilebar .t{font-family:var(--disp);font-size:17px}
  .topicgrid{grid-template-columns:1fr}
  .wrap{padding:0 20px}
  .frow{grid-template-columns:1fr}
  table.vtab td.term{white-space:normal}
}
</style>
</head>
<body>
<div class="app">
  <nav class="side" id="side" aria-label="Topics">
    <div class="brand">
      <h1>CFA<span> L1</span> Study Hub</h1>
      <p>English notes · Vietnamese support · Practice</p>
    </div>
    <div class="globalbar">
      <button class="gbtn" id="btnAllVi" title="Show every Vietnamese translation">VI: show all</button>
      <button class="gbtn" id="btnVocabVi" title="Blur Vietnamese column in vocabulary tables (self-test)">Vocab: quiz me</button>
    </div>
    <div class="navsec">
      <div class="navlabel">Curriculum · 2026 weights</div>
      <div id="navlist"></div>
    </div>
  </nav>

  <div class="main">
    <div class="mobilebar">
      <button id="btnMenu" aria-label="Open menu">☰ Topics</button>
      <div class="t">CFA L1 Study Hub</div>
    </div>
    <div class="wrap" id="content"></div>
  </div>
</div>
<script src="data/01-ethics.js"></script>
<script src="data/02-quant.js"></script>
<script src="data/03-econ.js"></script>
<script src="data/04-fsa.js"></script>
<script src="data/05-corp.js"></script>
<script src="data/06-equity.js"></script>
<script src="data/07-fi.js"></script>
<script src="data/08-deriv.js"></script>
<script src="data/09-alts.js"></script>
<script src="data/10-pm.js"></script>
<script src="data/mocktests.js"></script>
<script>
/* =====================================================
   CFA LEVEL 1 STUDY HUB — content data
   Structure: TOPICS[] -> modules[] -> sections[{h,en,vi}]
   + formulas, vocab, quiz (3-option MCQ, CFA format)
   ===================================================== */
const TOPICS = (window.CFA && window.CFA.topics) || [];

/* ---------- extra question banks: module checks + practice sets ---------- */
const EXTRA = (window.CFA && window.CFA.extra) || {};
const MOCKTESTS = (window.CFA && window.CFA.mocktests) || [];
function getSets(t){
  const ex = (EXTRA[t.id] && EXTRA[t.id].sets) || [];
  return [{name:'Practice Set A', qs:t.quiz}].concat(ex.map((s,i)=>{
    const qs = Array.isArray(s) ? s : s.qs;
    const name = (!Array.isArray(s) && s.name) ? s.name : ('Practice Set '+String.fromCharCode(66+i));
    return {name: name, qs: qs};
  }));
}
function getChecks(t, mi){ return (EXTRA[t.id] && EXTRA[t.id].checks && EXTRA[t.id].checks[mi]) || []; }
function getQ(t, key){
  const m = String(key).match(/^([cs])(\d+)_(\d+)$/);
  if(!m) return t.quiz[+key]; /* legacy stored answers */
  return m[1]==='c' ? getChecks(t,+m[2])[+m[3]] : getSets(t)[+m[2]].qs[+m[3]];
}
function allQCount(t){
  let n = 0; getSets(t).forEach(s=>n+=s.qs.length);
  t.modules.forEach((mm,mi)=>n+=getChecks(t,mi).length);
  return n;
}
function qcardHTML(tid, key, q, num, total){
  return '<div class="qcard" id="q_'+tid+'_'+key+'"><div class="qnum">QUESTION '+num+' OF '+total+'</div><div class="qtext">'+q.q+'</div>'+
    q.opts.map((o,oi)=>'<button class="opt" onclick="answer(\''+tid+'\',\''+key+'\','+oi+')"><span class="ol">'+'ABC'[oi]+'.</span><span>'+o+'</span></button>').join('')+
    '<div class="expl"><div class="verdict"></div><div class="etext">'+q.en+'</div>'+viBlock('<p>'+q.vi+'</p>','Giải thích tiếng Việt')+'</div></div>';
}

/* =====================================================
   RENDERER + APP LOGIC
   ===================================================== */
const MAXW = 20; // scale for weight bars
const $ = s => document.querySelector(s);
const content = $('#content');

/* safe storage (works on GitHub Pages; degrades silently elsewhere) */
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem('cfa1_'+k)); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem('cfa1_'+k, JSON.stringify(v)); }catch(e){} }
};
let progress = store.get('progress') || {}; // {topicId:{done:[moduleIdx], quiz:{qIdx:answerIdx}}}
function saveProgress(){ store.set('progress', progress); }
function tprog(t){
  const p = progress[t.id]||{};
  const doneMods = (p.done||[]).length, totMods = t.modules.length;
  const quizDone = Object.keys(p.quiz||{}).length, totQ = allQCount(t);
  return {doneMods, totMods, quizDone, totQ};
}

/* ---------- sidebar ---------- */
function renderNav(active){
  let h = '<a class="tlink'+(active==='home'?' active':'')+'" href="#home"><div class="tl-top"><span class="tl-num">⌂</span><span class="tl-name">Home / Tổng quan</span></div></a>';
  TOPICS.forEach(t=>{
    const pr = tprog(t);
    const pct = Math.round(((pr.doneMods/pr.totMods)*0.5 + (pr.quizDone/pr.totQ)*0.5)*100);
    h += '<a class="tlink'+(active===t.id?' active':'')+'" href="#'+t.id+'">'+
      '<div class="tl-top"><span class="tl-num">'+t.num+'</span><span class="tl-name">'+t.name+'</span><span class="tl-w">'+t.w[0]+'–'+t.w[1]+'%</span></div>'+
      '<div class="tl-bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div>'+
      '<div class="tl-prog">'+(pct>0? pct+'% studied' : '')+'</div></a>';
    if(active===t.id){
      h += '<div class="subnav">';
      t.modules.forEach((m,mi)=>{
        h += '<a href="#'+t.id+'" onclick="return jumpTo(\'mod_'+t.id+'_'+mi+'\')"><span class="sn">'+t.num+'.'+(mi+1)+'</span><span>'+shortTitle(m.title)+'</span></a>';
      });
      h += '<div class="sep"></div>';
      h += '<a href="#'+t.id+'" onclick="return jumpTo(\'vocab_'+t.id+'\')"><span class="sn">◆</span><span>Vocabulary · Từ vựng</span></a>';
      getSets(t).forEach((st,si)=>{
        h += '<a href="#'+t.id+'" onclick="return jumpTo(\'set_'+t.id+'_'+si+'\')"><span class="sn">'+'ABCDEFGHIJKLMNOP'.charAt(si)+'</span><span>'+st.name+'</span></a>';
      });
      h += '</div>';
    }
  });
  h += '<a class="tlink'+(active==='mock'?' active':'')+'" href="#mock"><div class="tl-top"><span class="tl-num">✎</span><span class="tl-name">Mock Tests / Đề thi thử</span></div></a>';
  $('#navlist').innerHTML = h;
}

/* ---------- VI toggle helper ---------- */
function viBlock(vi, label){
  if(!vi) return '';
  return '<button class="vitoggle" onclick="toggleVi(this)" aria-expanded="false"><span class="car">▶</span> '+(label||'Xem tiếng Việt / Vietnamese')+'</button><div class="vi">'+vi+'</div>';
}
window.toggleVi = function(btn){
  const box = btn.nextElementSibling;
  const open = box.classList.toggle('show');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
};

/* ---------- topic page ---------- */
window.jumpTo = function(id){
  const e = document.getElementById(id);
  if(!e) return false;
  e.classList.remove('collapsed');
  e.scrollIntoView({behavior:'smooth', block:'start'});
  $('#side').classList.remove('open');
  return false;
};
window.toggleMod = function(head){
  head.parentElement.classList.toggle('collapsed');
};
window.setAllMods = function(collapsed){
  document.querySelectorAll('.module').forEach(m=>m.classList.toggle('collapsed', collapsed));
};
function shortTitle(s){ return s.length > 46 ? s.slice(0, 44).replace(/\s+\S*$/,'') + '…' : s; }

function renderTopic(t){
  const idx = TOPICS.indexOf(t);
  let h = '<div class="thead"><div class="tnum">TOPIC '+t.num+' · EXAM WEIGHT '+t.w[0]+'–'+t.w[1]+'%</div><h2>'+t.name+'</h2><div class="viName">'+t.vi+'</div>'+
    '<div class="weightline"><div class="bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div><b>'+t.w[0]+'–'+t.w[1]+'% of the exam</b></div></div>';
  h += '<div class="intro"><p>'+t.intro.en+'</p>'+viBlock('<p>'+t.intro.vi+'</p>')+'</div>';

  /* table of contents */
  const doneArr = (progress[t.id]&&progress[t.id].done)||[];
  h += '<div class="toc"><h3>In this topic · Mục lục</h3>';
  t.modules.forEach((m,mi)=>{
    const chkN = getChecks(t, mi).length;
    h += '<a href="#'+t.id+'" onclick="return jumpTo(\'mod_'+t.id+'_'+mi+'\')"><span class="n">'+t.num+'.'+(mi+1)+'</span><span>'+m.title+'</span><span class="meta">'+m.sections.length+' section'+(m.sections.length>1?'s':'')+(chkN?' · '+chkN+' check':'')+(doneArr.includes(mi)?' · <span class="donebadge">✓ done</span>':'')+'</span></a>';
  });
  h += '<div class="group"></div>';
  h += '<a href="#'+t.id+'" onclick="return jumpTo(\'vocab_'+t.id+'\')"><span class="n">◆</span><span>Vocabulary · Từ vựng</span><span class="meta">'+t.vocab.length+' terms</span></a>';
  const setsT = getSets(t);
  setsT.forEach((st,si)=>{
    h += '<a href="#'+t.id+'" onclick="return jumpTo(\'set_'+t.id+'_'+si+'\')"><span class="n">'+'ABCDEFGHIJKLMNOP'.charAt(si)+'</span><span>'+st.name+' · Bộ đề '+(si+1)+'</span><span class="meta">'+st.qs.length+' questions</span></a>';
  });
  h += '<div class="ctl"><button onclick="setAllMods(true)">Collapse all · Thu gọn</button><button onclick="setAllMods(false)">Expand all · Mở hết</button></div>';
  h += '</div>';

  t.modules.forEach((m,mi)=>{
    h += '<div class="module" id="mod_'+t.id+'_'+mi+'"><div class="mhead" onclick="toggleMod(this)"><span class="mnum">MODULE '+t.num+'.'+(mi+1)+'</span><h3>'+m.title+'</h3><span class="chev">▾</span></div><div class="mbody">';
    m.sections.forEach(s=>{
      h += '<div class="section"><h4>'+s.h+'</h4><div class="en">'+s.en+'</div>'+viBlock(s.vi)+'</div>';
    });
    if(m.formulas){
      h += '<div class="fblock"><h4>Key formulas</h4>'+m.formulas.map(f=>'<div class="frow"><span class="fn">'+f[0]+'</span><span class="fx">'+f[1]+'</span>'+(f[2]?'<span class="fnote">'+f[2]+'</span>':'')+'</div>').join('')+'</div>';
    }
    const chk = getChecks(t, mi);
    if(chk.length){
      h += '<div class="check"><h4>Quick check · Củng cố ngay</h4>';
      chk.forEach((q,qi)=>{ h += qcardHTML(t.id, 'c'+mi+'_'+qi, q, qi+1, chk.length); });
      h += '</div>';
    }
    const done = (progress[t.id]&&progress[t.id].done||[]).includes(mi);
    h += '<button class="markdone'+(done?' done':'')+'" onclick="toggleDone(\''+t.id+'\','+mi+',this)">'+(done?'✓ Module completed':'○ Mark module complete')+'</button>';
    h += '</div></div>';
  });

  h += '<div class="vocab" id="vocab_'+t.id+'"><h3>Vocabulary · Từ vựng chuyên ngành</h3><div class="hint">Tip: use "Vocab: quiz me" in the sidebar to blur the Vietnamese column and test yourself. Click a blurred cell to peek.</div><table class="vtab"><tr><th>Term</th><th>Definition (EN)</th><th class="viCol">Nghĩa (VI)</th></tr>'+
    t.vocab.map(v=>'<tr><td class="term">'+v[0]+'</td><td>'+v[1]+'</td><td class="viM viCol" onclick="peek(this)">'+v[2]+'</td></tr>').join('')+'</table></div>';

  const sets = getSets(t);
  h += '<div class="quiz"><h3>Exam-style Practice Sets · Bộ đề luyện tập</h3><div class="hint">Do these after finishing all modules above. CFA format: three options, one correct, no penalty for guessing — aim for about 90 seconds per question.</div>';
  sets.forEach((st,si)=>{
    h += '<div class="qset" id="set_'+t.id+'_'+si+'"><div class="sethead"><h4>'+st.name+'</h4><span class="setmeta">'+st.qs.length+' questions · ~'+Math.round(st.qs.length*1.5)+' min</span></div>';
    st.qs.forEach((q,qi)=>{ h += qcardHTML(t.id, 's'+si+'_'+qi, q, qi+1, st.qs.length); });
    h += '<div id="score_'+t.id+'_s'+si+'"></div></div>';
  });
  h += '</div>';

  const prev = TOPICS[idx-1], next = TOPICS[idx+1];
  h += '<div class="pagenav">'+
    (prev?'<a href="#'+prev.id+'"><div class="lab">← Previous</div><div class="nm">'+prev.num+' · '+prev.name+'</div></a>':'<a href="#home"><div class="lab">← Back</div><div class="nm">Home</div></a>')+
    (next?'<a class="next" href="#'+next.id+'"><div class="lab">Next →</div><div class="nm">'+next.num+' · '+next.name+'</div></a>':'<a class="next" href="#home"><div class="lab">Finished →</div><div class="nm">Back to overview</div></a>')+
    '</div>';
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
  restoreQuiz(t);
  if(document.body.classList.contains('showAllVi')) openAllVi();
}

/* ---------- interactions ---------- */
window.peek = function(td){ if(document.body.classList.contains('hideViVocab')){ td.style.filter='none'; setTimeout(()=>td.style.filter='',2500);} };

window.toggleDone = function(tid, mi, btn){
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  const arr = progress[tid].done = progress[tid].done||[];
  const i = arr.indexOf(mi);
  if(i>=0){arr.splice(i,1); btn.classList.remove('done'); btn.textContent='○ Mark module complete';}
  else{arr.push(mi); btn.classList.add('done'); btn.textContent='✓ Module completed';}
  saveProgress(); renderNav(location.hash.replace('#','')||'home');
};

window.answer = function(tid, key, oi){
  const t = TOPICS.find(x=>x.id===tid); const q = getQ(t, key);
  const card = document.getElementById('q_'+tid+'_'+key);
  if(card.dataset.answered) return;
  card.dataset.answered = '1';
  const opts = card.querySelectorAll('.opt');
  opts.forEach((b,bi)=>{ b.disabled=true;
    if(bi===q.ans) b.classList.add('correct');
    else if(bi===oi) b.classList.add('wrong');
  });
  const ex = card.querySelector('.expl'); ex.classList.add('show');
  const v = ex.querySelector('.verdict');
  if(oi===q.ans){ v.textContent='✓ Correct'; v.classList.add('ok'); }
  else{ v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans]; v.classList.add('no'); }
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  progress[tid].quiz = progress[tid].quiz||{};
  progress[tid].quiz[key] = oi;
  saveProgress(); renderNav(tid); showScores(t);
};

function restoreQuiz(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  Object.entries(p.quiz).forEach(([key,oi])=>{
    if(/^\d+$/.test(key)) key = 's0_'+key; /* migrate pre-update saved answers */
    const q = getQ(t, key); const card = document.getElementById('q_'+t.id+'_'+key);
    if(!q||!card) return; card.dataset.answered='1';
    card.querySelectorAll('.opt').forEach((b,bi)=>{ b.disabled=true;
      if(bi===q.ans) b.classList.add('correct'); else if(bi===+oi) b.classList.add('wrong');});
    const ex = card.querySelector('.expl'); ex.classList.add('show');
    const v = ex.querySelector('.verdict');
    if(+oi===q.ans){v.textContent='✓ Correct';v.classList.add('ok');}
    else{v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans];v.classList.add('no');}
  });
  showScores(t);
}
function showScores(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  const norm = {};
  Object.entries(p.quiz).forEach(([k,v])=>{ norm[/^\d+$/.test(k)?'s0_'+k:k]=v; });
  getSets(t).forEach((st,si)=>{
    const el = document.getElementById('score_'+t.id+'_s'+si);
    if(!el) return;
    const keys = st.qs.map((q,qi)=>'s'+si+'_'+qi);
    if(!keys.every(k=>k in norm)){ el.innerHTML=''; return; }
    const correct = keys.filter((k,qi)=>st.qs[qi].ans===+norm[k]).length;
    el.innerHTML = '<div class="qscore">'+st.name+' score: '+correct+' / '+st.qs.length+' ('+Math.round(correct/st.qs.length*100)+'%) — '+(correct/st.qs.length>=0.7?'exam-ready pace, keep going':'review the modules above and retry later')+'</div>';
  });
}

/* ---------- global toggles ---------- */
function openAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.add('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.add('open')); }
function closeAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.remove('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.remove('open')); }
$('#btnAllVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('showAllVi');
  this.classList.toggle('on', on); this.textContent = on ? 'VI: shown' : 'VI: show all';
  on ? openAllVi() : closeAllVi();
});
$('#btnVocabVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('hideViVocab');
  this.classList.toggle('on', on); this.textContent = on ? 'Vocab: revealed on tap' : 'Vocab: quiz me';
});

/* ---------- mock tests page ---------- */
function mockCard(ti, qi, q, total){
  return '<div class="qcard" id="mq_'+ti+'_'+qi+'"><div class="qnum">QUESTION '+(qi+1)+' OF '+total+'</div><div class="qtext">'+q.q+'</div>'+
    q.opts.map((o,oi)=>'<button class="opt" onclick="answerMock('+ti+','+qi+','+oi+')"><span class="ol">'+'ABC'[oi]+'.</span><span>'+o+'</span></button>').join('')+
    '<div class="expl"><div class="verdict"></div><div class="etext">'+q.en+'</div>'+viBlock('<p>'+q.vi+'</p>','Giải thích tiếng Việt')+'</div></div>';
}
function renderMock(){
  let h = '<div class="thead"><div class="tnum">MOCK EXAMS · FULL PRACTICE</div><h2>Mock Tests</h2><div class="viName">Đề thi thử — làm trong điều kiện sát thi thật (~90 giây/câu)</div></div>';
  if(!MOCKTESTS.length){
    h += '<div class="intro"><p>No mock tests are loaded yet. Open <strong>data/mocktests.js</strong> — it contains a ready-made template showing exactly how to add exams. Once you add a test and reload, it will appear here with automatic grading and bilingual explanations, and your answers will be saved in the browser.</p>'+viBlock('<p>Chưa có đề thi thử nào. Mở file <strong>data/mocktests.js</strong> — trong đó có sẵn mẫu hướng dẫn cách thêm đề. Thêm đề xong tải lại trang, đề sẽ hiện ở đây với chấm điểm tự động, giải thích song ngữ, và đáp án được lưu ngay trên trình duyệt.</p>')+'</div>';
  } else {
    h += '<div class="intro"><p>Answer every question, then check the score line at the end of each exam. Aim for roughly 90 seconds per question.</p>'+viBlock('<p>Trả lời hết các câu, sau đó xem dòng điểm ở cuối mỗi đề. Cố gắng giữ nhịp ~90 giây mỗi câu.</p>')+'</div>';
    MOCKTESTS.forEach((mt,ti)=>{
      h += '<div class="qset"><div class="sethead"><h4>'+mt.name+'</h4><span class="setmeta">'+mt.qs.length+' questions · ~'+Math.round(mt.qs.length*1.5)+' min</span></div>';
      mt.qs.forEach((q,qi)=>{ h += mockCard(ti, qi, q, mt.qs.length); });
      h += '<div id="mockscore_'+ti+'"></div></div>';
    });
  }
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
  restoreMock();
  if(document.body.classList.contains('showAllVi')) openAllVi();
}
function markMockCard(ti, qi, oi){
  const q = MOCKTESTS[ti] && MOCKTESTS[ti].qs[qi]; if(!q) return;
  const card = document.getElementById('mq_'+ti+'_'+qi); if(!card) return;
  card.dataset.answered = '1';
  card.querySelectorAll('.opt').forEach((b,bi)=>{ b.disabled = true;
    if(bi===q.ans) b.classList.add('correct'); else if(bi===+oi) b.classList.add('wrong'); });
  const ex = card.querySelector('.expl'); ex.classList.add('show');
  const v = ex.querySelector('.verdict');
  if(+oi===q.ans){ v.textContent='✓ Correct'; v.classList.add('ok'); }
  else{ v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans]; v.classList.add('no'); }
}
window.answerMock = function(ti, qi, oi){
  const card = document.getElementById('mq_'+ti+'_'+qi);
  if(!card || card.dataset.answered) return;
  markMockCard(ti, qi, oi);
  progress.__mock = progress.__mock || {};
  progress.__mock[ti+'_'+qi] = oi;
  saveProgress(); showMockScore(ti);
};
function restoreMock(){
  const p = progress.__mock; if(!p) return;
  Object.entries(p).forEach(([k,oi])=>{ const [ti,qi] = k.split('_'); markMockCard(+ti, +qi, oi); });
  MOCKTESTS.forEach((mt,ti)=>showMockScore(ti));
}
function showMockScore(ti){
  const mt = MOCKTESTS[ti]; const p = progress.__mock || {};
  const el = document.getElementById('mockscore_'+ti); if(!el||!mt) return;
  const keys = mt.qs.map((q,qi)=>ti+'_'+qi);
  if(!keys.every(k=>k in p)){ el.innerHTML=''; return; }
  const correct = keys.filter((k,qi)=>mt.qs[qi].ans===+p[k]).length;
  const pct = Math.round(correct/mt.qs.length*100);
  el.innerHTML = '<div class="qscore">'+mt.name+' score: '+correct+' / '+mt.qs.length+' ('+pct+'%) — '+(pct>=70?'exam-ready pace, keep going':'review the weak topics and retake later')+'</div>';
}

function route(){
  const id = location.hash.replace('#','') || 'home';
  const t = TOPICS.find(x=>x.id===id);
  if(id==='mock'){ renderNav('mock'); renderMock(); window.scrollTo(0,0); $('#side').classList.remove('open'); return; }
  renderNav(t?id:'home');
  t ? renderTopic(t) : renderHome();
  window.scrollTo(0,0);
  $('#side').classList.remove('open');
}
window.addEventListener('hashchange', route);
$('#btnMenu').addEventListener('click', ()=>$('#side').classList.toggle('open'));
route();
</script>
