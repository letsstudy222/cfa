quiz:[
{q:'During a period of rising prices and stable inventory quantities, a company using LIFO (rather than FIFO) will most likely report:', opts:['higher net income and higher inventory.','lower net income and lower inventory.','lower net income and higher inventory.'], ans:1,
en:'B is correct. Under LIFO the most recent (most expensive) purchases flow to COGS, so COGS is higher and net income lower; ending inventory holds the oldest (cheapest) costs, so inventory is lower. The benefit is lower taxes and thus higher CFO.',
vi:'Đáp án B. Theo LIFO, hàng mua gần nhất (đắt nhất) đi vào COGS → COGS cao hơn, LN ròng thấp hơn; tồn kho cuối kỳ mang giá cũ (rẻ) → tồn kho thấp hơn. Lợi ích là nộp thuế ít hơn → CFO cao hơn.'},
{q:'A firm capitalizes a cost that a competitor expenses immediately. Compared with the competitor, in the year of the expenditure the capitalizing firm most likely reports:', opts:['higher net income and higher CFO.','lower net income and higher CFI outflows.','higher net income and lower total assets.'], ans:0,
en:'A is correct. Capitalizing defers the expense (higher current net income) and classifies the cash outflow as investing rather than operating (higher CFO, larger CFI outflow). Assets are also higher, so C is wrong.',
vi:'Đáp án A. Vốn hóa làm hoãn chi phí (LN kỳ hiện tại cao hơn) và xếp dòng tiền ra vào hoạt động đầu tư thay vì kinh doanh (CFO cao hơn, CFI ra nhiều hơn). Tài sản cũng cao hơn nên C sai.'},
{q:'Net income is 100. Depreciation is 20. Accounts receivable increased by 15 and accounts payable increased by 10. CFO under the indirect method is closest to:', opts:['105','115','145'], ans:1,
en:'B is correct. CFO = 100 + 20 (non-cash) − 15 (increase in receivables uses cash) + 10 (increase in payables provides cash) = 115.',
vi:'Đáp án B. CFO = 100 + 20 (chi phí không dùng tiền) − 15 (phải thu tăng làm giảm tiền) + 10 (phải trả tăng làm tăng tiền) = 115.'},
{q:'A company’s ROE increased while its net profit margin and asset turnover were unchanged. The most likely explanation is an increase in:', opts:['financial leverage.','the tax burden ratio.','operating efficiency.'], ans:0,
en:'A is correct. In the 3-factor DuPont model, ROE = margin × turnover × leverage. With margin and turnover flat, only higher leverage (assets/equity — i.e., more debt relative to equity) can lift ROE. This is lower-quality ROE growth.',
vi:'Đáp án A. Trong DuPont 3 nhân tố, ROE = biên LN × vòng quay × đòn bẩy. Biên và vòng quay không đổi thì chỉ đòn bẩy tài chính tăng (tài sản/VCSH — tức vay nợ nhiều hơn) mới đẩy ROE lên. Đây là tăng trưởng ROE chất lượng thấp.'},
{q:'Under IFRS, a reversal of an inventory write-down:', opts:['is prohibited.','is permitted, limited to the amount of the original write-down.','is permitted without limit.'], ans:1,
en:'B is correct. IFRS permits reversing an inventory write-down when NRV recovers, but only up to the original write-down amount. US GAAP prohibits reversals entirely.',
vi:'Đáp án B. IFRS cho phép hoàn nhập giảm giá tồn kho khi NRV phục hồi, nhưng tối đa bằng số đã ghi giảm ban đầu. US GAAP cấm hoàn nhập hoàn toàn.'}
]
},
/* ============ 05 CORPORATE ISSUERS ============ */
{
id:'corp', num:'05', name:'Corporate Issuers', vi:'Tổ chức phát hành doanh nghiệp', w:[6,9],
blurb:'Corporate structures and governance, capital investment decisions (NPV/IRR), cost of capital, capital structure and leverage, working capital.',
intro:{
en:'Corporate Issuers looks at companies from the inside: how they are governed, how they choose investments (capital budgeting), how they fund themselves (cost of capital, capital structure), and how operating and financial leverage magnify risk. NPV/IRR and WACC calculations here reappear in Equity and Portfolio Management.',
vi:'Corporate Issuers nhìn doanh nghiệp từ bên trong: cách quản trị, cách lựa chọn dự án đầu tư (capital budgeting), cách huy động vốn (chi phí vốn, cấu trúc vốn), và cách đòn bẩy hoạt động/tài chính khuếch đại rủi ro. Các phép tính NPV/IRR và WACC ở đây sẽ xuất hiện lại trong Equity và Portfolio Management.'
},
modules:[
{ title:'Governance & Stakeholders', sections:[
{h:'Principal–agent conflicts and governance mechanisms', en:'<p>Corporate governance manages conflicts among stakeholders: shareholders vs managers (the classic <strong>principal–agent problem</strong>: entrenchment, empire building, excessive risk aversion), controlling vs minority shareholders, shareholders vs creditors (equity holders prefer risk; debt holders prefer safety). Mechanisms: the <strong>board of directors</strong> (independence, separation of CEO and chair, committees — audit, remuneration, nomination), say-on-pay, activist investors, the takeover market, and legal/regulatory constraints. ESG considerations enter through material environmental and social factors that affect long-term value and risk.</p>',
vi:'<p>Quản trị công ty xử lý xung đột giữa các bên liên quan: cổ đông vs ban điều hành (bài toán <strong>người ủy quyền – người đại diện</strong>: cố thủ ghế, xây "đế chế", né rủi ro quá mức), cổ đông chi phối vs cổ đông thiểu số, cổ đông vs chủ nợ (cổ đông thích rủi ro, chủ nợ thích an toàn). Cơ chế: <strong>HĐQT</strong> (tính độc lập, tách vai trò CEO và Chủ tịch, các ủy ban kiểm toán/lương thưởng/đề cử), biểu quyết về thù lao, nhà đầu tư chủ động, thị trường thâu tóm, và ràng buộc pháp lý. Yếu tố ESG được xét qua các nhân tố môi trường – xã hội trọng yếu ảnh hưởng giá trị và rủi ro dài hạn.</p>'}
]},
{ title:'Capital Investments: NPV & IRR', sections:[
{h:'Decision rules', en:'<ul><li><strong>NPV</strong> = present value of all incremental after-tax cash flows minus the initial outlay, discounted at the project’s required return. Accept if NPV &gt; 0 — this directly measures the expected addition to shareholder wealth.</li><li><strong>IRR</strong> = the discount rate that makes NPV = 0. Accept if IRR &gt; required return. Problems: assumes reinvestment at the IRR (often unrealistic), can produce <strong>multiple IRRs</strong> with unconventional cash flows (sign changes), and can <strong>rank mutually exclusive projects incorrectly</strong> when size or timing differs. <em>When NPV and IRR conflict, choose the higher NPV.</em></li><li>Other tools: payback period (ignores time value and cash flows after payback), discounted payback, profitability index (PI = PV of inflows / initial outlay; PI &gt; 1 means NPV &gt; 0 — useful under capital rationing).</li><li>Use only <strong>incremental</strong> cash flows: include opportunity costs and cannibalization/externalities; exclude <strong>sunk costs</strong>; interest costs are excluded from cash flows because they are captured in the discount rate.</li></ul>',
vi:'<ul><li><strong>NPV</strong> = giá trị hiện tại của toàn bộ dòng tiền tăng thêm sau thuế trừ vốn đầu tư ban đầu, chiết khấu tại tỷ suất yêu cầu. Chấp nhận nếu NPV &gt; 0 — đo trực tiếp phần giá trị tăng thêm cho cổ đông.</li><li><strong>IRR</strong> = tỷ suất chiết khấu làm NPV = 0. Chấp nhận nếu IRR &gt; tỷ suất yêu cầu. Nhược điểm: giả định tái đầu tư tại IRR (thường phi thực tế), có thể có <strong>nhiều IRR</strong> khi dòng tiền đổi dấu nhiều lần, và có thể <strong>xếp hạng sai các dự án loại trừ lẫn nhau</strong> khi khác quy mô hoặc thời điểm. <em>Khi NPV và IRR mâu thuẫn, chọn theo NPV cao hơn.</em></li><li>Công cụ khác: thời gian hoàn vốn (bỏ qua giá trị thời gian và dòng tiền sau hoàn vốn), hoàn vốn có chiết khấu, chỉ số sinh lời PI.</li><li>Chỉ dùng dòng tiền <strong>tăng thêm</strong>: tính chi phí cơ hội và hiệu ứng "ăn thịt" sản phẩm cũ; loại <strong>chi phí chìm</strong>; loại lãi vay khỏi dòng tiền vì đã nằm trong tỷ suất chiết khấu.</li></ul>'}
]},
{ title:'Cost of Capital & Leverage', sections:[
{h:'WACC and component costs', en:'<p><strong>WACC = w<sub>d</sub>·r<sub>d</sub>(1 − t) + w<sub>p</sub>·r<sub>p</sub> + w<sub>e</sub>·r<sub>e</sub></strong>, with weights at <em>target</em> capital structure based on <em>market values</em>. Only debt gets the tax shield (interest is deductible; dividends are not).</p><ul><li><strong>Cost of debt:</strong> YTM on existing debt or the rate on new borrowing, after tax.</li><li><strong>Cost of preferred:</strong> r<sub>p</sub> = D<sub>p</sub> / P<sub>p</sub>.</li><li><strong>Cost of equity:</strong> CAPM (r<sub>e</sub> = R<sub>f</sub> + β(R<sub>m</sub> − R<sub>f</sub>)), the dividend discount approach (r<sub>e</sub> = D<sub>1</sub>/P<sub>0</sub> + g), or bond yield plus risk premium.</li></ul>',
vi:'<p><strong>WACC = w<sub>d</sub>·r<sub>d</sub>(1 − t) + w<sub>p</sub>·r<sub>p</sub> + w<sub>e</sub>·r<sub>e</sub></strong>, với trọng số theo cấu trúc vốn <em>mục tiêu</em> tính trên <em>giá trị thị trường</em>. Chỉ nợ vay có lá chắn thuế (lãi vay được khấu trừ thuế; cổ tức thì không).</p><ul><li><strong>Chi phí nợ:</strong> YTM của nợ hiện hữu hoặc lãi suất vay mới, sau thuế.</li><li><strong>Chi phí CP ưu đãi:</strong> r<sub>p</sub> = D<sub>p</sub> / P<sub>p</sub>.</li><li><strong>Chi phí VCSH:</strong> CAPM (r<sub>e</sub> = R<sub>f</sub> + β(R<sub>m</sub> − R<sub>f</sub>)), mô hình chiết khấu cổ tức (r<sub>e</sub> = D<sub>1</sub>/P<sub>0</sub> + g), hoặc lợi suất trái phiếu + phần bù rủi ro.</li></ul>'},
{h:'Operating and financial leverage', en:'<ul><li><strong>DOL</strong> (degree of operating leverage) = %Δ operating income / %Δ sales = contribution margin / operating income. Driven by fixed <em>operating</em> costs.</li><li><strong>DFL</strong> (degree of financial leverage) = %Δ net income / %Δ operating income = EBIT / (EBIT − interest). Driven by fixed <em>financing</em> costs.</li><li><strong>DTL = DOL × DFL</strong> — total sensitivity of net income to sales.</li><li>Business risk (sales + operating risk) plus financial risk determine total leverage. Higher leverage raises the breakeven point and magnifies both gains and losses. Modigliani–Miller: without taxes, capital structure is irrelevant; with taxes, debt adds value via the tax shield until financial distress and agency costs offset it (the static trade-off theory → an optimal capital structure).</li></ul>',
vi:'<ul><li><strong>DOL</strong> = %Δ lợi nhuận hoạt động / %Δ doanh thu = số dư đảm phí / lợi nhuận hoạt động. Do chi phí <em>hoạt động</em> cố định tạo ra.</li><li><strong>DFL</strong> = %Δ LN ròng / %Δ lợi nhuận hoạt động = EBIT / (EBIT − lãi vay). Do chi phí <em>tài chính</em> cố định tạo ra.</li><li><strong>DTL = DOL × DFL</strong> — độ nhạy tổng hợp của LN ròng theo doanh thu.</li><li>Rủi ro kinh doanh + rủi ro tài chính quyết định tổng đòn bẩy. Đòn bẩy cao nâng điểm hòa vốn và khuếch đại cả lãi lẫn lỗ. Modigliani–Miller: không thuế → cấu trúc vốn không quan trọng; có thuế → nợ tạo giá trị nhờ lá chắn thuế cho tới khi chi phí kiệt quệ tài chính và chi phí đại diện triệt tiêu (lý thuyết đánh đổi tĩnh → tồn tại cấu trúc vốn tối ưu).</li></ul>'}
], formulas:[
['NPV','NPV = Σ CFt/(1+r)^t − Initial outlay','Accept if NPV > 0'],
['WACC','wd·rd(1−t) + wp·rp + we·re','Market-value target weights'],
['CAPM','re = Rf + β(Rm − Rf)',''],
['Cost of preferred','rp = Dp / Pp',''],
['DOL','Q(P−V) / [Q(P−V) − F]','= CM / operating income'],
['DFL','EBIT / (EBIT − Interest)',''],
['Breakeven quantity','Q = (F + Interest) / (P − V)','Operating breakeven excludes interest']
]}
],

quiz:[
{q:'Two mutually exclusive projects have conflicting NPV and IRR rankings. A firm that wants to maximize shareholder wealth should choose the project with the:', opts:['higher IRR.','higher NPV.','shorter payback period.'], ans:1,
en:'B is correct. NPV measures the direct addition to shareholder wealth in currency terms and assumes reinvestment at the (more realistic) required rate of return. IRR can mis-rank projects of different scale or cash-flow timing.',
vi:'Đáp án B. NPV đo trực tiếp phần giá trị tăng thêm cho cổ đông bằng tiền và giả định tái đầu tư tại tỷ suất yêu cầu (thực tế hơn). IRR có thể xếp hạng sai khi các dự án khác quy mô hoặc thời điểm dòng tiền.'},
{q:'A company has a target structure of 40% debt and 60% equity. Pre-tax cost of debt is 6%, cost of equity is 12%, and the tax rate is 25%. WACC is closest to:', opts:['9.0%','9.6%','7.8%'], ans:0,
en:'A is correct. WACC = 0.40 × 6% × (1 − 0.25) + 0.60 × 12% = 0.40 × 4.5% + 7.2% = 1.8% + 7.2% = 9.0%. Remember: only the debt component is tax-adjusted.',
vi:'Đáp án A. WACC = 0.40 × 6% × (1 − 0.25) + 0.60 × 12% = 1.8% + 7.2% = 9.0%. Nhớ: chỉ chi phí nợ được điều chỉnh thuế.'},
{q:'A firm with high fixed operating costs relative to variable costs will most likely have:', opts:['a high degree of operating leverage and more volatile operating income.','a low breakeven point.','a high degree of financial leverage.'], ans:0,
en:'A is correct. High fixed operating costs mean each unit of sales beyond breakeven adds more to operating income — DOL is high and operating income is more sensitive to sales changes. The breakeven point is higher, not lower, and DFL relates to interest costs, not operating costs.',
vi:'Đáp án A. Chi phí hoạt động cố định cao nghĩa là mỗi đơn vị doanh thu vượt điểm hòa vốn đóng góp nhiều hơn vào lợi nhuận — DOL cao, lợi nhuận hoạt động biến động mạnh theo doanh thu. Điểm hòa vốn cao hơn chứ không thấp hơn, còn DFL liên quan lãi vay, không phải chi phí hoạt động.'},
{q:'When evaluating a capital project, which of the following should be excluded from the incremental cash flows?', opts:['An opportunity cost of using land the firm already owns','Expected cannibalization of an existing product line','Consulting fees already paid for a feasibility study'], ans:2,
en:'C is correct. Fees already paid are sunk costs — unrecoverable regardless of the decision — and must be excluded. Opportunity costs and cannibalization are genuine incremental effects and must be included.',
vi:'Đáp án C. Phí đã trả là chi phí chìm — không thu hồi được dù quyết định thế nào — nên phải loại. Chi phí cơ hội và cannibalization là tác động tăng thêm thật sự nên phải tính vào.'}
]
},

blurb:'Market organization, indices, market efficiency, industry & company analysis, and equity valuation: DDM, FCFE, and price multiples.',
intro:{
en:'Equity covers how markets and indices work, the efficient market hypothesis, security characteristics, industry analysis, and — the heart of it — valuation: dividend discount models, free-cash-flow models, and multiplier approaches. Gordon growth model questions are near-guaranteed on the exam.',
vi:'Equity gồm cách thị trường và chỉ số vận hành, giả thuyết thị trường hiệu quả, đặc điểm chứng khoán, phân tích ngành, và trọng tâm là định giá: mô hình chiết khấu cổ tức, mô hình dòng tiền tự do và phương pháp hệ số. Câu hỏi về Gordon growth model gần như chắc chắn xuất hiện.'
},
modules:[
{ title:'Markets, Orders & Indices', sections:[
{h:'Positions, margin, and orders', en:'<ul><li><strong>Long</strong> profits when price rises; <strong>short</strong> sells borrowed shares hoping to repurchase cheaper — risk is theoretically unlimited.</li><li><strong>Margin buying:</strong> leverage ratio = 1/margin requirement (50% initial margin → 2× leverage; returns and losses are doubled before costs). A <strong>margin call</strong> occurs when equity falls below the maintenance margin: trigger price P = P<sub>0</sub> × (1 − initial margin)/(1 − maintenance margin).</li><li><strong>Orders:</strong> market orders demand immediacy (execution certainty, price uncertainty); limit orders control price but may never fill; stop orders become market orders once a trigger trades — stop-loss orders reinforce momentum.</li><li>Market structures: quote-driven (dealers), order-driven (auction/matching), brokered. Call vs continuous markets.</li></ul>',
vi:'<ul><li><strong>Long</strong> lãi khi giá tăng; <strong>short</strong> bán chứng khoán đi vay, kỳ vọng mua lại rẻ hơn — rủi ro về lý thuyết là vô hạn.</li><li><strong>Mua ký quỹ:</strong> hệ số đòn bẩy = 1/tỷ lệ ký quỹ (ký quỹ ban đầu 50% → đòn bẩy 2×; lãi và lỗ đều nhân đôi trước chi phí). <strong>Margin call</strong> khi vốn chủ giảm dưới ký quỹ duy trì: giá kích hoạt P = P<sub>0</sub> × (1 − ký quỹ ban đầu)/(1 − ký quỹ duy trì).</li><li><strong>Lệnh:</strong> lệnh thị trường ưu tiên tốc độ (chắc chắn khớp, không chắc giá); lệnh giới hạn kiểm soát giá nhưng có thể không khớp; lệnh dừng trở thành lệnh thị trường khi chạm giá kích hoạt — stop-loss khuếch đại đà giá.</li><li>Cấu trúc thị trường: dựa trên báo giá (dealer), dựa trên lệnh (đấu giá/khớp lệnh), qua môi giới. Thị trường phiên (call) vs liên tục.</li></ul>'},
{h:'Index weighting schemes', en:'<table class="simple"><tr><th>Weighting</th><th>Idea</th><th>Key property</th></tr><tr><td>Price-weighted</td><td>Sum of prices / divisor (e.g., Dow)</td><td>Biased toward high-priced stocks; splits change weights</td></tr><tr><td>Market-cap-weighted</td><td>Weight = float-adjusted market cap (e.g., S&amp;P 500)</td><td>Self-rebalancing; momentum tilt toward overvalued large caps</td></tr><tr><td>Equal-weighted</td><td>Same weight each stock</td><td>Small-cap tilt; requires frequent rebalancing</td></tr><tr><td>Fundamental-weighted</td><td>Weights by sales, earnings, book value…</td><td>Value tilt; contrarian rebalancing</td></tr></table>',
vi:'<p>Bốn cách tính chỉ số: <strong>theo giá</strong> (tổng giá / số chia, VD Dow — thiên vị cổ phiếu giá cao, chia tách làm đổi trọng số); <strong>theo vốn hóa</strong> (điều chỉnh free-float, VD S&amp;P 500 — tự cân bằng, nghiêng về cổ phiếu lớn có thể đang được định giá cao); <strong>tỷ trọng bằng nhau</strong> (nghiêng về vốn hóa nhỏ, phải tái cân bằng thường xuyên); <strong>theo yếu tố cơ bản</strong> (doanh thu, lợi nhuận, giá trị sổ sách — nghiêng về giá trị, tái cân bằng kiểu ngược dòng).</p>'}
]},
{ title:'Market Efficiency', sections:[
{h:'The three forms of the EMH', en:'<ul><li><strong>Weak form:</strong> prices reflect all <em>past market data</em> (prices, volume). If it holds, <em>technical analysis</em> cannot consistently outperform.</li><li><strong>Semi-strong form:</strong> prices reflect all <em>public</em> information. If it holds, <em>fundamental analysis</em> of public data cannot consistently outperform. Tested via event studies.</li><li><strong>Strong form:</strong> prices reflect all information, <em>including private/insider</em> information. Even insiders could not beat the market — empirically rejected (insider trading is profitable, which is why it is illegal).</li></ul><p>Documented anomalies (January effect, momentum, value effects) often shrink after discovery or fail after costs. Behavioral finance (loss aversion, herding, overconfidence) offers explanations for persistent mispricing. Practical implication: in highly efficient markets, <strong>passive investing</strong> is hard to beat after fees.</p>',
vi:'<ul><li><strong>Dạng yếu:</strong> giá phản ánh mọi <em>dữ liệu thị trường quá khứ</em>. Nếu đúng, <em>phân tích kỹ thuật</em> không thể thắng thị trường bền vững.</li><li><strong>Dạng bán mạnh:</strong> giá phản ánh mọi thông tin <em>công khai</em>. Nếu đúng, <em>phân tích cơ bản</em> trên dữ liệu công khai không thắng được thị trường. Kiểm định bằng event study.</li><li><strong>Dạng mạnh:</strong> giá phản ánh mọi thông tin, <em>kể cả thông tin nội bộ</em>. Ngay cả insider cũng không thắng được — thực nghiệm bác bỏ (giao dịch nội gián sinh lời, đó là lý do nó bị cấm).</li></ul><p>Các anomaly (hiệu ứng tháng Giêng, momentum, hiệu ứng giá trị) thường yếu đi sau khi được công bố hoặc biến mất sau chi phí. Tài chính hành vi (sợ thua lỗ, tâm lý bầy đàn, quá tự tin) giải thích các sai lệch định giá dai dẳng. Hàm ý thực tiễn: ở thị trường hiệu quả cao, <strong>đầu tư thụ động</strong> rất khó bị đánh bại sau phí.</p>'}
]},
{ title:'Equity Valuation', sections:[
{h:'Dividend discount models', en:'<p>Value = present value of expected future cash flows to the shareholder. For a dividend-paying firm with stable growth, the <strong>Gordon growth model</strong>:</p><p><strong>V₀ = D₁ / (r − g)</strong>, where D₁ = D₀(1 + g) is <em>next year’s</em> dividend, r = required return, g = sustainable growth. Requires r &gt; g and stable growth. Value is extremely sensitive to (r − g).</p><ul><li><strong>Sustainable growth:</strong> g = retention ratio × ROE = (1 − payout) × ROE.</li><li><strong>Multistage models</strong> handle high-growth phases before maturity: discount the short-term dividends plus the terminal value from Gordon growth at the point growth stabilizes.</li><li>For non-dividend payers, use <strong>FCFE</strong> models (value = PV of free cash flow to equity at r) or multiples.</li><li>Preferred stock = a perpetuity: V = D / r.</li></ul>',
vi:'<p>Giá trị = hiện giá dòng tiền kỳ vọng cho cổ đông. Với công ty trả cổ tức tăng trưởng ổn định, <strong>mô hình Gordon</strong>:</p><p><strong>V₀ = D₁ / (r − g)</strong>, trong đó D₁ = D₀(1 + g) là cổ tức <em>năm tới</em>, r = tỷ suất yêu cầu, g = tăng trưởng bền vững. Điều kiện r &gt; g và tăng trưởng ổn định. Giá trị cực kỳ nhạy với (r − g).</p><ul><li><strong>Tăng trưởng bền vững:</strong> g = tỷ lệ giữ lại × ROE = (1 − tỷ lệ chi trả) × ROE.</li><li><strong>Mô hình nhiều giai đoạn</strong> xử lý pha tăng trưởng cao trước khi bão hòa: chiết khấu cổ tức ngắn hạn + giá trị cuối kỳ tính bằng Gordon tại thời điểm tăng trưởng ổn định.</li><li>Công ty không trả cổ tức: dùng mô hình <strong>FCFE</strong> hoặc hệ số so sánh.</li><li>Cổ phiếu ưu đãi = perpetuity: V = D / r.</li></ul>'},
{h:'Price multiples and enterprise value', en:'<ul><li><strong>P/E:</strong> justified forward P/E from Gordon growth = payout ratio / (r − g). Drawbacks: negative or manipulated earnings.</li><li><strong>P/B:</strong> useful for financial firms; distorted by intangibles and buybacks.</li><li><strong>P/S:</strong> works for unprofitable firms; ignores cost structure.</li><li><strong>P/CF:</strong> less manipulable than earnings.</li><li><strong>EV/EBITDA:</strong> Enterprise value = market cap + debt + preferred − cash. Capital-structure neutral; useful for comparing firms with different leverage.</li><li>Method of comparables: a stock trading at a lower multiple than peers is <em>relatively</em> undervalued — but the whole peer group may be mispriced (relative ≠ intrinsic).</li></ul>',
vi:'<ul><li><strong>P/E:</strong> P/E hợp lý từ Gordon = tỷ lệ chi trả / (r − g). Nhược: lợi nhuận âm hoặc bị "xào nấu".</li><li><strong>P/B:</strong> hữu ích với công ty tài chính; méo mó bởi tài sản vô hình và mua lại cổ phiếu.</li><li><strong>P/S:</strong> dùng được cho công ty chưa có lãi; bỏ qua cơ cấu chi phí.</li><li><strong>P/CF:</strong> khó thao túng hơn lợi nhuận.</li><li><strong>EV/EBITDA:</strong> EV = vốn hóa + nợ + CP ưu đãi − tiền mặt. Trung lập với cấu trúc vốn; tốt khi so sánh công ty có đòn bẩy khác nhau.</li><li>Phương pháp so sánh: cổ phiếu có hệ số thấp hơn nhóm tương đồng chỉ là rẻ <em>tương đối</em> — cả nhóm có thể đang bị định giá sai (tương đối ≠ nội tại).</li></ul>'}
], formulas:[
['Gordon growth','V0 = D1 / (r − g)','D1 = D0(1+g); requires r > g'],
['Sustainable growth','g = b × ROE','b = retention ratio = 1 − payout'],
['Justified forward P/E','P0/E1 = payout / (r − g)',''],
['Preferred stock value','V = D / r','Perpetuity'],
['Enterprise value','EV = Market cap + Debt + Preferred − Cash',''],
['Margin call price','P = P0 (1 − IM) / (1 − MM)','IM initial, MM maintenance margin']
]}
],

quiz:[
{q:'A stock will pay a dividend of $2.00 next year (D1). Dividends grow at 4% forever and the required return is 9%. The stock’s intrinsic value is closest to:', opts:['$40.00','$41.60','$50.00'], ans:0,
en:'A is correct. V0 = D1/(r − g) = 2.00/(0.09 − 0.04) = 2.00/0.05 = $40.00. Careful: the $2.00 is already D1; multiplying by (1+g) again — giving $41.60 — is the classic trap.',
vi:'Đáp án A. V0 = D1/(r − g) = 2.00/0.05 = 40 USD. Cẩn thận: 2.00 đã là D1; nhân thêm (1+g) để ra 41.60 chính là bẫy kinh điển.'},
{q:'If markets are semi-strong form efficient, which activity can still be expected to produce consistent abnormal returns?', opts:['Technical analysis of price patterns','Fundamental analysis of published financial statements','Trading on material nonpublic information'], ans:2,
en:'C is correct (as a matter of theory — it is illegal and unethical). Semi-strong efficiency means all public information (past prices AND fundamentals) is already in prices; only private information confers an edge. Strong-form efficiency would eliminate even that edge.',
vi:'Đáp án C (về mặt lý thuyết — hành vi này phi pháp và phi đạo đức). Thị trường hiệu quả bán mạnh nghĩa là mọi thông tin công khai (gồm cả giá quá khứ VÀ dữ liệu cơ bản) đã nằm trong giá; chỉ thông tin riêng tư mới tạo lợi thế. Dạng mạnh sẽ triệt tiêu cả lợi thế đó.'},
{q:'An investor buys shares at $50 on 50% initial margin with a 25% maintenance margin. Ignoring costs, the margin call price is closest to:', opts:['$25.00','$33.33','$37.50'], ans:1,
en:'B is correct. Margin call price = P0 × (1 − IM)/(1 − MM) = 50 × (1 − 0.50)/(1 − 0.25) = 50 × 0.50/0.75 = $33.33.',
vi:'Đáp án B. Giá margin call = 50 × (1 − 0.50)/(1 − 0.25) = 50 × 0.6667 = 33.33 USD.'},
{q:'Compared with a market-cap-weighted index of the same stocks, an equal-weighted index most likely has:', opts:['a tilt toward small-cap stocks and higher rebalancing needs.','a tilt toward the largest stocks.','identical performance if no stocks are added or removed.'], ans:0,
en:'A is correct. Equal weighting gives small companies the same weight as giants — a small-cap tilt — and prices drift away from equal weights daily, so the index requires regular rebalancing (with associated transaction costs).',
vi:'Đáp án A. Tỷ trọng bằng nhau cho công ty nhỏ trọng số ngang công ty khổng lồ — nghiêng về vốn hóa nhỏ — và giá biến động khiến trọng số lệch khỏi mức bằng nhau mỗi ngày, nên phải tái cân bằng thường xuyên (kèm chi phí giao dịch).'},
{q:'A firm retains 60% of earnings and earns an ROE of 15%. Its sustainable growth rate is closest to:', opts:['6.0%','9.0%','15.0%'], ans:1,
en:'B is correct. g = retention ratio × ROE = 0.60 × 15% = 9.0%. This g feeds directly into the Gordon growth model.',
vi:'Đáp án B. g = tỷ lệ giữ lại × ROE = 0.60 × 15% = 9%. Giá trị g này được dùng trực tiếp trong mô hình Gordon.'}
]
},
/* ============ 07 FIXED INCOME ============ */
{
id:'fi', num:'07', name:'Fixed Income', vi:'Thu nhập cố định (Trái phiếu)', w:[11,14],
blurb:'Bond features and markets, pricing and yield measures, the price–yield relationship, duration & convexity, credit risk, and securitization.',
intro:{
en:'Fixed Income is heavily weighted and very learnable: master bond pricing mechanics, yield measures, and — the exam favorites — duration and convexity. The logic of "price and yield move inversely" underlies almost every question. Securitization (MBS/ABS) and credit analysis round out the topic.',
vi:'Fixed Income có trọng số cao và rất "học được": nắm chắc cơ chế định giá trái phiếu, các thước đo lợi suất, và — hai chủ đề đề thi ưa thích — duration và convexity. Logic "giá và lợi suất ngược chiều" là nền của gần như mọi câu hỏi. Chứng khoán hóa (MBS/ABS) và phân tích tín dụng hoàn thiện chủ đề này.'
},
modules:[
{ title:'Bond Features & Pricing', sections:[
{h:'Instrument features', en:'<ul><li>Key terms: <strong>par (face) value</strong>, <strong>coupon rate</strong> (fixed, floating = reference rate + spread, zero-coupon), <strong>maturity</strong>, currency, and the <strong>indenture</strong> (the legal contract) with covenants — <em>affirmative</em> (things the issuer must do) and <em>negative</em> (restrictions such as limits on additional debt).</li><li>Seniority: secured (backed by collateral) ranks above unsecured (debentures); within unsecured, senior above subordinated.</li><li>Contingency provisions: <strong>callable</strong> (issuer may redeem early — bad for investors, higher yield), <strong>putable</strong> (investor may sell back — good for investors, lower yield), <strong>convertible</strong> (exchangeable into shares).</li></ul>',
vi:'<ul><li>Thuật ngữ chính: <strong>mệnh giá</strong>, <strong>lãi suất coupon</strong> (cố định, thả nổi = lãi suất tham chiếu + spread, zero-coupon), <strong>kỳ hạn</strong>, đồng tiền, và <strong>indenture</strong> (hợp đồng pháp lý) với các cam kết — <em>affirmative</em> (việc phải làm) và <em>negative</em> (hạn chế, VD giới hạn vay thêm).</li><li>Thứ tự ưu tiên: có bảo đảm đứng trên không bảo đảm; trong nhóm không bảo đảm, senior đứng trên subordinated.</li><li>Điều khoản kèm theo: <strong>callable</strong> (tổ chức phát hành được mua lại sớm — bất lợi cho nhà đầu tư, lợi suất cao hơn), <strong>putable</strong> (nhà đầu tư được bán lại — có lợi, lợi suất thấp hơn), <strong>convertible</strong> (chuyển đổi thành cổ phiếu).</li></ul>'},
{h:'Pricing and the price–yield relationship', en:'<p>A bond’s price is the present value of its coupons and face value, discounted at the market discount rate (YTM). Core relationships:</p><ul><li>Coupon rate &lt; YTM → <strong>discount</strong>; coupon = YTM → par; coupon &gt; YTM → <strong>premium</strong>.</li><li>Price and yield are <strong>inversely related</strong>, and the relationship is <strong>convex</strong>: a 1% fall in yield raises price <em>more</em> than a 1% rise lowers it.</li><li><strong>Pull to par:</strong> as maturity approaches, price converges to face value ("constant-yield price trajectory").</li><li>Longer maturity and <em>lower</em> coupon → greater price sensitivity to yield changes.</li><li>Between coupon dates: full (dirty) price = flat (clean) price + accrued interest. Quoted prices are clean.</li></ul>',
vi:'<p>Giá trái phiếu là hiện giá của các coupon và mệnh giá, chiết khấu tại lãi suất thị trường (YTM). Quan hệ cốt lõi:</p><ul><li>Coupon &lt; YTM → giao dịch <strong>dưới mệnh giá</strong>; coupon = YTM → bằng mệnh giá; coupon &gt; YTM → <strong>trên mệnh giá</strong>.</li><li>Giá và lợi suất <strong>ngược chiều</strong>, và quan hệ này <strong>lồi (convex)</strong>: lợi suất giảm 1% làm giá tăng <em>nhiều hơn</em> mức giá giảm khi lợi suất tăng 1%.</li><li><strong>Pull to par:</strong> càng gần đáo hạn, giá càng hội tụ về mệnh giá.</li><li>Kỳ hạn dài hơn và coupon <em>thấp hơn</em> → giá nhạy hơn với thay đổi lợi suất.</li><li>Giữa hai kỳ coupon: giá đầy đủ (dirty) = giá niêm yết (clean) + lãi dồn tích.</li></ul>'},
{h:'Yield measures and the yield curve', en:'<ul><li><strong>YTM</strong> assumes the bond is held to maturity, all payments received on time, and coupons <em>reinvested at the YTM</em>.</li><li><strong>Current yield</strong> = annual coupon / price (ignores time value and capital gain/loss).</li><li>Callable bonds: yield-to-call for each call date; <strong>yield-to-worst</strong> is the lowest of all.</li><li>Money market instruments use discount rates or add-on rates on 360- or 365-day conventions — convert to a common basis to compare.</li><li><strong>Spot rates</strong> are yields on zero-coupon bonds; the no-arbitrage price discounts each cash flow at its own spot rate. <strong>Forward rates</strong> are implied future rates. A normal yield curve slopes upward; inversion (short &gt; long yields) has historically preceded recessions.</li><li>Spreads: <strong>G-spread</strong> (over government yields), <strong>I-spread</strong> (over swaps), <strong>Z-spread</strong> (constant spread over the whole spot curve), <strong>OAS</strong> (Z-spread minus option cost — used for callable bonds).</li></ul>',
vi:'<ul><li><strong>YTM</strong> giả định giữ đến đáo hạn, nhận đủ mọi khoản đúng hạn, và coupon <em>tái đầu tư tại chính YTM</em>.</li><li><strong>Current yield</strong> = coupon năm / giá (bỏ qua giá trị thời gian và lãi/lỗ vốn).</li><li>Trái phiếu callable: tính yield-to-call cho từng ngày call; <strong>yield-to-worst</strong> là mức thấp nhất.</li><li>Công cụ thị trường tiền tệ dùng lãi suất chiết khấu hoặc add-on trên cơ sở 360/365 ngày — phải quy về cùng cơ sở để so sánh.</li><li><strong>Lãi suất spot</strong> là lợi suất trái phiếu zero-coupon; giá không-arbitrage chiết khấu từng dòng tiền theo spot tương ứng. <strong>Lãi suất forward</strong> là lãi suất tương lai hàm ý. Đường cong lợi suất thường dốc lên; đảo ngược (ngắn hạn &gt; dài hạn) trong lịch sử thường báo trước suy thoái.</li><li>Spread: <strong>G-spread</strong> (so với TPCP), <strong>I-spread</strong> (so với swap), <strong>Z-spread</strong> (spread không đổi trên toàn đường spot), <strong>OAS</strong> (Z-spread trừ giá trị quyền chọn — dùng cho trái phiếu callable).</li></ul>'}
]},
{ title:'Duration, Convexity & Credit Risk', sections:[
{h:'Duration', en:'<ul><li><strong>Macaulay duration:</strong> the weighted-average time to receive the bond’s cash flows (in years). Also the horizon at which price risk and reinvestment risk offset.</li><li><strong>Modified duration:</strong> ModDur = MacDur / (1 + YTM per period). It estimates the % price change: <strong>%ΔPrice ≈ −ModDur × Δyield</strong>.</li><li><strong>Effective duration</strong> uses the change in price for parallel shifts of the benchmark curve — required for bonds with embedded options (callable/putable, MBS) whose cash flows change with rates.</li><li>Duration rises with maturity, falls with coupon and with yield level. A zero-coupon bond’s Macaulay duration equals its maturity.</li><li><strong>Money duration</strong> = ModDur × full price; <strong>PVBP</strong> is the price change for a 1 bp yield move.</li></ul>',
vi:'<ul><li><strong>Macaulay duration:</strong> thời gian bình quân gia quyền nhận các dòng tiền (tính bằng năm). Cũng là kỳ hạn đầu tư mà tại đó rủi ro giá và rủi ro tái đầu tư triệt tiêu nhau.</li><li><strong>Modified duration:</strong> ModDur = MacDur / (1 + YTM mỗi kỳ). Ước lượng % thay đổi giá: <strong>%ΔGiá ≈ −ModDur × Δlợi suất</strong>.</li><li><strong>Effective duration</strong> dùng thay đổi giá khi đường cong chuẩn dịch song song — bắt buộc với trái phiếu có quyền chọn kèm (callable/putable, MBS) vì dòng tiền thay đổi theo lãi suất.</li><li>Duration tăng theo kỳ hạn, giảm khi coupon cao hơn và khi mặt bằng lợi suất cao hơn. Zero-coupon có Macaulay duration bằng đúng kỳ hạn.</li><li><strong>Money duration</strong> = ModDur × giá đầy đủ; <strong>PVBP</strong> là mức thay đổi giá khi lợi suất đổi 1 điểm cơ bản.</li></ul>'},
{h:'Convexity and combined estimates', en:'<p>Duration is a straight-line estimate of a curved relationship, so it <em>understates</em> price rises and <em>overstates</em> price falls. Adding convexity fixes most of the error:</p><p><strong>%ΔPrice ≈ −ModDur × Δy + ½ × Convexity × (Δy)²</strong></p><p>Positive convexity is valuable: more upside, less downside for the same duration. Callable bonds exhibit <strong>negative convexity</strong> at low yields (price is capped near the call price); putable bonds have extra positive convexity at high yields.</p>',
vi:'<p>Duration là ước lượng đường thẳng cho một quan hệ cong, nên nó <em>ước lượng thấp</em> mức tăng giá và <em>ước lượng cao</em> mức giảm giá. Cộng thêm convexity sẽ sửa phần lớn sai số:</p><p><strong>%ΔGiá ≈ −ModDur × Δy + ½ × Convexity × (Δy)²</strong></p><p>Convexity dương rất giá trị: cùng một duration nhưng tăng nhiều hơn, giảm ít hơn. Trái phiếu callable có <strong>convexity âm</strong> khi lợi suất thấp (giá bị chặn gần giá call); trái phiếu putable có convexity dương lớn hơn khi lợi suất cao.</p>'},
{h:'Credit risk and securitization', en:'<ul><li><strong>Credit risk</strong> = expected loss = probability of default × loss given default (LGD = 1 − recovery rate). Spreads widen when default risk or risk aversion rises — spread risk hurts even without default.</li><li>Ratings: investment grade (BBB−/Baa3 and above) vs high yield. Beware: ratings lag markets.</li><li>Analysis frameworks: the <strong>4 Cs</strong> — Capacity, Collateral, Covenants, Character. Key ratios: leverage (debt/EBITDA) and coverage (EBIT/interest).</li><li><strong>Securitization:</strong> a sponsor sells assets (mortgages, auto loans, receivables) to a bankruptcy-remote <strong>SPE</strong>, which issues tranched bonds. Benefits: lower funding costs, liquidity, risk transfer. <strong>Tranching</strong> creates a waterfall: senior tranches are paid first; subordinated tranches absorb first losses (credit tranching). MBS carry <strong>prepayment risk</strong>: contraction risk (rates fall → faster prepayment) and extension risk (rates rise → slower prepayment).</li></ul>',
vi:'<ul><li><strong>Rủi ro tín dụng</strong> = tổn thất kỳ vọng = xác suất vỡ nợ × tổn thất khi vỡ nợ (LGD = 1 − tỷ lệ thu hồi). Spread giãn khi rủi ro vỡ nợ hoặc mức e ngại rủi ro tăng — rủi ro spread gây thiệt hại kể cả khi không vỡ nợ.</li><li>Xếp hạng: investment grade (từ BBB−/Baa3 trở lên) vs high yield. Lưu ý: xếp hạng thường đi sau thị trường.</li><li>Khung phân tích: <strong>4 chữ C</strong> — Capacity (năng lực trả nợ), Collateral (tài sản bảo đảm), Covenants (cam kết), Character (uy tín). Chỉ số chính: đòn bẩy (nợ/EBITDA) và khả năng chi trả (EBIT/lãi vay).</li><li><strong>Chứng khoán hóa:</strong> bên khởi tạo bán tài sản (khoản vay mua nhà, vay ô tô, phải thu) cho <strong>SPE</strong> tách biệt phá sản, SPE phát hành trái phiếu chia tầng. Lợi ích: chi phí vốn thấp hơn, thanh khoản, chuyển giao rủi ro. <strong>Tranching</strong> tạo "thác nước": tầng senior nhận tiền trước; tầng subordinated chịu lỗ đầu tiên. MBS có <strong>rủi ro trả nợ trước hạn</strong>: contraction risk (lãi giảm → trả trước nhanh) và extension risk (lãi tăng → trả trước chậm).</li></ul>'}
], formulas:[
['Bond price','P = Σ C/(1+y)^t + F/(1+y)^n',''],

['Duration estimate','%ΔP ≈ −ModDur × Δy',''],

['Current yield','Annual coupon / Price','']
]}
],

quiz:[
{q:'A bond has a modified duration of 7.0 and annual convexity of 90. If its yield falls by 100 bps, the estimated percentage price change is closest to:', opts:['+7.00%','+7.45%','+6.55%'], ans:1,
en:'B is correct. %ΔP ≈ −7.0 × (−0.01) + 0.5 × 90 × (−0.01)² = +7.0% + 0.45% = +7.45%. Convexity adds to the gain when yields fall and cushions the loss when yields rise.',
vi:'Đáp án B. %ΔP ≈ −7.0 × (−0.01) + 0.5 × 90 × (0.01)² = +7.0% + 0.45% = +7.45%. Convexity cộng thêm khi lợi suất giảm và giảm bớt thiệt hại khi lợi suất tăng.'},
{q:'A 10-year bond with a 4% annual coupon trades at a YTM of 5%. The bond most likely trades at:', opts:['a premium to par.','par value.','a discount to par.'], ans:2,
en:'C is correct. When the coupon rate (4%) is below the market discount rate (5%), the fixed coupons are insufficient at market rates, so the bond must price below par — a discount — to offer the market yield.',
vi:'Đáp án C. Khi coupon (4%) thấp hơn lãi suất thị trường (5%), các coupon cố định không đủ hấp dẫn, nên trái phiếu phải giao dịch dưới mệnh giá (discount) để đem lại lợi suất thị trường.'},
{q:'Which bond has the greatest interest rate sensitivity (highest duration), all else equal?', opts:['High coupon, short maturity','Zero coupon, long maturity','High coupon, long maturity'], ans:1,
en:'B is correct. Duration increases with maturity and decreases with coupon. A long-maturity zero-coupon bond pays everything at the end, so its Macaulay duration equals its (long) maturity — the maximum sensitivity.',
vi:'Đáp án B. Duration tăng theo kỳ hạn và giảm khi coupon cao. Zero-coupon kỳ hạn dài trả toàn bộ tiền vào cuối kỳ nên Macaulay duration bằng đúng kỳ hạn (dài) — độ nhạy tối đa.'},
{q:'For a callable bond when interest rates fall well below the coupon rate, the bond most likely exhibits:', opts:['negative convexity.','increased positive convexity.','a price rising without limit.'], ans:0,
en:'A is correct. As rates fall, the call becomes more likely and the price is capped near the call price — the price-yield curve bends the "wrong" way, i.e., negative convexity. The investor’s upside is limited while downside remains.',
vi:'Đáp án A. Khi lãi suất giảm sâu, khả năng bị call tăng và giá bị chặn gần giá call — đường giá–lợi suất cong "ngược", tức convexity âm. Nhà đầu tư bị giới hạn phần tăng giá trong khi phần giảm vẫn nguyên.'},
{q:'A bond has a 2% probability of default and an expected recovery rate of 60%. Its expected loss as a percentage of exposure is closest to:', opts:['0.8%','1.2%','2.0%'], ans:0,

/* ============ 08 DERIVATIVES ============ */
{
id:'deriv', num:'08', name:'Derivatives', vi:'Công cụ phái sinh', w:[5,8],
blurb:'Forwards, futures, swaps, and options: features, payoff profiles, arbitrage-based pricing, and put–call parity.',
intro:{
en:'Derivatives at Level 1 is conceptual: know the instruments (forwards, futures, swaps, options), who bears which risk, and the no-arbitrage logic that prices them. The most testable pieces: forward pricing via cost of carry, option moneyness and payoff diagrams, and put–call parity.',
vi:'Derivatives ở Level 1 thiên về khái niệm: nắm các công cụ (forward, futures, swap, option), ai chịu rủi ro gì, và logic không-arbitrage dùng để định giá. Phần dễ ra thi nhất: định giá forward theo chi phí lưu giữ (cost of carry), trạng thái lời/lỗ (moneyness) và đồ thị payoff của quyền chọn, và ngang giá quyền chọn mua–bán (put–call parity).'
},
modules:[
{ title:'Forward Commitments', sections:[
{h:'Forwards, futures, and swaps', en:'<ul><li>A <strong>forward</strong> obligates both parties to trade an asset at a set price on a future date. OTC, customized, counterparty risk, no cash changes hands at initiation (value = 0 at start; the forward <em>price</em> is set so this holds).</li><li><strong>Futures</strong> are standardized, exchange-traded forwards with a clearinghouse guarantee, daily <strong>mark-to-market</strong> and margin. This removes most counterparty risk.</li><li>A <strong>swap</strong> is a series of forward-like exchanges. In a plain-vanilla interest rate swap, one side pays fixed and receives floating on a notional amount; only net payments are exchanged. The fixed rate is set so the swap has zero value at initiation. Pay-fixed = like being short bonds / hedging against rising rates.</li><li><strong>Pricing by no-arbitrage (cost of carry):</strong> F₀ = S₀ × (1 + r)<sup>T</sup> + FV(costs) − FV(benefits). Benefits (dividends, coupons, convenience yield) lower the forward price; carrying costs (storage, insurance) raise it. If the market forward deviates, cash-and-carry (or reverse) arbitrage forces it back.</li></ul>',
vi:'<ul><li><strong>Forward</strong> ràng buộc cả hai bên giao dịch tài sản tại mức giá xác định vào ngày tương lai. OTC, tùy chỉnh, có rủi ro đối tác, không trao tiền lúc khởi tạo (giá trị = 0 tại thời điểm đầu; <em>giá</em> forward được đặt để điều này đúng).</li><li><strong>Futures</strong> là forward chuẩn hóa, giao dịch trên sàn với trung tâm thanh toán bù trừ bảo lãnh, <strong>mark-to-market</strong> hằng ngày và ký quỹ → gần như loại bỏ rủi ro đối tác.</li><li><strong>Swap</strong> là chuỗi các trao đổi kiểu forward. Trong swap lãi suất chuẩn, một bên trả cố định – nhận thả nổi trên vốn danh nghĩa; chỉ trao đổi phần chênh lệch ròng. Lãi suất cố định được đặt để swap có giá trị 0 lúc khởi tạo. Trả cố định = giống bán khống trái phiếu / phòng hộ trước lãi suất tăng.</li><li><strong>Định giá theo không-arbitrage (cost of carry):</strong> F₀ = S₀ × (1 + r)<sup>T</sup> + FV(chi phí) − FV(lợi ích). Lợi ích (cổ tức, coupon, convenience yield) làm giảm giá forward; chi phí lưu giữ (kho bãi, bảo hiểm) làm tăng. Nếu giá thị trường lệch, arbitrage cash-and-carry (hoặc ngược lại) sẽ kéo về.</li></ul>'}
]},
{ title:'Options & Put–Call Parity', sections:[
{h:'Option basics and moneyness', en:'<ul><li>A <strong>call</strong> gives the buyer the <em>right</em> (not obligation) to buy at the strike X; a <strong>put</strong> the right to sell. The buyer pays a <strong>premium</strong>; the seller (writer) keeps the premium and bears the obligation.</li><li>Payoffs at expiry: call buyer = max(0, S − X); put buyer = max(0, X − S). Profits subtract/add the premium. Maximum loss for a buyer = premium; maximum loss for a call writer = unlimited; for a put writer = X − premium.</li><li><strong>Moneyness:</strong> a call is in-the-money when S &gt; X; a put when S &lt; X. Option value = <strong>intrinsic value + time value</strong>; time value erodes to zero at expiry (theta decay).</li><li>Value drivers: calls rise with the underlying price, volatility, time (usually), and rates; fall with strike and expected dividends. Puts are the mirror image (but higher rates <em>reduce</em> put values). <em>Higher volatility raises both call and put values</em> — payoffs are asymmetric.</li><li>European options can be exercised only at expiry; American any time (worth at least as much).</li></ul>',
vi:'<ul><li><strong>Call</strong> cho người mua <em>quyền</em> (không phải nghĩa vụ) mua tại giá thực hiện X; <strong>put</strong> là quyền bán. Người mua trả <strong>phí quyền chọn</strong>; người bán nhận phí và gánh nghĩa vụ.</li><li>Payoff khi đáo hạn: mua call = max(0, S − X); mua put = max(0, X − S). Lợi nhuận cộng/trừ phí. Lỗ tối đa của người mua = phí; lỗ tối đa của người bán call = vô hạn; người bán put = X − phí.</li><li><strong>Moneyness:</strong> call ITM khi S &gt; X; put ITM khi S &lt; X. Giá trị quyền chọn = <strong>giá trị nội tại + giá trị thời gian</strong>; giá trị thời gian mòn về 0 khi đáo hạn.</li><li>Yếu tố tác động: call tăng theo giá tài sản, độ biến động, thời gian (thường), lãi suất; giảm theo giá thực hiện và cổ tức kỳ vọng. Put ngược lại (nhưng lãi suất cao làm <em>giảm</em> giá put). <em>Biến động cao làm tăng giá cả call lẫn put</em> — vì payoff bất đối xứng.</li><li>Quyền chọn kiểu Âu chỉ thực hiện lúc đáo hạn; kiểu Mỹ bất kỳ lúc nào (giá trị ít nhất bằng kiểu Âu).</li></ul>'},
{h:'Put–call parity', en:'<p>For European options on the same underlying, strike, and expiry:</p><p><strong>c + X/(1+r)<sup>T</sup> = p + S₀</strong></p><p>Left side = <em>fiduciary call</em> (call + riskless bond paying X); right side = <em>protective put</em> (stock + put). Both give the same payoff — max(S<sub>T</sub>, X) — so they must cost the same, or arbitrage exists. Rearranged, parity lets you create <strong>synthetic</strong> positions: e.g., synthetic call = p + S₀ − X/(1+r)<sup>T</sup>. Put–call–forward parity replaces the stock with a forward: c + X/(1+r)<sup>T</sup> = p + F₀/(1+r)<sup>T</sup>.</p>',
vi:'<p>Với quyền chọn kiểu Âu cùng tài sản cơ sở, cùng giá thực hiện và ngày đáo hạn:</p><p><strong>c + X/(1+r)<sup>T</sup> = p + S₀</strong></p><p>Vế trái = <em>fiduciary call</em> (call + trái phiếu phi rủi ro trả X); vế phải = <em>protective put</em> (cổ phiếu + put). Cả hai cho cùng payoff — max(S<sub>T</sub>, X) — nên phải có cùng giá, nếu không sẽ có arbitrage. Biến đổi công thức cho phép tạo vị thế <strong>tổng hợp (synthetic)</strong>: VD call tổng hợp = p + S₀ − X/(1+r)<sup>T</sup>. Ngang giá put–call–forward thay cổ phiếu bằng forward.</p>'}
], formulas:[
['Forward price','F0 = S0(1+r)^T + FV(costs) − FV(benefits)','Cost of carry model'],

]}
],

intro:{

modules:[
{ title:'Categories & Structures', sections:[
{h:'The landscape', en:'<ul><li><strong>Private capital:</strong> private equity (leveraged buyouts, venture capital, growth equity) and private debt (direct lending, mezzanine, distressed). VC stages: seed → early → later → exit via IPO or trade sale. PE funds are closed-end limited partnerships: the <strong>GP</strong> manages, <strong>LPs</strong> commit capital drawn down over time; the <strong>J-curve</strong> describes early negative returns before exits generate gains.</li><li><strong>Real estate:</strong> direct ownership, private funds, and <strong>REITs</strong> (liquid, exchange-traded, income distributing). Returns from income + appreciation; appraisal-based indices smooth volatility and understate risk.</li><li><strong>Infrastructure:</strong> long-lived assets (toll roads, airports, utilities) — greenfield (build) vs brownfield (existing); stable, often inflation-linked cash flows.</li><li><strong>Natural resources:</strong> commodities (via futures — return = collateral yield + roll yield + spot change; contango hurts long roll returns, backwardation helps), plus farmland and timberland.</li><li><strong>Hedge funds:</strong> lightly regulated pooled vehicles using leverage, shorting, derivatives. Strategy families: equity (long/short, market neutral), event-driven (merger arbitrage, distressed), relative value, macro/CTA. Often have lock-ups, gates, and redemption notice periods.</li><li><strong>Digital assets:</strong> cryptocurrencies and tokens on distributed ledgers; high volatility, evolving regulation and custody risk.</li></ul>',
vi:'<ul><li><strong>Vốn tư nhân:</strong> private equity (LBO, đầu tư mạo hiểm, growth equity) và private debt (cho vay trực tiếp, mezzanine, nợ khó khăn). Các vòng VC: seed → early → later → thoái vốn qua IPO hoặc bán cho đối tác. Quỹ PE là hợp danh hữu hạn đóng: <strong>GP</strong> quản lý, <strong>LP</strong> cam kết vốn được rút dần; <strong>đường cong chữ J</strong> mô tả lợi suất âm giai đoạn đầu trước khi các thương vụ thoái vốn tạo lãi.</li><li><strong>Bất động sản:</strong> sở hữu trực tiếp, quỹ tư nhân, và <strong>REITs</strong> (thanh khoản, niêm yết, chia thu nhập). Lợi nhuận = thu nhập + tăng giá; chỉ số theo định giá thẩm định làm mượt biến động, che giấu rủi ro.</li><li><strong>Hạ tầng:</strong> tài sản tuổi thọ dài (đường thu phí, sân bay, tiện ích) — greenfield (xây mới) vs brownfield (đang vận hành); dòng tiền ổn định, thường gắn lạm phát.</li><li><strong>Tài nguyên:</strong> hàng hóa (qua futures — lợi suất = lãi tài sản thế chấp + roll yield + thay đổi giá spot; contango bất lợi cho vị thế long khi đảo hợp đồng, backwardation có lợi), đất nông nghiệp, rừng.</li><li><strong>Hedge fund:</strong> quỹ ít bị quản lý, dùng đòn bẩy, bán khống, phái sinh. Nhóm chiến lược: cổ phiếu (long/short, trung lập thị trường), theo sự kiện (arbitrage sáp nhập, nợ khó khăn), giá trị tương đối, vĩ mô/CTA. Thường có lock-up, gate, thời hạn báo trước khi rút vốn.</li><li><strong>Tài sản số:</strong> tiền mã hóa và token trên sổ cái phân tán; biến động cao, quy định đang định hình, rủi ro lưu ký.</li></ul>'}
]},
{ title:'Fees & Performance', sections:[
{h:'Hedge fund fee mechanics', en:'<p>Typical structure: a <strong>management fee</strong> (e.g., 2% of AUM) plus an <strong>incentive fee</strong> (e.g., 20% of profits). Variations that matter for calculations:</p><ul><li>Incentive fee on gross gains vs on gains <em>net of the management fee</em>.</li><li><strong>Hurdle rate:</strong> incentive fee applies only to returns above a threshold — <em>hard</em> hurdle (fee on excess over hurdle only) vs <em>soft</em> hurdle (fee on the whole gain once the hurdle is beaten).</li><li><strong>High-water mark:</strong> no incentive fee until the fund recovers past its previous peak NAV — prevents paying twice for the same gains.</li></ul><p>Performance measurement caveats: self-reported databases suffer <strong>survivorship and backfill bias</strong>; illiquid assets show <strong>smoothed returns</strong> → understated volatility and correlation → overstated Sharpe ratios. Alternatives are added to portfolios mainly for diversification and potentially higher returns from illiquidity premiums.</p>',
vi:'<p>Cấu trúc điển hình: <strong>phí quản lý</strong> (VD 2% AUM) + <strong>phí thưởng</strong> (VD 20% lợi nhuận). Các biến thể quan trọng khi tính toán:</p><ul><li>Phí thưởng tính trên lãi gộp hay lãi <em>sau khi trừ phí quản lý</em>.</li><li><strong>Hurdle rate:</strong> phí thưởng chỉ áp cho phần vượt ngưỡng — <em>hard</em> hurdle (chỉ tính trên phần vượt) vs <em>soft</em> hurdle (vượt ngưỡng thì tính trên toàn bộ lãi).</li><li><strong>High-water mark:</strong> không thu phí thưởng cho tới khi NAV vượt đỉnh cũ — tránh trả phí hai lần cho cùng một khoản lãi.</li></ul><p>Lưu ý đo lường: cơ sở dữ liệu tự khai báo bị <strong>survivorship bias và backfill bias</strong>; tài sản kém thanh khoản có <strong>lợi suất bị làm mượt</strong> → biến động và tương quan bị đánh giá thấp → Sharpe ratio bị thổi phồng. Alternatives được đưa vào danh mục chủ yếu để đa dạng hóa và hưởng phần bù kém thanh khoản.</p>'}
], formulas:[
['Total HF fee (2&20, net)','Fee = 2%×AUM + 20%×max(0, gain − mgmt fee − hurdle)','Check the question wording carefully'],
['Commodity futures return','Collateral yield + roll yield + spot price change','Roll yield > 0 in backwardation']
]}
],

quiz:[
{q:'A hedge fund with $100 million in assets charges "2 and 20" with the incentive fee calculated net of the management fee and no hurdle. Gross return for the year is 15%. Total fees are closest to:', opts:['$4.6 million','$5.0 million','$5.6 million'], ans:0,
en:'A is correct. Management fee = 2% × 100 = $2.0m. Gross gain = $15m; gain net of management fee = 15 − 2 = $13m. Incentive = 20% × 13 = $2.6m. Total = 2.0 + 2.6 = $4.6m.',
vi:'Đáp án A. Phí quản lý = 2% × 100 = 2 triệu. Lãi gộp = 15 triệu; lãi sau phí quản lý = 13 triệu. Phí thưởng = 20% × 13 = 2.6 triệu. Tổng = 4.6 triệu USD.'},
{q:'The primary purpose of a high-water mark provision is to:', opts:['guarantee investors a minimum return.','prevent the manager from earning incentive fees twice on the same gains.','reduce the management fee in loss years.'], ans:1,
en:'B is correct. After a drawdown, incentive fees resume only once NAV exceeds its previous peak, so investors do not pay again for merely recovering earlier losses.',
vi:'Đáp án B. Sau khi quỹ sụt giảm, phí thưởng chỉ được thu lại khi NAV vượt đỉnh cũ, nên nhà đầu tư không phải trả phí lần nữa chỉ vì quỹ phục hồi khoản lỗ trước đó.'},
{q:'A long-only investor rolling commodity futures in a market in contango will most likely experience:', opts:['positive roll yield.','negative roll yield.','no roll yield.'], ans:1,
en:'B is correct. In contango, longer-dated futures cost more than expiring ones; selling the cheap expiring contract and buying the expensive deferred contract produces a negative roll yield.',
vi:'Đáp án B. Trong contango, hợp đồng kỳ hạn xa đắt hơn hợp đồng sắp đáo hạn; bán hợp đồng rẻ để mua hợp đồng đắt tạo ra roll yield âm.'},
{q:'Appraisal-based valuation of private real estate most likely causes reported returns to exhibit:', opts:['overstated volatility.','understated volatility and correlations with other assets.','no systematic bias.'], ans:1,
en:'B is correct. Appraisals adjust slowly and smooth reported values, so measured volatility and correlations are biased downward — making the asset class look like a better diversifier (and its Sharpe ratio look better) than it truly is.',
vi:'Đáp án B. Định giá thẩm định điều chỉnh chậm và làm mượt giá trị, nên biến động và tương quan đo được bị thấp hơn thực tế — khiến lớp tài sản trông có vẻ đa dạng hóa tốt hơn (và Sharpe cao hơn) so với thực chất.'}
]
},
/* ============ 10 PORTFOLIO MANAGEMENT ============ */
{
id:'pm', num:'10', name:'Portfolio Management', vi:'Quản lý danh mục đầu tư', w:[8,12],
blurb:'Risk & return, diversification, the CAL/CML, CAPM & the SML, portfolio planning (IPS), risk management and behavioral biases.',
intro:{
en:'Portfolio Management ties the curriculum together: measuring risk and return, the mathematics of diversification, modern portfolio theory (efficient frontier, CML), the CAPM and the SML, building an Investment Policy Statement, and behavioral finance. The CML-vs-SML distinction and CAPM expected-return calculations are exam staples.',
vi:'Portfolio Management kết nối toàn bộ chương trình: đo lường rủi ro – lợi nhuận, toán học của đa dạng hóa, lý thuyết danh mục hiện đại (đường biên hiệu quả, CML), mô hình CAPM và đường SML, xây dựng IPS, và tài chính hành vi. Phân biệt CML vs SML và tính lợi suất kỳ vọng theo CAPM là dạng bài "ruột" của đề thi.'
},
modules:[
{ title:'Risk, Return & Diversification', sections:[
{h:'Portfolio risk and the power of correlation', en:'<p>Portfolio expected return is the weighted average of asset returns — but portfolio <em>risk is less than</em> the weighted average of standard deviations whenever correlation ρ &lt; 1. For two assets:</p><p><strong>σ<sub>p</sub>² = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρσ₁σ₂</strong></p><p>The lower the correlation, the greater the diversification benefit; with ρ = −1, risk can be eliminated entirely. Diversification removes <strong>unsystematic (firm-specific) risk</strong>; <strong>systematic (market) risk</strong> remains. Because unsystematic risk can be diversified away for free, <em>markets only reward systematic risk</em> — the central message of the CAPM. Risk aversion shapes each investor’s optimal point: utility U = E(R) − ½Aσ² (A = risk aversion coefficient).</p>',
vi:'<p>Lợi suất kỳ vọng danh mục là bình quân gia quyền lợi suất tài sản — nhưng <em>rủi ro danh mục nhỏ hơn</em> bình quân gia quyền độ lệch chuẩn khi tương quan ρ &lt; 1. Với hai tài sản:</p><p><strong>σ<sub>p</sub>² = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρσ₁σ₂</strong></p><p>Tương quan càng thấp, lợi ích đa dạng hóa càng lớn; ρ = −1 có thể triệt tiêu hoàn toàn rủi ro. Đa dạng hóa loại bỏ <strong>rủi ro phi hệ thống (đặc thù doanh nghiệp)</strong>; <strong>rủi ro hệ thống (thị trường)</strong> vẫn còn. Vì rủi ro phi hệ thống có thể loại bỏ miễn phí nên <em>thị trường chỉ trả công cho rủi ro hệ thống</em> — thông điệp trung tâm của CAPM. Mức e ngại rủi ro quyết định điểm tối ưu của mỗi nhà đầu tư: U = E(R) − ½Aσ².</p>'},
{h:'Efficient frontier, CAL and CML', en:'<ul><li>The <strong>minimum-variance frontier</strong> plots the lowest-risk portfolio for each return level; the upper half is the <strong>efficient frontier</strong>.</li><li>Adding a risk-free asset creates the <strong>capital allocation line (CAL)</strong>; the best CAL is tangent to the efficient frontier at the <strong>optimal risky portfolio</strong>.</li><li>If all investors share the same expectations, that tangency portfolio is the <strong>market portfolio</strong> and the CAL becomes the <strong>capital market line (CML)</strong>: E(R<sub>p</sub>) = R<sub>f</sub> + σ<sub>p</sub> × [E(R<sub>m</sub>) − R<sub>f</sub>]/σ<sub>m</sub>. Points right of the market portfolio imply borrowing (leverage).</li><li><strong>CML vs SML:</strong> the CML uses <em>total risk (σ)</em> and holds only for efficient portfolios; the <strong>SML</strong> uses <em>systematic risk (β)</em> and applies to <em>every</em> asset and portfolio, fairly priced or not.</li></ul>',
vi:'<ul><li><strong>Đường biên phương sai tối thiểu</strong> vẽ danh mục rủi ro thấp nhất cho từng mức lợi suất; nửa trên là <strong>đường biên hiệu quả</strong>.</li><li>Thêm tài sản phi rủi ro tạo ra <strong>đường phân bổ vốn (CAL)</strong>; CAL tốt nhất tiếp xúc đường biên hiệu quả tại <strong>danh mục rủi ro tối ưu</strong>.</li><li>Nếu mọi nhà đầu tư có cùng kỳ vọng, danh mục tiếp điểm là <strong>danh mục thị trường</strong> và CAL trở thành <strong>CML</strong>: E(R<sub>p</sub>) = R<sub>f</sub> + σ<sub>p</sub> × [E(R<sub>m</sub>) − R<sub>f</sub>]/σ<sub>m</sub>. Các điểm bên phải danh mục thị trường hàm ý đi vay (đòn bẩy).</li><li><strong>CML vs SML:</strong> CML dùng <em>tổng rủi ro (σ)</em> và chỉ đúng cho danh mục hiệu quả; <strong>SML</strong> dùng <em>rủi ro hệ thống (β)</em> và áp dụng cho <em>mọi</em> tài sản/danh mục, dù được định giá đúng hay sai.</li></ul>'}
]},
{ title:'CAPM, Performance Measures & the IPS', sections:[
{h:'CAPM and the SML', en:'<p><strong>E(R<sub>i</sub>) = R<sub>f</sub> + β<sub>i</sub>[E(R<sub>m</sub>) − R<sub>f</sub>]</strong>. Beta = Cov(R<sub>i</sub>,R<sub>m</sub>)/σ<sub>m</sub>² measures sensitivity to market moves. Interpretation: if a security’s <em>forecast</em> return lies <strong>above the SML</strong>, it offers more than required for its beta → <strong>undervalued</strong> (buy); below the SML → overvalued. CAPM assumptions (frictionless markets, homogeneous expectations, all investors mean-variance optimizers) are unrealistic but produce a powerful, testable benchmark.</p><p><strong>Performance ratios:</strong></p><ul><li><strong>Sharpe</strong> = (R<sub>p</sub> − R<sub>f</sub>)/σ<sub>p</sub> — total risk; use when the portfolio is the investor’s whole wealth.</li><li><strong>Treynor</strong> = (R<sub>p</sub> − R<sub>f</sub>)/β<sub>p</sub> — systematic risk; for well-diversified portfolios.</li><li><strong>Jensen’s alpha</strong> = R<sub>p</sub> − [R<sub>f</sub> + β(R<sub>m</sub> − R<sub>f</sub>)] — return above the CAPM requirement.</li><li><strong>M²</strong> — Sharpe re-expressed in percentage terms versus the market.</li></ul>',
vi:'<p><strong>E(R<sub>i</sub>) = R<sub>f</sub> + β<sub>i</sub>[E(R<sub>m</sub>) − R<sub>f</sub>]</strong>. Beta = Cov(R<sub>i</sub>,R<sub>m</sub>)/σ<sub>m</sub>² đo độ nhạy với biến động thị trường. Diễn giải: nếu lợi suất <em>dự báo</em> của chứng khoán nằm <strong>trên SML</strong> → được kỳ vọng cao hơn mức yêu cầu theo beta → <strong>đang bị định giá thấp</strong> (nên mua); dưới SML → định giá cao. Các giả định CAPM (thị trường không ma sát, kỳ vọng đồng nhất…) phi thực tế nhưng tạo ra chuẩn so sánh mạnh và kiểm định được.</p><p><strong>Chỉ số hiệu quả:</strong> Sharpe = (R<sub>p</sub> − R<sub>f</sub>)/σ<sub>p</sub> (tổng rủi ro — dùng khi danh mục là toàn bộ tài sản); Treynor = (R<sub>p</sub> − R<sub>f</sub>)/β<sub>p</sub> (rủi ro hệ thống — cho danh mục đã đa dạng hóa tốt); Jensen’s alpha = phần lợi suất vượt yêu cầu CAPM; M² = Sharpe quy về đơn vị %.</p>'},
{h:'The Investment Policy Statement and behavioral biases', en:'<p>The <strong>IPS</strong> is the governing document of the client relationship. Objectives: <strong>risk</strong> (ability vs willingness to take risk — use the <em>lower</em> of the two) and <strong>return</strong>. Constraints — remember <strong>LLTTU</strong>: Liquidity, Legal/regulatory, Time horizon, Taxes, Unique circumstances. Strategic asset allocation implements the IPS; rebalancing keeps weights within corridors.</p><p><strong>Behavioral biases:</strong> cognitive <em>belief-perseverance</em> errors (conservatism, confirmation, representativeness, illusion of control, hindsight), <em>processing</em> errors (anchoring, mental accounting, framing, availability), and <strong>emotional biases</strong> (loss aversion, overconfidence, self-control, status quo, endowment, regret aversion). Cognitive errors are best corrected with information and education; emotional biases are usually <em>accommodated</em> rather than corrected. Market-wide effects: herding, bubbles, momentum.</p>',
vi:'<p><strong>IPS</strong> là văn bản "hiến pháp" của quan hệ khách hàng. Mục tiêu: <strong>rủi ro</strong> (khả năng vs mức sẵn lòng chấp nhận rủi ro — lấy mức <em>thấp hơn</em>) và <strong>lợi nhuận</strong>. Ràng buộc — nhớ <strong>LLTTU</strong>: Thanh khoản, Pháp lý, Thời gian đầu tư, Thuế, Hoàn cảnh đặc thù. Phân bổ tài sản chiến lược hiện thực hóa IPS; tái cân bằng giữ tỷ trọng trong biên độ.</p><p><strong>Thiên lệch hành vi:</strong> lỗi nhận thức dạng <em>bám giữ niềm tin</em> (bảo thủ, thiên kiến xác nhận, đại diện, ảo tưởng kiểm soát, hồi tưởng), lỗi <em>xử lý thông tin</em> (neo, kế toán tâm lý, đóng khung, sẵn có), và <strong>thiên lệch cảm xúc</strong> (sợ thua lỗ, quá tự tin, thiếu tự chủ, giữ nguyên hiện trạng, sở hữu, sợ hối tiếc). Lỗi nhận thức sửa được bằng thông tin và giáo dục; thiên lệch cảm xúc thường phải <em>thích nghi</em> thay vì sửa. Hiệu ứng toàn thị trường: bầy đàn, bong bóng, momentum.</p>'}
], formulas:[
['CAPM / SML','E(Ri) = Rf + βi(E(Rm) − Rf)',''],
['Beta','βi = Cov(Ri,Rm) / σm² = ρi,m σi/σm',''],

]}
],

quiz:[
{q:'The risk-free rate is 3%, the expected market return is 9%, and a stock’s beta is 1.5. According to the CAPM, the stock’s required return is closest to:', opts:['12.0%','13.5%','9.0%'], ans:0,
en:'A is correct. E(R) = 3% + 1.5 × (9% − 3%) = 3% + 9% = 12%. A common error is multiplying beta by the market return (1.5 × 9% = 13.5%) instead of the market risk premium.',
vi:'Đáp án A. E(R) = 3% + 1.5 × (9% − 3%) = 12%. Lỗi phổ biến là nhân beta với lợi suất thị trường (13.5%) thay vì với phần bù rủi ro thị trường.'},
{q:'An analyst forecasts a return of 14% for a stock whose CAPM required return is 12%. The stock plots:', opts:['on the SML and is fairly valued.','above the SML and is undervalued.','below the SML and is overvalued.'], ans:1,
en:'B is correct. A forecast return above the CAPM requirement means the stock offers more than compensation for its systematic risk — it plots above the SML and is undervalued (a buy).',
vi:'Đáp án B. Lợi suất dự báo cao hơn mức yêu cầu theo CAPM nghĩa là cổ phiếu đem lại nhiều hơn mức bù đắp cho rủi ro hệ thống — nằm trên SML và đang bị định giá thấp (nên mua).'},
{q:'Which risk measure is most appropriate for evaluating a portfolio that represents only a small, well-diversified part of an investor’s total wealth?', opts:['Sharpe ratio','Treynor ratio','Standard deviation'], ans:1,
en:'B is correct. For a well-diversified component of wealth, only systematic risk matters, so the Treynor ratio (excess return per unit of beta) is appropriate. The Sharpe ratio, based on total risk, suits a portfolio that constitutes the investor’s entire wealth.',
vi:'Đáp án B. Với một phần nhỏ, đã đa dạng hóa tốt của tổng tài sản, chỉ rủi ro hệ thống mới quan trọng, nên dùng Treynor (lợi suất vượt trội trên mỗi đơn vị beta). Sharpe dựa trên tổng rủi ro, phù hợp khi danh mục là toàn bộ tài sản.'},
{q:'A client has a high ability to take risk but a low willingness to take risk. The adviser should most appropriately:', opts:['base the IPS on the client’s ability to take risk.','base the IPS on the lower of the two and seek to educate the client.','average the two into a moderate risk tolerance.'], ans:1,
en:'B is correct. When ability and willingness conflict, the prudent approach is to adopt the lower level of risk in the IPS while educating the client — never simply override the client’s stated willingness.',
vi:'Đáp án B. Khi khả năng và mức sẵn lòng mâu thuẫn, cách thận trọng là lấy mức rủi ro thấp hơn khi lập IPS và giáo dục khách hàng — không được tự ý bỏ qua mức sẵn lòng khách hàng đã nêu.'},
{q:'Two assets have a correlation of +1.0. Combining them in a portfolio most likely provides:', opts:['no diversification benefit.','elimination of systematic risk.','a portfolio standard deviation below the weighted average of the two.'], ans:0,
en:'A is correct. With perfect positive correlation, portfolio standard deviation equals exactly the weighted average of the assets’ standard deviations — no risk reduction. Diversification benefits appear only when ρ < 1.',
vi:'Đáp án A. Với tương quan hoàn hảo dương, độ lệch chuẩn danh mục đúng bằng bình quân gia quyền độ lệch chuẩn hai tài sản — không giảm được rủi ro. Lợi ích đa dạng hóa chỉ xuất hiện khi ρ < 1.'}
]
}
];

/* =====================================================
   RENDERER + APP LOGIC
   ===================================================== */
const MAXW = 20; // scale for weight bars
const $ = s => document.querySelector(s);
const content = $('#content');

/* safe storage (works on GitHub Pages; degrades silently elsewhere) */
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem('cfa1_'+k)); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem('cfa1_'+k, JSON.stringify(v)); }catch(e){} }
};
let progress = store.get('progress') || {}; // {topicId:{done:[moduleIdx], quiz:{qIdx:answerIdx}}}
function saveProgress(){ store.set('progress', progress); }
function tprog(t){
  const p = progress[t.id]||{};
  const doneMods = (p.done||[]).length, totMods = t.modules.length;
  const quizDone = Object.keys(p.quiz||{}).length, totQ = t.quiz.length;
  return {doneMods, totMods, quizDone, totQ};
}

/* ---------- sidebar ---------- */
function renderNav(active){
  let h = '<a class="tlink'+(active==='home'?' active':'')+'" href="#home"><div class="tl-top"><span class="tl-num">⌂</span><span class="tl-name">Home / Tổng quan</span></div></a>';
  TOPICS.forEach(t=>{
    const pr = tprog(t);
    const pct = Math.round(((pr.doneMods/pr.totMods)*0.5 + (pr.quizDone/pr.totQ)*0.5)*100);
    h += '<a class="tlink'+(active===t.id?' active':'')+'" href="#'+t.id+'">'+
      '<div class="tl-top"><span class="tl-num">'+t.num+'</span><span class="tl-name">'+t.name+'</span><span class="tl-w">'+t.w[0]+'–'+t.w[1]+'%</span></div>'+
      '<div class="tl-bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div>'+
      '<div class="tl-prog">'+(pct>0? pct+'% studied' : '')+'</div></a>';
  });
  $('#navlist').innerHTML = h;
}

/* ---------- VI toggle helper ---------- */
function viBlock(vi, label){
  if(!vi) return '';
  return '<button class="vitoggle" onclick="toggleVi(this)" aria-expanded="false"><span class="car">▶</span> '+(label||'Xem tiếng Việt / Vietnamese')+'</button><div class="vi">'+vi+'</div>';
}
window.toggleVi = function(btn){
  const box = btn.nextElementSibling;
  const open = box.classList.toggle('show');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
};

/* ---------- home page ---------- */
function renderHome(){
  let cards = TOPICS.map(t=>'<a class="tcard" href="#'+t.id+'"><div class="row"><h3>'+t.num+' · '+t.name+'</h3><span class="w">'+t.w[0]+'–'+t.w[1]+'%</span></div><p>'+t.blurb+'</p><div class="bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div></a>').join('');
  content.innerHTML =
  '<div class="hero"><div class="eyebrow">CFA Program · Level 1</div>'+
  '<h2>Learn it in English. Understand it in Vietnamese.</h2>'+
  '<p class="lead">All ten Level 1 topics, distilled into study notes, key formulas, exam vocabulary and CFA-style practice questions. The exam is in English — so the material here is too. Tap any green button to reveal a Vietnamese explanation whenever you need it.</p>'+
  '<div class="vi-inline">'+viBlock('<p>Toàn bộ 10 topic của Level 1 được cô đọng thành ghi chú học tập, công thức trọng tâm, từ vựng thi và câu hỏi luyện tập đúng phong cách CFA. Kỳ thi bằng tiếng Anh — nên tài liệu ở đây cũng bằng tiếng Anh. Bấm nút xanh bất kỳ để hiện giải thích tiếng Việt khi cần. Tiến độ học và kết quả làm bài của bạn được lưu ngay trên trình duyệt.</p>','Giới thiệu bằng tiếng Việt')+'</div>'+
  '<div class="examfacts">'+
  '<div class="fact"><b>180 questions</b><span>2 sessions × 90 questions, 2h15m each</span></div>'+
  '<div class="fact"><b>3 options</b><span>Multiple choice A / B / C — no penalty for guessing</span></div>'+
  '<div class="fact"><b>~300 hours</b><span>Typical recommended preparation time</span></div>'+
  '<div class="fact"><b>Calculator</b><span>TI BA II Plus or HP 12C only</span></div>'+
  '</div></div>'+
  '<div class="topicgrid">'+cards+'</div>'+
  '<div class="howto"><h3>How to use this site / Cách dùng</h3><ol>'+
  '<li><strong>Read the English notes first</strong> — train your brain in the exam language. Open the Vietnamese blocks only when a concept does not click.</li>'+
  '<li><strong>Learn the vocabulary tables</strong> — use the "Vocab: quiz me" button (sidebar) to blur the Vietnamese column and self-test.</li>'+
  '<li><strong>Do every practice question</strong> and read both explanations. Wrong answers teach more than right ones.</li>'+
  '<li><strong>Mark modules complete</strong> to track progress per topic in the sidebar.</li>'+
  '<li>Suggested study order: Quant → FSA → Fixed Income → Equity → Corporate → Portfolio → Economics → Derivatives → Alternatives → <strong>Ethics last and again right before the exam</strong>.</li>'+
  '</ol></div>'+
  '<div class="footer">Independent study notes prepared for personal exam preparation. CFA® and Chartered Financial Analyst® are registered trademarks owned by CFA Institute. This site is not affiliated with, endorsed by, or connected to CFA Institute. Always study the official curriculum and Learning Ecosystem as your primary source.</div>';
}

/* ---------- topic page ---------- */
function renderTopic(t){
  const idx = TOPICS.indexOf(t);
  let h = '<div class="thead"><div class="tnum">TOPIC '+t.num+' · EXAM WEIGHT '+t.w[0]+'–'+t.w[1]+'%</div><h2>'+t.name+'</h2><div class="viName">'+t.vi+'</div>'+
    '<div class="weightline"><div class="bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div><b>'+t.w[0]+'–'+t.w[1]+'% of the exam</b></div></div>';
  h += '<div class="intro"><p>'+t.intro.en+'</p>'+viBlock('<p>'+t.intro.vi+'</p>')+'</div>';

  t.modules.forEach((m,mi)=>{
    h += '<div class="module"><div class="mhead"><span class="mnum">MODULE '+t.num+'.'+(mi+1)+'</span><h3>'+m.title+'</h3></div>';
    m.sections.forEach(s=>{
      h += '<div class="section"><h4>'+s.h+'</h4><div class="en">'+s.en+'</div>'+viBlock(s.vi)+'</div>';
    });
    if(m.formulas){
      h += '<div class="fblock"><h4>Key formulas</h4>'+m.formulas.map(f=>'<div class="frow"><span class="fn">'+f[0]+'</span><span class="fx">'+f[1]+'</span>'+(f[2]?'<span class="fnote">'+f[2]+'</span>':'')+'</div>').join('')+'</div>';
    }
    const done = (progress[t.id]&&progress[t.id].done||[]).includes(mi);
    h += '<button class="markdone'+(done?' done':'')+'" onclick="toggleDone(\''+t.id+'\','+mi+',this)">'+(done?'✓ Module completed':'○ Mark module complete')+'</button>';
    h += '</div>';
  });

  h += '<div class="vocab"><h3>Vocabulary · Từ vựng chuyên ngành</h3><div class="hint">Tip: use "Vocab: quiz me" in the sidebar to blur the Vietnamese column and test yourself. Click a blurred cell to peek.</div><table class="vtab"><tr><th>Term</th><th>Definition (EN)</th><th class="viCol">Nghĩa (VI)</th></tr>'+
    t.vocab.map(v=>'<tr><td class="term">'+v[0]+'</td><td>'+v[1]+'</td><td class="viM viCol" onclick="peek(this)">'+v[2]+'</td></tr>').join('')+'</table></div>';

  h += '<div class="quiz"><h3>Practice Questions · Bài tập</h3><div class="hint">CFA format: three options, one correct. Answer, then read the explanation — in both languages if helpful.</div>';
  t.quiz.forEach((q,qi)=>{
    h += '<div class="qcard" id="q_'+t.id+'_'+qi+'"><div class="qnum">QUESTION '+(qi+1)+' OF '+t.quiz.length+'</div><div class="qtext">'+q.q+'</div>'+
      q.opts.map((o,oi)=>'<button class="opt" onclick="answer(\''+t.id+'\','+qi+','+oi+')"><span class="ol">'+'ABC'[oi]+'.</span><span>'+o+'</span></button>').join('')+
      '<div class="expl"><div class="verdict"></div><div class="etext">'+q.en+'</div>'+viBlock('<p>'+q.vi+'</p>','Giải thích tiếng Việt')+'</div></div>';
  });
  h += '<div id="score_'+t.id+'"></div></div>';

  const prev = TOPICS[idx-1], next = TOPICS[idx+1];
  h += '<div class="pagenav">'+
    (prev?'<a href="#'+prev.id+'"><div class="lab">← Previous</div><div class="nm">'+prev.num+' · '+prev.name+'</div></a>':'<a href="#home"><div class="lab">← Back</div><div class="nm">Home</div></a>')+
    (next?'<a class="next" href="#'+next.id+'"><div class="lab">Next →</div><div class="nm">'+next.num+' · '+next.name+'</div></a>':'<a class="next" href="#home"><div class="lab">Finished →</div><div class="nm">Back to overview</div></a>')+
    '</div>';
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
  restoreQuiz(t);
  if(document.body.classList.contains('showAllVi')) openAllVi();
}

/* ---------- interactions ---------- */
window.peek = function(td){ if(document.body.classList.contains('hideViVocab')){ td.style.filter='none'; setTimeout(()=>td.style.filter='',2500);} };

window.toggleDone = function(tid, mi, btn){
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  const arr = progress[tid].done = progress[tid].done||[];
  const i = arr.indexOf(mi);
  if(i>=0){arr.splice(i,1); btn.classList.remove('done'); btn.textContent='○ Mark module complete';}
  else{arr.push(mi); btn.classList.add('done'); btn.textContent='✓ Module completed';}
  saveProgress(); renderNav(location.hash.replace('#','')||'home');
};

window.answer = function(tid, qi, oi){
  const t = TOPICS.find(x=>x.id===tid); const q = t.quiz[qi];
  const card = document.getElementById('q_'+tid+'_'+qi);
  if(card.dataset.answered) return;
  card.dataset.answered = '1';
  const opts = card.querySelectorAll('.opt');
  opts.forEach((b,bi)=>{ b.disabled=true;
    if(bi===q.ans) b.classList.add('correct');
    else if(bi===oi) b.classList.add('wrong');
  });
  const ex = card.querySelector('.expl'); ex.classList.add('show');
  const v = ex.querySelector('.verdict');
  if(oi===q.ans){ v.textContent='✓ Correct'; v.classList.add('ok'); }
  else{ v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans]; v.classList.add('no'); }
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  progress[tid].quiz = progress[tid].quiz||{};
  progress[tid].quiz[qi] = oi;
  saveProgress(); renderNav(tid); showScore(t);
};

function restoreQuiz(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  Object.entries(p.quiz).forEach(([qi,oi])=>{
    const q = t.quiz[qi]; const card = document.getElementById('q_'+t.id+'_'+qi);
    if(!card) return; card.dataset.answered='1';
    card.querySelectorAll('.opt').forEach((b,bi)=>{ b.disabled=true;
      if(bi===q.ans) b.classList.add('correct'); else if(bi===+oi) b.classList.add('wrong');});
    const ex = card.querySelector('.expl'); ex.classList.add('show');
    const v = ex.querySelector('.verdict');
    if(+oi===q.ans){v.textContent='✓ Correct';v.classList.add('ok');}
    else{v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans];v.classList.add('no');}
  });
  showScore(t);
}
function showScore(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  const answered = Object.keys(p.quiz).length;
  if(answered < t.quiz.length) return;
  const correct = Object.entries(p.quiz).filter(([qi,oi])=>t.quiz[qi].ans===+oi).length;
  const el = document.getElementById('score_'+t.id);
  if(el) el.innerHTML = '<div class="qscore">Score: '+correct+' / '+t.quiz.length+' ('+Math.round(correct/t.quiz.length*100)+'%) — '+(correct/t.quiz.length>=0.7?'exam-ready pace, keep going':'review the modules above and retry later')+'</div>';
}

/* ---------- global toggles ---------- */
function openAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.add('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.add('open')); }
function closeAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.remove('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.remove('open')); }
$('#btnAllVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('showAllVi');
  this.classList.toggle('on', on); this.textContent = on ? 'VI: shown' : 'VI: show all';
  on ? openAllVi() : closeAllVi();
});
$('#btnVocabVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('hideViVocab');
  this.classList.toggle('on', on); this.textContent = on ? 'Vocab: revealed on tap' : 'Vocab: quiz me';
});

/* ---------- router ---------- */
function route(){
  const id = location.hash.replace('#','') || 'home';
  const t = TOPICS.find(x=>x.id===id);
  renderNav(t?id:'home');
  t ? renderTopic(t) : renderHome();
  window.scrollTo(0,0);
  $('#side').classList.remove('open');
}
window.addEventListener('hashchange', route);
$('#btnMenu').addEventListener('click', ()=>$('#side').classList.toggle('open'));
route();
</script>
