<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level 1 — Study Hub</title>
<meta name="description" content="CFA Level 1 study hub: English notes with Vietnamese translations, vocabulary, formulas and practice questions for all 10 topics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,500;0,600;0,700;0,800;1,600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2438;
  --ink-soft:#5B6577;
  --paper:#F4F6FB;
  --card:#FFFFFF;
  --line:#E5E9F2;
  --accent:#5457E0;
  --accent-2:#8B5CF6;
  --accent-deep:#4338CA;
  --accent-soft:#EEF0FE;
  --accent-border:#D6DAFB;
  --grad:linear-gradient(120deg,#5457E0,#8B5CF6);
  --amber:#B45309;
  --amber-soft:#FFF8EC;
  --amber-border:#F3E3C4;
  --green:#0F9573;
  --green-soft:#E6F6F0;
  --green-border:#BEE5D8;
  --red:#DC4848;
  --red-soft:#FDECEC;
  --red-border:#F5C8C8;
  --side-bg:#151A33;
  --side-card:#202748;
  --side-line:#2B3358;
  --side-ink:#EDEFFA;
  --side-dim:#8B93B8;
  --side-accent:#A0A6FF;
  --sh-sm:0 1px 2px rgba(21,26,51,.05),0 2px 8px rgba(21,26,51,.04);
  --sh-md:0 2px 4px rgba(21,26,51,.05),0 12px 28px rgba(21,26,51,.07);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --body:'Inter',system-ui,sans-serif;
  --disp:'Be Vietnam Pro','Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
body{font-family:var(--body);color:var(--ink);font-size:16px;line-height:1.7;
  background:var(--paper);
  background-image:radial-gradient(900px 480px at 88% -8%,rgba(139,92,246,.075),transparent 60%),
                   radial-gradient(760px 420px at -10% 22%,rgba(84,87,224,.06),transparent 55%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:#DDDCFC;color:var(--accent-deep)}
h1,h2,h3,h4{letter-spacing:-.015em}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:302px 1fr;min-height:100vh}
.side{background:linear-gradient(178deg,#161C38 0%,#141A33 45%,#171632 100%);color:var(--side-ink);padding:28px 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid rgba(255,255,255,.05)}
.side::-webkit-scrollbar{width:8px}
.side::-webkit-scrollbar-thumb{background:#333C66;border-radius:4px}
.main{min-width:0;padding:0 0 90px}
.main::-webkit-scrollbar{width:10px}
.wrap{max-width:880px;margin:0 auto;padding:0 36px}

/* ---------- sidebar ---------- */
.brand{padding:0 24px 20px;border-bottom:1px solid var(--side-line)}
.brand h1{font-family:var(--disp);font-weight:800;font-size:24px;letter-spacing:-.02em;color:#fff}
.brand h1 span{background:linear-gradient(120deg,#9BA0FF,#C4B5FD);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand p{font-size:12.5px;color:var(--side-dim);margin-top:5px;letter-spacing:.01em}
.globalbar{display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid var(--side-line)}
.gbtn{flex:1;font:600 12px var(--body);color:var(--side-ink);background:var(--side-card);border:1px solid var(--side-line);border-radius:9px;padding:8px 8px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s}
.gbtn:hover{background:#28305A;border-color:#3A4374}
.gbtn:active{transform:scale(.97)}
.gbtn.on{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(93,86,233,.4)}
.navsec{padding:16px 12px 4px}
.navlabel{font:700 10.5px var(--body);letter-spacing:1.6px;text-transform:uppercase;color:var(--side-dim);padding:0 12px 9px}
a.tlink{display:block;text-decoration:none;color:var(--side-ink);padding:9px 12px;border-radius:11px;margin-bottom:3px;border:1px solid transparent;transition:background .15s,border-color .15s}
a.tlink:hover{background:rgba(255,255,255,.055)}
a.tlink.active{background:linear-gradient(120deg,rgba(84,87,224,.32),rgba(139,92,246,.22));border-color:rgba(160,166,255,.28)}
a.tlink:focus-visible,button:focus-visible{outline:2px solid var(--side-accent);outline-offset:2px}
.tl-top{display:flex;align-items:baseline;gap:8px}
.tl-num{font:600 10.5px var(--mono);color:var(--side-dim);min-width:20px}
.tl-name{font-size:13.5px;font-weight:500;flex:1;letter-spacing:-.01em}
.tl-w{font:600 10.5px var(--mono);color:var(--side-accent)}
.tl-bar{height:3px;background:rgba(255,255,255,.09);border-radius:3px;margin:7px 0 0 28px;overflow:hidden}
.tl-bar i{display:block;height:100%;background:linear-gradient(90deg,#6E72F2,#B79CFA);border-radius:3px}
.tl-prog{margin:5px 0 0 28px;font:400 10.5px var(--mono);color:var(--side-dim)}

/* ---------- topbar / mobile ---------- */
.mobilebar{display:none}

/* ---------- home ---------- */
.hero{padding:66px 0 32px;border-bottom:1px solid var(--line)}
.eyebrow{display:inline-block;font:700 11.5px var(--body);letter-spacing:2.2px;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:999px;padding:5px 14px}
.hero h2{font-family:var(--disp);font-size:clamp(34px,5vw,52px);font-weight:800;line-height:1.1;margin:18px 0 16px;max-width:17ch;letter-spacing:-.03em}
.hero p.lead{font-size:17.5px;color:var(--ink-soft);max-width:62ch}
.hero .vi-inline{margin-top:14px}
.examfacts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:34px 0 8px}
.fact{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh-sm)}
.fact b{display:block;font:600 15px var(--mono);color:var(--accent-deep)}
.fact span{font-size:12.5px;color:var(--ink-soft)}
.topicgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:34px 0}
.tcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 20px 16px;text-decoration:none;color:var(--ink);display:block;box-shadow:var(--sh-sm);transition:border-color .18s,transform .18s,box-shadow .18s;overflow:hidden}
.tcard::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--grad);opacity:0;transition:opacity .18s}
.tcard:hover{border-color:var(--accent-border);transform:translateY(-3px);box-shadow:var(--sh-md)}
.tcard:hover::before{opacity:1}
.tcard .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.tcard h3{font-family:var(--disp);font-size:19px;font-weight:700}
.tcard .w{font:600 11.5px var(--mono);color:var(--accent);white-space:nowrap;background:var(--accent-soft);border-radius:999px;padding:3px 9px}
.tcard p{font-size:13.5px;color:var(--ink-soft);margin-top:7px}
.tcard .bar{height:5px;background:var(--paper);border-radius:3px;margin-top:14px;overflow:hidden}
.tcard .bar i{display:block;height:100%;background:var(--grad);border-radius:3px}
.howto{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-bottom:40px;box-shadow:var(--sh-sm)}
.howto h3{font-family:var(--disp);font-size:21px;font-weight:700;margin-bottom:10px}
.howto ol{padding-left:20px;font-size:14.5px;color:var(--ink-soft)}
.howto li{margin-bottom:6px}
.howto li::marker{color:var(--accent);font-weight:700}

/* ---------- topic page ---------- */
.thead{padding:56px 0 28px;border-bottom:1px solid var(--line);position:relative}
.thead .tnum{display:inline-block;font:600 12px var(--mono);color:var(--accent-deep);letter-spacing:1.2px;background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:999px;padding:4px 12px}
.thead h2{font-family:var(--disp);font-size:clamp(30px,4.4vw,44px);font-weight:800;line-height:1.12;margin:14px 0 6px;letter-spacing:-.03em}
.thead h2::after{content:"";display:block;width:56px;height:4px;border-radius:2px;background:var(--grad);margin-top:14px}
.thead .viName{font-size:16.5px;font-weight:500;color:var(--ink-soft);margin-top:12px}
.weightline{display:flex;align-items:center;gap:14px;margin-top:20px}
.weightline .bar{flex:1;max-width:340px;height:7px;background:#E7EAF4;border-radius:4px;overflow:hidden}
.weightline .bar i{display:block;height:100%;background:var(--grad);border-radius:4px}
.weightline b{font:600 13px var(--mono);color:var(--accent-deep)}
.intro{padding:26px 0 4px}
.intro p{max-width:70ch;color:var(--ink-soft)}

/* modules */
.module{margin:38px 0}
.mhead{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-sm);transition:border-color .15s}
.mhead:hover{border-color:var(--accent-border)}
.mhead .mnum{font:700 11px var(--mono);letter-spacing:.5px;color:#fff;background:var(--grad);border-radius:8px;padding:5px 10px;white-space:nowrap;box-shadow:0 2px 8px rgba(93,86,233,.3)}
.mhead h3{font-family:var(--disp);font-size:21px;font-weight:700;letter-spacing:-.02em}
.section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;margin-bottom:14px;box-shadow:var(--sh-sm)}
.section h4{font-family:var(--disp);font-size:15.5px;font-weight:700;margin-bottom:10px;color:var(--accent-deep)}
.section .en p{margin-bottom:10px}
.section .en p:last-child{margin-bottom:0}
.section ul,.section ol{padding-left:22px;margin:8px 0}
.section li{margin-bottom:7px}
.section li::marker{color:var(--accent)}
.section strong{font-weight:700;color:var(--ink)}
.section em{font-style:italic}
table.simple{width:100%;border-collapse:collapse;font-size:14px;margin:10px 0}
table.simple th{text-align:left;font-weight:700;border-bottom:2px solid var(--accent-border);padding:7px 10px 7px 0;color:var(--accent-deep)}
table.simple td{border-bottom:1px solid var(--line);padding:7px 10px 7px 0;vertical-align:top}

/* VI toggle */
.vitoggle{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font:600 12px var(--body);color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:999px;padding:6px 14px;cursor:pointer;transition:background .15s,box-shadow .15s}
.vitoggle:hover{background:#E2E5FD;box-shadow:0 2px 8px rgba(84,87,224,.15)}
.vitoggle .car{transition:transform .2s;font-size:10px}
.vitoggle.open .car{transform:rotate(90deg)}
.vi{display:none;margin-top:12px;padding:15px 18px;border-left:3px solid;border-image:linear-gradient(180deg,#5457E0,#8B5CF6) 1;background:linear-gradient(135deg,#F5F5FE,#F7F4FE);border-radius:0 12px 12px 0;font-size:14.5px;color:#3A3F70}
.vi.show{display:block}
.vi p{margin-bottom:8px}.vi p:last-child{margin-bottom:0}
.vi ul,.vi ol{padding-left:20px;margin:6px 0}
.vi strong{color:#32366B}

/* formulas */
.fblock{background:var(--amber-soft);border:1px solid var(--amber-border);border-radius:16px;padding:20px 24px;margin-bottom:14px;box-shadow:var(--sh-sm)}
.fblock h4{font:700 12px var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.frow{display:grid;grid-template-columns:minmax(150px,220px) 1fr;gap:8px 18px;padding:9px 0;border-bottom:1px dashed #EBD9AE;font-size:14px}
.frow:last-child{border-bottom:none}
.frow .fn{font-weight:600}
.frow .fx{font-family:var(--mono);font-size:13.5px;color:#8A5A10;background:rgba(255,255,255,.6);border-radius:6px;padding:2px 8px;width:fit-content}
.frow .fnote{grid-column:1/-1;font-size:12.5px;color:#9A7433;margin-top:-4px}

/* vocab */
.vocab{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 26px;margin:28px 0;box-shadow:var(--sh-sm)}
.vocab h3{font-family:var(--disp);font-size:20px;font-weight:700;margin-bottom:6px}
.vocab .hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}
table.vtab{width:100%;border-collapse:collapse;font-size:14px}
table.vtab th{text-align:left;font:700 10.5px var(--body);letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);border-bottom:2px solid var(--accent-border);padding:6px 10px 6px 0}
table.vtab td{border-bottom:1px solid var(--line);padding:9px 10px 9px 0;vertical-align:top}
table.vtab tr:hover td{background:#FAFBFE}
table.vtab td.term{font-weight:700;white-space:nowrap}
table.vtab td.viM{color:var(--accent-deep);font-weight:500}
.viCol{transition:filter .15s}
body.hideViVocab .viCol{filter:blur(5px);cursor:pointer}

/* quiz */
.check{background:var(--amber-soft);border:1px solid var(--amber-border);border-radius:16px;padding:16px 18px 8px;margin:20px 0 4px}
.check>h4{font:700 11.5px var(--mono);letter-spacing:1.6px;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.check .qcard{background:var(--card);padding:16px 18px}
.qset{margin:30px 0 8px}
.sethead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:2px solid var(--accent-border);padding-bottom:8px;margin-bottom:16px}
.sethead h4{font-family:var(--disp);font-size:18.5px;font-weight:700}
.setmeta{font:12px var(--mono);color:var(--ink-soft);white-space:nowrap}
.toc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin:0 0 28px;box-shadow:var(--sh-sm)}
.toc h3{font:700 11.5px var(--mono);letter-spacing:1.6px;text-transform:uppercase;color:var(--accent-deep);margin-bottom:10px}
.toc a{display:flex;align-items:baseline;gap:10px;padding:7px 10px;border-radius:10px;color:var(--ink);text-decoration:none;font-size:14px;transition:background .12s,transform .12s}
.toc a:hover{background:var(--accent-soft);transform:translateX(2px)}
.toc .n{font:700 11px var(--mono);color:var(--accent);min-width:34px}
.toc .meta{margin-left:auto;font:11px var(--mono);color:var(--ink-soft);white-space:nowrap}
.toc .donebadge{color:var(--green);font-weight:700}
.toc .group{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.toc .ctl{margin-top:14px;display:flex;gap:8px}
.toc .ctl button{font:600 11px var(--mono);letter-spacing:.5px;padding:6px 12px;border:1px solid var(--line);background:var(--paper);border-radius:999px;cursor:pointer;color:var(--ink-soft);transition:border-color .15s,color .15s,background .15s}
.toc .ctl button:hover{border-color:var(--accent-border);color:var(--accent-deep);background:var(--accent-soft)}
.mhead{cursor:pointer;position:relative}
.mhead .chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ink-soft);transition:transform .18s}
.module.collapsed .chev{transform:translateY(-50%) rotate(-90deg)}
.module.collapsed .mbody{display:none}
.module.collapsed .mhead{opacity:.85}
.subnav{margin:2px 0 10px 14px;border-left:2px solid rgba(160,166,255,.25);padding-left:8px}
.subnav a{display:flex;gap:7px;align-items:baseline;padding:4px 8px;border-radius:8px;color:var(--side-dim);font-size:12px;line-height:1.4;text-decoration:none;transition:color .12s,background .12s}
.subnav a:hover{color:var(--side-ink);background:rgba(255,255,255,.06)}
.subnav .sn{font:700 10px var(--mono);color:var(--side-accent);min-width:26px}
.subnav .sep{margin:6px 8px 4px;border-top:1px dashed rgba(160,166,255,.22)}
.quiz{margin:36px 0 10px}
.quiz>h3{font-family:var(--disp);font-size:23px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
.quiz>.hint{font-size:13px;color:var(--ink-soft);margin-bottom:16px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin-bottom:14px;box-shadow:var(--sh-sm)}
.qcard .qnum{font:700 10.5px var(--mono);color:var(--accent);letter-spacing:1.3px}
.qcard .qtext{font-weight:600;margin:8px 0 14px;line-height:1.55}
.opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:8px;cursor:pointer;font:400 14.5px var(--body);color:var(--ink);transition:border-color .15s,background .15s,transform .1s,box-shadow .15s}
.opt:hover:not(:disabled){border-color:#B9BEF5;background:#fff;box-shadow:0 2px 10px rgba(84,87,224,.09);transform:translateY(-1px)}
.opt:active:not(:disabled){transform:scale(.995)}
.opt .ol{font:700 12px var(--mono);color:var(--ink-soft);margin-top:2px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:1px 7px;transition:inherit}
.opt.correct{background:var(--green-soft);border-color:var(--green)}
.opt.correct .ol{color:#fff;background:var(--green);border-color:var(--green)}
.opt.wrong{background:var(--red-soft);border-color:var(--red)}
.opt.wrong .ol{color:#fff;background:var(--red);border-color:var(--red)}
.opt:disabled{cursor:default}
.expl{display:none;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;font-size:14px}
.expl.show{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.expl .verdict{font-weight:700;margin-bottom:6px}
.expl .verdict.ok{color:var(--green)}
.expl .verdict.no{color:var(--red)}
.expl .vi{margin-top:10px}
.qscore{font:700 13px var(--mono);color:#fff;background:var(--grad);border:none;border-radius:12px;display:inline-block;padding:10px 18px;margin-top:8px;box-shadow:0 4px 14px rgba(93,86,233,.3)}

/* mock test hub + branches */
.mockgroup{margin:28px 0 6px}
.mockgroup-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:2px solid var(--accent-border);padding-bottom:8px;margin-bottom:14px}
.mockgroup-h h3{font-family:var(--disp);font-size:19px;font-weight:800}
.mockcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.mockcard{display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;text-decoration:none;color:var(--ink);box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s,border-color .15s}
.mockcard:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--accent-border)}
.mc-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.mc-ses{font:700 10.5px var(--mono);letter-spacing:.08em;color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:999px;padding:3px 9px;white-space:nowrap}
.mchip{font:600 11px var(--mono);color:var(--ink-soft)}
.mchip.prog{color:var(--amber)}
.mchip.ok{color:var(--green)}
.mchip.no{color:var(--red)}
.mc-name{font-family:var(--disp);font-weight:700;font-size:16.5px;margin-bottom:2px}
.mc-scope{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:8px}
.mc-meta{font:11.5px var(--mono);color:var(--ink-soft);margin-bottom:9px}
.mc-bar{height:5px;border-radius:99px;background:var(--accent-soft);overflow:hidden}
.mc-bar i{display:block;height:100%;background:var(--grad)}
.mockback{display:inline-block;font:600 12.5px var(--body);color:var(--accent-deep);text-decoration:none;margin-bottom:10px}
.mockback:hover{text-decoration:underline}
.mockreset{font:600 12px var(--body);color:var(--red);background:var(--red-soft);border:1px solid var(--red-border);border-radius:99px;padding:5px 12px;cursor:pointer;margin-left:6px}
.mockreset:hover{background:#FBDCDC}
.mocknav-bottom{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:26px 0 4px}
.mocknav-bottom a{font:600 13px var(--body);color:var(--accent-deep);text-decoration:none;background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:10px;padding:8px 14px}
.mocknav-bottom a:hover{background:#E3E6FD}

/* misc */
.pagenav{display:flex;justify-content:space-between;gap:12px;margin:46px 0 0;padding-top:24px;border-top:1px solid var(--line)}
.pagenav a{flex:1;text-decoration:none;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 18px;box-shadow:var(--sh-sm);transition:border-color .15s,transform .15s,box-shadow .15s}
.pagenav a:hover{border-color:var(--accent-border);transform:translateY(-2px);box-shadow:var(--sh-md)}

.pagenav .nm{font-family:var(--disp);font-size:16.5px;font-weight:700;margin-top:3px}
.pagenav a.next{text-align:right}
.markdone{display:inline-flex;align-items:center;gap:8px;font:600 13px var(--body);color:var(--ink-soft);background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:9px 18px;cursor:pointer;margin-top:12px;transition:border-color .15s,color .15s,background .15s,box-shadow .15s}
.markdone:hover{border-color:var(--accent-border);color:var(--accent-deep)}
.markdone.done{color:#fff;border-color:transparent;background:linear-gradient(120deg,#0F9573,#27B08C);box-shadow:0 4px 12px rgba(15,149,115,.3)}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-soft)}

@media (max-width:960px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:292px;z-index:40;transform:translateX(-100%);transition:transform .25s}
  .side.open{transform:none;box-shadow:0 0 70px rgba(10,12,30,.5)}
  .mobilebar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;background:rgba(21,26,51,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
  .mobilebar button{background:var(--side-card);color:#fff;border:1px solid var(--side-line);border-radius:10px;font:600 13px var(--body);padding:8px 14px;cursor:pointer}
  .mobilebar .t{font-family:var(--disp);font-weight:700;font-size:16px}
  .topicgrid{grid-template-columns:1fr}
  .wrap{padding:0 20px}

  table.vtab td.term{white-space:normal}
}

<body>
<div class="app">
  <nav class="side" id="side" aria-label="Topics">
    <div class="brand">
      <h1>CFA<span> L1</span> Study Hub</h1>
      <p>English notes · Vietnamese support · Practice</p>
    </div>
    <div class="globalbar">
      <button class="gbtn" id="btnAllVi" title="Show every Vietnamese translation">VI: show all</button>
      <button class="gbtn" id="btnVocabVi" title="Blur Vietnamese column in vocabulary tables (self-test)">Vocab: quiz me</button>
    </div>
    <div class="navsec">
      <div class="navlabel">Curriculum · 2026 weights</div>
      <div id="navlist"></div>
    </div>
  </nav>

  <div class="main">
    <div class="mobilebar">
      <button id="btnMenu" aria-label="Open menu">☰ Topics</button>
      <div class="t">CFA L1 Study Hub</div>
    </div>
    <div class="wrap" id="content"></div>
  </div>
</div>
<script src="data/01-ethics.js"></script>
<script src="data/02-quant.js"></script>
<script src="data/03-econ.js"></script>
<script src="data/04-fsa.js"></script>
<script src="data/05-corp.js"></script>
<script src="data/06-equity.js"></script>
<script src="data/07-fi.js"></script>
<script src="data/08-deriv.js"></script>
<script src="data/09-alts.js"></script>
<script src="data/10-pm.js"></script>
<script src="data/mocktests.js"></script>
<script>
/* =====================================================
   CFA LEVEL 1 STUDY HUB — content data
   Structure: TOPICS[] -> modules[] -> sections[{h,en,vi}]
   + formulas, vocab, quiz (3-option MCQ, CFA format)
   ===================================================== */
const TOPICS = (window.CFA && window.CFA.topics) || [];

/* ---------- extra question banks: module checks + practice sets ---------- */
const EXTRA = (window.CFA && window.CFA.extra) || {};
const MOCKTESTS = (window.CFA && window.CFA.mocktests) || [];
function getSets(t){
  const ex = (EXTRA[t.id] && EXTRA[t.id].sets) || [];
  return [{name:'Practice Set A', qs:t.quiz}].concat(ex.map((s,i)=>{
    const qs = Array.isArray(s) ? s : s.qs;
    const name = (!Array.isArray(s) && s.name) ? s.name : ('Practice Set '+String.fromCharCode(66+i));
    return {name: name, qs: qs};
  }));
}
function getChecks(t, mi){ return (EXTRA[t.id] && EXTRA[t.id].checks && EXTRA[t.id].checks[mi]) || []; }
function getQ(t, key){
  const m = String(key).match(/^([cs])(\d+)_(\d+)$/);
  if(!m) return t.quiz[+key]; /* legacy stored answers */
  return m[1]==='c' ? getChecks(t,+m[2])[+m[3]] : getSets(t)[+m[2]].qs[+m[3]];
}
function allQCount(t){
  let n = 0; getSets(t).forEach(s=>n+=s.qs.length);
  t.modules.forEach((mm,mi)=>n+=getChecks(t,mi).length);
  return n;
}
function qcardHTML(tid, key, q, num, total){
  return '<div class="qcard" id="q_'+tid+'_'+key+'"><div class="qnum">QUESTION '+num+' OF '+total+'</div><div class="qtext">'+q.q+'</div>'+
    q.opts.map((o,oi)=>'<button class="opt" onclick="answer(\''+tid+'\',\''+key+'\','+oi+')"><span class="ol">'+'ABC'[oi]+'.</span><span>'+o+'</span></button>').join('')+
    '<div class="expl"><div class="verdict"></div><div class="etext">'+q.en+'</div>'+viBlock('<p>'+q.vi+'</p>','Giải thích tiếng Việt')+'</div></div>';
}

/* =====================================================
   RENDERER + APP LOGIC
   ===================================================== */
const MAXW = 20; // scale for weight bars
const $ = s => document.querySelector(s);
const content = $('#content');

/* safe storage (works on GitHub Pages; degrades silently elsewhere) */
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem('cfa1_'+k)); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem('cfa1_'+k, JSON.stringify(v)); }catch(e){} }
};
let progress = store.get('progress') || {}; // {topicId:{done:[moduleIdx], quiz:{qIdx:answerIdx}}}
function saveProgress(){ store.set('progress', progress); }
function tprog(t){
  const p = progress[t.id]||{};
  const doneMods = (p.done||[]).length, totMods = t.modules.length;
  const quizDone = Object.keys(p.quiz||{}).length, totQ = allQCount(t);
  return {doneMods, totMods, quizDone, totQ};
}

/* ---------- sidebar ---------- */
function renderNav(active){
  let h = '<a class="tlink'+(active==='home'?' active':'')+'" href="#home"><div class="tl-top"><span class="tl-num">⌂</span><span class="tl-name">Home / Tổng quan</span></div></a>';
  TOPICS.forEach(t=>{
    const pr = tprog(t);
    const pct = Math.round(((pr.doneMods/pr.totMods)*0.5 + (pr.quizDone/pr.totQ)*0.5)*100);
    h += '<a class="tlink'+(active===t.id?' active':'')+'" href="#'+t.id+'">'+
      '<div class="tl-top"><span class="tl-num">'+t.num+'</span><span class="tl-name">'+t.name+'</span><span class="tl-w">'+t.w[0]+'–'+t.w[1]+'%</span></div>'+
      '<div class="tl-bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div>'+
      '<div class="tl-prog">'+(pct>0? pct+'% studied' : '')+'</div></a>';
    if(active===t.id){
      h += '<div class="subnav">';
      t.modules.forEach((m,mi)=>{
        h += '<a href="#'+t.id+'" onclick="return jumpTo(\'mod_'+t.id+'_'+mi+'\')"><span class="sn">'+t.num+'.'+(mi+1)+'</span><span>'+shortTitle(m.title)+'</span></a>';
      });
      h += '<div class="sep"></div>';
      h += '<a href="#'+t.id+'" onclick="return jumpTo(\'vocab_'+t.id+'\')"><span class="sn">◆</span><span>Vocabulary · Từ vựng</span></a>';
      getSets(t).forEach((st,si)=>{
        h += '<a href="#'+t.id+'" onclick="return jumpTo(\'set_'+t.id+'_'+si+'\')"><span class="sn">'+'ABCDEFGHIJKLMNOP'.charAt(si)+'</span><span>'+st.name+'</span></a>';
      });
      h += '</div>';
    }
  });
  const isMock = String(active).indexOf('mock')===0;
  h += '<a class="tlink'+(isMock?' active':'')+'" href="#mock"><div class="tl-top"><span class="tl-num">✎</span><span class="tl-name">Mock Tests / Đề thi thử</span></div></a>';
  if(isMock && MOCKTESTS.length){
    const cur = String(active).indexOf('mock/')===0 ? parseInt(String(active).slice(5),10) : -1;
    h += '<div class="subnav">';
    h += '<a href="#mock"'+(cur<0?' style="color:var(--side-ink);background:rgba(255,255,255,.06)"':'')+'><span class="sn">☰</span><span>All tests · Danh sách đề</span></a>';
    mockGroups().forEach(g=>{
      h += '<div class="sep"></div>';
      g.tests.forEach(m=>{
        const st = mockStats(m.ti);
        const tag = st.done>=st.total ? ' ✓' : (st.done ? ' · '+st.done+'/'+st.total : '');
        h += '<a href="#mock/'+m.ti+'"'+(cur===m.ti?' style="color:var(--side-ink);background:rgba(255,255,255,.06)"':'')+'><span class="sn">'+g.num+'.'+m.ses+'</span><span>Mock '+g.num+' · Session '+m.ses+tag+'</span></a>';
      });
    });
    h += '</div>';
  }
  $('#navlist').innerHTML = h;
}

/* ---------- VI toggle helper ---------- */
function viBlock(vi, label){
  if(!vi) return '';
  return '<button class="vitoggle" onclick="toggleVi(this)" aria-expanded="false"><span class="car">▶</span> '+(label||'Xem tiếng Việt / Vietnamese')+'</button><div class="vi">'+vi+'</div>';
}
window.toggleVi = function(btn){
  const box = btn.nextElementSibling;
  const open = box.classList.toggle('show');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
};

/* ---------- home page ---------- */
function renderHome(){
  let cards = TOPICS.map(t=>'<a class="tcard" href="#'+t.id+'"><div class="row"><h3>'+t.num+' · '+t.name+'</h3><span class="w">'+t.w[0]+'–'+t.w[1]+'%</span></div><p>'+t.blurb+'</p><div class="bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div></a>').join('');
  content.innerHTML =
  '<div class="hero"><div class="eyebrow">CFA Program · Level 1</div>'+
  '<h2>Learn it in English. Understand it in Vietnamese.</h2>'+
  '<p class="lead">All ten Level 1 topics, distilled into study notes, key formulas, exam vocabulary and CFA-style practice questions. The exam is in English — so the material here is too. Tap any green button to reveal a Vietnamese explanation whenever you need it.</p>'+
  '<div class="vi-inline">'+viBlock('<p>Toàn bộ 10 topic của Level 1 được cô đọng thành ghi chú học tập, công thức trọng tâm, từ vựng thi và câu hỏi luyện tập đúng phong cách CFA. Kỳ thi bằng tiếng Anh — nên tài liệu ở đây cũng bằng tiếng Anh. Bấm nút xanh bất kỳ để hiện giải thích tiếng Việt khi cần. Tiến độ học và kết quả làm bài của bạn được lưu ngay trên trình duyệt.</p>','Giới thiệu bằng tiếng Việt')+'</div>'+
  '<div class="examfacts">'+
  '<div class="fact"><b>180 questions</b><span>2 sessions × 90 questions, 2h15m each</span></div>'+
  '<div class="fact"><b>3 options</b><span>Multiple choice A / B / C — no penalty for guessing</span></div>'+
  '<div class="fact"><b>~300 hours</b><span>Typical recommended preparation time</span></div>'+
  '<div class="fact"><b>Calculator</b><span>TI BA II Plus or HP 12C only</span></div>'+
  '</div></div>'+
  '<div class="topicgrid">'+cards+'</div>'+
  '<div class="howto"><h3>How to use this site / Cách dùng</h3><ol>'+
  '<li><strong>Read the English notes first</strong> — train your brain in the exam language. Open the Vietnamese blocks only when a concept does not click.</li>'+
  '<li><strong>Learn the vocabulary tables</strong> — use the "Vocab: quiz me" button (sidebar) to blur the Vietnamese column and self-test.</li>'+
  '<li><strong>Do every practice question</strong> and read both explanations. Wrong answers teach more than right ones.</li>'+
  '<li><strong>Mark modules complete</strong> to track progress per topic in the sidebar.</li>'+
  '<li>Suggested study order: Quant → FSA → Fixed Income → Equity → Corporate → Portfolio → Economics → Derivatives → Alternatives → <strong>Ethics last and again right before the exam</strong>.</li>'+
  '</ol></div>'+
  '<div class="footer">Independent study notes prepared for personal exam preparation. CFA® and Chartered Financial Analyst® are registered trademarks owned by CFA Institute. This site is not affiliated with, endorsed by, or connected to CFA Institute. Always study the official curriculum and Learning Ecosystem as your primary source.</div>';
}

/* ---------- topic page ---------- */
window.jumpTo = function(id){
  const e = document.getElementById(id);
  if(!e) return false;
  e.classList.remove('collapsed');
  e.scrollIntoView({behavior:'smooth', block:'start'});
  $('#side').classList.remove('open');
  return false;
};
window.toggleMod = function(head){
  head.parentElement.classList.toggle('collapsed');
};
window.setAllMods = function(collapsed){
  document.querySelectorAll('.module').forEach(m=>m.classList.toggle('collapsed', collapsed));
};
function shortTitle(s){ return s.length > 46 ? s.slice(0, 44).replace(/\s+\S*$/,'') + '…' : s; }

function renderTopic(t){
  const idx = TOPICS.indexOf(t);
  let h = '<div class="thead"><div class="tnum">TOPIC '+t.num+' · EXAM WEIGHT '+t.w[0]+'–'+t.w[1]+'%</div><h2>'+t.name+'</h2><div class="viName">'+t.vi+'</div>'+
    '<div class="weightline"><div class="bar"><i style="width:'+(t.w[1]/MAXW*100)+'%"></i></div><b>'+t.w[0]+'–'+t.w[1]+'% of the exam</b></div></div>';
  h += '<div class="intro"><p>'+t.intro.en+'</p>'+viBlock('<p>'+t.intro.vi+'</p>')+'</div>';

  /* table of contents */
  const doneArr = (progress[t.id]&&progress[t.id].done)||[];
  h += '<div class="toc"><h3>In this topic · Mục lục</h3>';
  t.modules.forEach((m,mi)=>{
    const chkN = getChecks(t, mi).length;
    h += '<a href="#'+t.id+'" onclick="return jumpTo(\'mod_'+t.id+'_'+mi+'\')"><span class="n">'+t.num+'.'+(mi+1)+'</span><span>'+m.title+'</span><span class="meta">'+m.sections.length+' section'+(m.sections.length>1?'s':'')+(chkN?' · '+chkN+' check':'')+(doneArr.includes(mi)?' · <span class="donebadge">✓ done</span>':'')+'</span></a>';
  });
  h += '<div class="group"></div>';
  h += '<a href="#'+t.id+'" onclick="return jumpTo(\'vocab_'+t.id+'\')"><span class="n">◆</span><span>Vocabulary · Từ vựng</span><span class="meta">'+t.vocab.length+' terms</span></a>';
  const setsT = getSets(t);
  setsT.forEach((st,si)=>{
    h += '<a href="#'+t.id+'" onclick="return jumpTo(\'set_'+t.id+'_'+si+'\')"><span class="n">'+'ABCDEFGHIJKLMNOP'.charAt(si)+'</span><span>'+st.name+' · Bộ đề '+(si+1)+'</span><span class="meta">'+st.qs.length+' questions</span></a>';
  });
  h += '<div class="ctl"><button onclick="setAllMods(true)">Collapse all · Thu gọn</button><button onclick="setAllMods(false)">Expand all · Mở hết</button></div>';
  h += '</div>';

  t.modules.forEach((m,mi)=>{
    h += '<div class="module" id="mod_'+t.id+'_'+mi+'"><div class="mhead" onclick="toggleMod(this)"><span class="mnum">MODULE '+t.num+'.'+(mi+1)+'</span><h3>'+m.title+'</h3><span class="chev">▾</span></div><div class="mbody">';
    m.sections.forEach(s=>{
      h += '<div class="section"><h4>'+s.h+'</h4><div class="en">'+s.en+'</div>'+viBlock(s.vi)+'</div>';
    });
    if(m.formulas){
      h += '<div class="fblock"><h4>Key formulas</h4>'+m.formulas.map(f=>'<div class="frow"><span class="fn">'+f[0]+'</span><span class="fx">'+f[1]+'</span>'+(f[2]?'<span class="fnote">'+f[2]+'</span>':'')+'</div>').join('')+'</div>';
    }
    const chk = getChecks(t, mi);
    if(chk.length){
      h += '<div class="check"><h4>Quick check · Củng cố ngay</h4>';
      chk.forEach((q,qi)=>{ h += qcardHTML(t.id, 'c'+mi+'_'+qi, q, qi+1, chk.length); });
      h += '</div>';
    }
    const done = (progress[t.id]&&progress[t.id].done||[]).includes(mi);
    h += '<button class="markdone'+(done?' done':'')+'" onclick="toggleDone(\''+t.id+'\','+mi+',this)">'+(done?'✓ Module completed':'○ Mark module complete')+'</button>';
    h += '</div></div>';
  });

  h += '<div class="vocab" id="vocab_'+t.id+'"><h3>Vocabulary · Từ vựng chuyên ngành</h3><div class="hint">Tip: use "Vocab: quiz me" in the sidebar to blur the Vietnamese column and test yourself. Click a blurred cell to peek.</div><table class="vtab"><tr><th>Term</th><th>Definition (EN)</th><th class="viCol">Nghĩa (VI)</th></tr>'+
    t.vocab.map(v=>'<tr><td class="term">'+v[0]+'</td><td>'+v[1]+'</td><td class="viM viCol" onclick="peek(this)">'+v[2]+'</td></tr>').join('')+'</table></div>';

  const sets = getSets(t);
  h += '<div class="quiz"><h3>Exam-style Practice Sets · Bộ đề luyện tập</h3><div class="hint">Do these after finishing all modules above. CFA format: three options, one correct, no penalty for guessing — aim for about 90 seconds per question.</div>';
  sets.forEach((st,si)=>{
    h += '<div class="qset" id="set_'+t.id+'_'+si+'"><div class="sethead"><h4>'+st.name+'</h4><span class="setmeta">'+st.qs.length+' questions · ~'+Math.round(st.qs.length*1.5)+' min</span></div>';
    st.qs.forEach((q,qi)=>{ h += qcardHTML(t.id, 's'+si+'_'+qi, q, qi+1, st.qs.length); });
    h += '<div id="score_'+t.id+'_s'+si+'"></div></div>';
  });
  h += '</div>';

  const prev = TOPICS[idx-1], next = TOPICS[idx+1];
  h += '<div class="pagenav">'+
    (prev?'<a href="#'+prev.id+'"><div class="lab">← Previous</div><div class="nm">'+prev.num+' · '+prev.name+'</div></a>':'<a href="#home"><div class="lab">← Back</div><div class="nm">Home</div></a>')+
    (next?'<a class="next" href="#'+next.id+'"><div class="lab">Next →</div><div class="nm">'+next.num+' · '+next.name+'</div></a>':'<a class="next" href="#home"><div class="lab">Finished →</div><div class="nm">Back to overview</div></a>')+
    '</div>';
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
  restoreQuiz(t);
  if(document.body.classList.contains('showAllVi')) openAllVi();
}

/* ---------- interactions ---------- */
window.peek = function(td){ if(document.body.classList.contains('hideViVocab')){ td.style.filter='none'; setTimeout(()=>td.style.filter='',2500);} };

window.toggleDone = function(tid, mi, btn){
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  const arr = progress[tid].done = progress[tid].done||[];
  const i = arr.indexOf(mi);
  if(i>=0){arr.splice(i,1); btn.classList.remove('done'); btn.textContent='○ Mark module complete';}
  else{arr.push(mi); btn.classList.add('done'); btn.textContent='✓ Module completed';}
  saveProgress(); renderNav(location.hash.replace('#','')||'home');
};

window.answer = function(tid, key, oi){
  const t = TOPICS.find(x=>x.id===tid); const q = getQ(t, key);
  const card = document.getElementById('q_'+tid+'_'+key);
  if(card.dataset.answered) return;
  card.dataset.answered = '1';
  const opts = card.querySelectorAll('.opt');
  opts.forEach((b,bi)=>{ b.disabled=true;
    if(bi===q.ans) b.classList.add('correct');
    else if(bi===oi) b.classList.add('wrong');
  });
  const ex = card.querySelector('.expl'); ex.classList.add('show');
  const v = ex.querySelector('.verdict');
  if(oi===q.ans){ v.textContent='✓ Correct'; v.classList.add('ok'); }
  else{ v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans]; v.classList.add('no'); }
  progress[tid] = progress[tid]||{done:[],quiz:{}};
  progress[tid].quiz = progress[tid].quiz||{};
  progress[tid].quiz[key] = oi;
  saveProgress(); renderNav(tid); showScores(t);
};

function restoreQuiz(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  Object.entries(p.quiz).forEach(([key,oi])=>{
    if(/^\d+$/.test(key)) key = 's0_'+key; /* migrate pre-update saved answers */
    const q = getQ(t, key); const card = document.getElementById('q_'+t.id+'_'+key);
    if(!q||!card) return; card.dataset.answered='1';
    card.querySelectorAll('.opt').forEach((b,bi)=>{ b.disabled=true;
      if(bi===q.ans) b.classList.add('correct'); else if(bi===+oi) b.classList.add('wrong');});
    const ex = card.querySelector('.expl'); ex.classList.add('show');
    const v = ex.querySelector('.verdict');
    if(+oi===q.ans){v.textContent='✓ Correct';v.classList.add('ok');}
    else{v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans];v.classList.add('no');}
  });
  showScores(t);
}
function showScores(t){
  const p = progress[t.id]; if(!p||!p.quiz) return;
  const norm = {};
  Object.entries(p.quiz).forEach(([k,v])=>{ norm[/^\d+$/.test(k)?'s0_'+k:k]=v; });
  getSets(t).forEach((st,si)=>{
    const el = document.getElementById('score_'+t.id+'_s'+si);
    if(!el) return;
    const keys = st.qs.map((q,qi)=>'s'+si+'_'+qi);
    if(!keys.every(k=>k in norm)){ el.innerHTML=''; return; }
    const correct = keys.filter((k,qi)=>st.qs[qi].ans===+norm[k]).length;
    el.innerHTML = '<div class="qscore">'+st.name+' score: '+correct+' / '+st.qs.length+' ('+Math.round(correct/st.qs.length*100)+'%) — '+(correct/st.qs.length>=0.7?'exam-ready pace, keep going':'review the modules above and retry later')+'</div>';
  });
}

/* ---------- global toggles ---------- */
function openAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.add('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.add('open')); }
function closeAllVi(){ document.querySelectorAll('.vi').forEach(x=>x.classList.remove('show')); document.querySelectorAll('.vitoggle').forEach(b=>b.classList.remove('open')); }
$('#btnAllVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('showAllVi');
  this.classList.toggle('on', on); this.textContent = on ? 'VI: shown' : 'VI: show all';
  on ? openAllVi() : closeAllVi();
});
$('#btnVocabVi').addEventListener('click', function(){
  const on = document.body.classList.toggle('hideViVocab');
  this.classList.toggle('on', on); this.textContent = on ? 'Vocab: revealed on tap' : 'Vocab: quiz me';
});

/* ---------- router ---------- */

/* ---------- mock tests page ---------- */
function mockCard(ti, qi, q, total){
  return '<div class="qcard" id="mq_'+ti+'_'+qi+'"><div class="qnum">QUESTION '+(qi+1)+' OF '+total+'</div><div class="qtext">'+q.q+'</div>'+
    q.opts.map((o,oi)=>'<button class="opt" onclick="answerMock('+ti+','+qi+','+oi+')"><span class="ol">'+'ABC'[oi]+'.</span><span>'+o+'</span></button>').join('')+
    '<div class="expl"><div class="verdict"></div><div class="etext">'+q.en+'</div>'+viBlock('<p>'+q.vi+'</p>','Giải thích tiếng Việt')+'</div></div>';
}
function mockMeta(mt, ti){
  const num = (mt.name.match(/Mock\s*(?:Exam)?\s*(\d+)/i)||[])[1] || String(ti+1);
  const ses = (mt.name.match(/Session\s*(\d+)/i)||[])[1] || '';
  const scope = (mt.name.match(/\(([^)]*)\)/)||[])[1] || '';
  return {ti:ti, num:num, ses:ses, scope:scope, name:mt.name};
}
function mockGroups(){
  const map = {}, order = [];
  MOCKTESTS.forEach((mt,ti)=>{
    const m = mockMeta(mt,ti);
    if(!map[m.num]){ map[m.num] = []; order.push(m.num); }
    map[m.num].push(m);
  });
  return order.map(n=>({num:n, tests:map[n]}));
}
function mockStats(ti){
  const mt = MOCKTESTS[ti], p = progress.__mock || {};
  let done = 0, correct = 0;
  mt.qs.forEach((q,qi)=>{ const k = ti+'_'+qi; if(k in p){ done++; if(+p[k]===q.ans) correct++; } });
  return {done:done, total:mt.qs.length, correct:correct};
}
window.resetMockTest = function(ti){
  if(!confirm('Clear the saved answers for this exam and start over? / Xóa đáp án đã lưu của đề này và làm lại từ đầu?')) return;
  const p = progress.__mock || {};
  Object.keys(p).forEach(k=>{ if(k.split('_')[0]===String(ti)) delete p[k]; });
  saveProgress(); renderMockTest(ti); window.scrollTo(0,0);
};
function renderMockHub(){
  let h = '<div class="thead"><div class="tnum">MOCK EXAMS · FULL PRACTICE</div><h2>Mock Tests</h2><div class="viName">Đề thi thử — chọn đề bên dưới hoặc trong menu trái (~90 giây/câu)</div></div>';
  if(!MOCKTESTS.length){
    h += '<div class="intro"><p>No mock tests are loaded yet. Open <strong>data/mocktests.js</strong> — it contains a ready-made template showing exactly how to add exams. Once you add a test and reload, it will appear here with automatic grading and bilingual explanations, and your answers will be saved in the browser.</p>'+viBlock('<p>Chưa có đề thi thử nào. Mở file <strong>data/mocktests.js</strong> — trong đó có sẵn mẫu hướng dẫn cách thêm đề. Thêm đề xong tải lại trang, đề sẽ hiện ở đây với chấm điểm tự động, giải thích song ngữ, và đáp án được lưu ngay trên trình duyệt.</p>')+'</div>';
  } else {
    h += '<div class="intro"><p>Each mock mirrors the real exam: <strong>Session 1</strong> covers Ethics, Quant, Economics, FSA and Corporate Issuers; <strong>Session 2</strong> covers Fixed Income, Equity, Derivatives, Alternatives and Portfolio Management. Pick an exam below — answers and scores are saved automatically in this browser.</p>'+viBlock('<p>Mỗi mock mô phỏng đề thi thật: <strong>Session 1</strong> gồm Ethics, Quant, Econ, FSA, Corporate Issuers; <strong>Session 2</strong> gồm Fixed Income, Equity, Derivatives, Alternatives, Portfolio Management. Chọn một đề bên dưới — đáp án và điểm số được lưu tự động trên trình duyệt.</p>')+'</div>';
    mockGroups().forEach(g=>{
      h += '<div class="mockgroup"><div class="mockgroup-h"><h3>Mock Exam '+g.num+'</h3><span class="setmeta">Đề số '+g.num+' · '+g.tests.length+' session'+(g.tests.length>1?'s':'')+'</span></div><div class="mockcards">';
      g.tests.forEach(m=>{
        const st = mockStats(m.ti);
        const bar = st.total ? Math.round(st.done/st.total*100) : 0;
        let chip;
        if(!st.done) chip = '<span class="mchip">Not started · Chưa làm</span>';
        else if(st.done<st.total) chip = '<span class="mchip prog">In progress · '+st.done+'/'+st.total+'</span>';
        else { const pct = Math.round(st.correct/st.total*100); chip = '<span class="mchip '+(pct>=70?'ok':'no')+'">Score '+st.correct+'/'+st.total+' ('+pct+'%)</span>'; }
        h += '<a class="mockcard" href="#mock/'+m.ti+'">'+
          '<div class="mc-top"><span class="mc-ses">SESSION '+m.ses+'</span>'+chip+'</div>'+
          '<div class="mc-name">Mock '+g.num+' · Session '+m.ses+'</div>'+
          '<div class="mc-scope">'+m.scope+'</div>'+
          '<div class="mc-meta">'+st.total+' questions · ~'+Math.round(st.total*1.5)+' min</div>'+
          '<div class="mc-bar"><i style="width:'+bar+'%"></i></div></a>';
      });
      h += '</div></div>';
    });
  }
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
}
function renderMockTest(ti){
  const mt = MOCKTESTS[ti];
  if(!mt){ location.hash = '#mock'; return; }
  const m = mockMeta(mt,ti);
  let h = '<div class="thead"><a class="mockback" href="#mock">← All mock tests · Danh sách đề</a><div class="tnum">MOCK EXAM '+m.num+' · SESSION '+m.ses+'</div><h2>Mock '+m.num+' — Session '+m.ses+'</h2><div class="viName">'+m.scope+'</div></div>';
  h += '<div class="intro"><p>'+mt.qs.length+' questions · ~'+Math.round(mt.qs.length*1.5)+' min. Answer every question, then check the score line at the end. Aim for roughly 90 seconds per question. <button class="mockreset" onclick="resetMockTest('+ti+')">Reset · Làm lại đề</button></p>'+viBlock('<p>Trả lời hết các câu, sau đó xem dòng điểm ở cuối đề. Cố gắng giữ nhịp ~90 giây mỗi câu. Nút Reset xóa đáp án đã lưu của riêng đề này.</p>')+'</div>';
  h += '<div class="qset">';
  mt.qs.forEach((q,qi)=>{ h += mockCard(ti, qi, q, mt.qs.length); });
  h += '<div id="mockscore_'+ti+'"></div></div>';
  h += '<div class="mocknav-bottom">';
  if(MOCKTESTS[ti-1]) h += '<a href="#mock/'+(ti-1)+'">← '+MOCKTESTS[ti-1].name.split(' (')[0]+'</a>';
  h += '<a href="#mock">☰ All tests · Tất cả đề</a>';
  if(MOCKTESTS[ti+1]) h += '<a href="#mock/'+(ti+1)+'">'+MOCKTESTS[ti+1].name.split(' (')[0]+' →</a>';
  h += '</div>';
  h += '<div class="footer">CFA® is a registered trademark owned by CFA Institute. Independent study notes — not affiliated with CFA Institute.</div>';
  content.innerHTML = h;
  restoreMockOne(ti);
  if(document.body.classList.contains('showAllVi')) openAllVi();
}
function restoreMockOne(ti){
  const p = progress.__mock; if(!p) return;
  Object.entries(p).forEach(([k,oi])=>{ const parts = k.split('_'); if(+parts[0]===ti) markMockCard(+parts[0], +parts[1], oi); });
  showMockScore(ti);
}
function markMockCard(ti, qi, oi){
  const q = MOCKTESTS[ti] && MOCKTESTS[ti].qs[qi]; if(!q) return;
  const card = document.getElementById('mq_'+ti+'_'+qi); if(!card) return;
  card.dataset.answered = '1';
  card.querySelectorAll('.opt').forEach((b,bi)=>{ b.disabled = true;
    if(bi===q.ans) b.classList.add('correct'); else if(bi===+oi) b.classList.add('wrong'); });
  const ex = card.querySelector('.expl'); ex.classList.add('show');
  const v = ex.querySelector('.verdict');
  if(+oi===q.ans){ v.textContent='✓ Correct'; v.classList.add('ok'); }
  else{ v.textContent='✗ Incorrect — the answer is '+'ABC'[q.ans]; v.classList.add('no'); }
}
window.answerMock = function(ti, qi, oi){
  const card = document.getElementById('mq_'+ti+'_'+qi);
  if(!card || card.dataset.answered) return;
  markMockCard(ti, qi, oi);
  progress.__mock = progress.__mock || {};
  progress.__mock[ti+'_'+qi] = oi;
  saveProgress(); showMockScore(ti);
};
function showMockScore(ti){
  const mt = MOCKTESTS[ti]; const p = progress.__mock || {};
  const el = document.getElementById('mockscore_'+ti); if(!el||!mt) return;
  const keys = mt.qs.map((q,qi)=>ti+'_'+qi);
  if(!keys.every(k=>k in p)){ el.innerHTML=''; return; }
  const correct = keys.filter((k,qi)=>mt.qs[qi].ans===+p[k]).length;
  const pct = Math.round(correct/mt.qs.length*100);
  el.innerHTML = '<div class="qscore">'+mt.name+' score: '+correct+' / '+mt.qs.length+' ('+pct+'%) — '+(pct>=70?'exam-ready pace, keep going':'review the weak topics and retake later')+'</div>';
}

function route(){
  const id = location.hash.replace('#','') || 'home';
  const t = TOPICS.find(x=>x.id===id);
  if(id==='mock' || id.indexOf('mock/')===0){
    renderNav(id);
    if(id.indexOf('mock/')===0){ const ti = parseInt(id.slice(5),10); (!isNaN(ti) && MOCKTESTS[ti]) ? renderMockTest(ti) : renderMockHub(); }
    else renderMockHub();
    window.scrollTo(0,0); $('#side').classList.remove('open'); return;
  }
  renderNav(t?id:'home');
  t ? renderTopic(t) : renderHome();
  window.scrollTo(0,0);
  $('#side').classList.remove('open');
}
window.addEventListener('hashchange', route);
$('#btnMenu').addEventListener('click', ()=>$('#side').classList.toggle('open'));
route();
</script>
