<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level 1 — Study Hub</title>
<meta name="description" content="CFA Level 1 study hub: English notes with Vietnamese translations, vocabulary, formulas and practice questions for all 10 topics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10222F;
  --ink-soft:#3D5060;
  --paper:#F6F6F1;
  --card:#FFFFFF;
  --line:#DFE0D6;
  --accent:#0E7A5F;
  --accent-soft:#E3F0EB;
  --amber:#B7791F;
  --amber-soft:#F8F0DF;
  --red:#B23A2F;
  --red-soft:#F7E8E6;
  --side-bg:#10222F;
  --side-ink:#EDEDE4;
  --side-dim:#8FA0AC;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --body:'Public Sans',system-ui,sans-serif;
  --disp:'Newsreader',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:var(--side-bg);color:var(--side-ink);padding:28px 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side::-webkit-scrollbar{width:8px}
.side::-webkit-scrollbar-thumb{background:#2C4152;border-radius:4px}
.main{min-width:0;padding:0 0 90px}
.wrap{max-width:880px;margin:0 auto;padding:0 34px}

/* ---------- sidebar ---------- */
.brand{padding:0 24px 20px;border-bottom:1px solid #223649}
.brand h1{font-family:var(--disp);font-weight:600;font-size:26px;letter-spacing:.2px;color:#fff}
.brand h1 span{color:#7FC5AF}
.brand p{font-size:12.5px;color:var(--side-dim);margin-top:4px}
.globalbar{display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid #223649}
.gbtn{flex:1;font:600 12px var(--body);color:var(--side-ink);background:#1B3243;border:1px solid #2C4658;border-radius:6px;padding:7px 8px;cursor:pointer;transition:background .15s}
.gbtn:hover{background:#254155}
.gbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.navsec{padding:16px 12px 4px}
.navlabel{font:600 11px var(--body);letter-spacing:1.4px;text-transform:uppercase;color:var(--side-dim);padding:0 12px 8px}
a.tlink{display:block;text-decoration:none;color:var(--side-ink);padding:9px 12px;border-radius:8px;margin-bottom:2px;transition:background .15s}
a.tlink:hover{background:#1B3243}
a.tlink.active{background:#1F3B4E}
a.tlink:focus-visible,button:focus-visible{outline:2px solid #7FC5AF;outline-offset:2px}
.tl-top{display:flex;align-items:baseline;gap:8px}
.tl-num{font:500 11px var(--mono);color:var(--side-dim);min-width:20px}
.tl-name{font-size:13.5px;font-weight:500;flex:1}
.tl-w{font:500 11px var(--mono);color:#7FC5AF}
.tl-bar{height:3px;background:#22384A;border-radius:2px;margin:7px 0 0 28px;overflow:hidden}
.tl-bar i{display:block;height:100%;background:linear-gradient(90deg,#0E7A5F,#7FC5AF);border-radius:2px}
.tl-prog{margin:5px 0 0 28px;font:400 10.5px var(--mono);color:var(--side-dim)}

/* ---------- topbar / mobile ---------- */
.mobilebar{display:none}

/* ---------- home ---------- */
.hero{padding:64px 0 30px;border-bottom:1px solid var(--line)}
.eyebrow{font:600 12px var(--body);letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.hero h2{font-family:var(--disp);font-size:clamp(34px,5vw,52px);font-weight:600;line-height:1.12;margin:12px 0 16px;max-width:16ch}
.hero p.lead{font-size:17.5px;color:var(--ink-soft);max-width:62ch}
.hero .vi-inline{margin-top:14px}
.examfacts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:34px 0 8px}
.fact{background:var(--card);padding:16px 18px}
.fact b{display:block;font:600 15px var(--mono);color:var(--ink)}
.fact span{font-size:12.5px;color:var(--ink-soft)}
.topicgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:34px 0}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 20px 16px;text-decoration:none;color:var(--ink);display:block;transition:border-color .15s,transform .15s}
.tcard:hover{border-color:var(--accent);transform:translateY(-2px)}
.tcard .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.tcard h3{font-family:var(--disp);font-size:20px;font-weight:600}
.tcard .w{font:600 12px var(--mono);color:var(--accent);white-space:nowrap}
.tcard p{font-size:13.5px;color:var(--ink-soft);margin-top:6px}
.tcard .bar{height:4px;background:var(--paper);border-radius:2px;margin-top:14px;overflow:hidden}
.tcard .bar i{display:block;height:100%;background:var(--accent);border-radius:2px}
.howto{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 28px;margin-bottom:40px}
.howto h3{font-family:var(--disp);font-size:22px;margin-bottom:10px}
.howto ol{padding-left:20px;font-size:14.5px;color:var(--ink-soft)}
.howto li{margin-bottom:6px}

/* ---------- topic page ---------- */
.thead{padding:56px 0 26px;border-bottom:1px solid var(--line)}
.thead .tnum{font:500 13px var(--mono);color:var(--accent);letter-spacing:1px}
.thead h2{font-family:var(--disp);font-size:clamp(30px,4.4vw,44px);font-weight:600;line-height:1.15;margin:8px 0 4px}
.thead .viName{font-family:var(--disp);font-style:italic;font-size:19px;color:var(--ink-soft)}
.weightline{display:flex;align-items:center;gap:14px;margin-top:20px}
.weightline .bar{flex:1;max-width:340px;height:6px;background:#E7E8DF;border-radius:3px;overflow:hidden}
.weightline .bar i{display:block;height:100%;background:var(--accent)}
.weightline b{font:600 13px var(--mono);color:var(--accent)}
.intro{padding:26px 0 4px}
.intro p{max-width:70ch;color:var(--ink-soft)}

/* modules */
.module{margin:34px 0}
.mhead{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.mhead .mnum{font:600 12px var(--mono);color:var(--amber)}
.mhead h3{font-family:var(--disp);font-size:26px;font-weight:600}
.section{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-bottom:14px}
.section h4{font-size:15px;font-weight:700;margin-bottom:8px}
.section .en p{margin-bottom:10px}
.section .en p:last-child{margin-bottom:0}
.section ul,.section ol{padding-left:22px;margin:8px 0}
.section li{margin-bottom:5px}
.section strong{font-weight:700}
.section em{font-style:italic}
table.simple{width:100%;border-collapse:collapse;font-size:14px;margin:10px 0}
table.simple th{text-align:left;font-weight:700;border-bottom:2px solid var(--ink);padding:7px 10px 7px 0}
table.simple td{border-bottom:1px solid var(--line);padding:7px 10px 7px 0;vertical-align:top}

/* VI toggle */
.vitoggle{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font:600 12px var(--body);color:var(--accent);background:var(--accent-soft);border:1px solid #BFDDD2;border-radius:999px;padding:5px 13px;cursor:pointer;transition:background .15s}
.vitoggle:hover{background:#D3E8E0}
.vitoggle .car{transition:transform .2s;font-size:10px}
.vitoggle.open .car{transform:rotate(90deg)}
.vi{display:none;margin-top:12px;padding:14px 16px;border-left:3px solid var(--accent);background:#F4F8F6;border-radius:0 8px 8px 0;font-size:14.5px;color:#2B4A40}
.vi.show{display:block}
.vi p{margin-bottom:8px}.vi p:last-child{margin-bottom:0}
.vi ul,.vi ol{padding-left:20px;margin:6px 0}

/* formulas */
.fblock{background:var(--amber-soft);border:1px solid #E8D9B8;border-radius:12px;padding:18px 22px;margin-bottom:14px}
.fblock h4{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.frow{display:grid;grid-template-columns:minmax(150px,220px) 1fr;gap:8px 18px;padding:8px 0;border-bottom:1px dashed #E0CFA5;font-size:14px}
.frow:last-child{border-bottom:none}
.frow .fn{font-weight:600}
.frow .fx{font-family:var(--mono);font-size:13.5px;color:#6B4E14}
.frow .fnote{grid-column:1/-1;font-size:12.5px;color:#8A6B2E;margin-top:-4px}

/* vocab */
.vocab{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin:26px 0}
.vocab h3{font-family:var(--disp);font-size:22px;margin-bottom:6px}
.vocab .hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}
table.vtab{width:100%;border-collapse:collapse;font-size:14px}
table.vtab th{text-align:left;font:600 11px var(--body);letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);border-bottom:2px solid var(--ink);padding:6px 10px 6px 0}
table.vtab td{border-bottom:1px solid var(--line);padding:8px 10px 8px 0;vertical-align:top}
table.vtab td.term{font-weight:700;white-space:nowrap}
table.vtab td.viM{color:var(--accent);font-weight:500}
.viCol{transition:filter .15s}
body.hideViVocab .viCol{filter:blur(5px);cursor:pointer}

/* quiz */
.quiz{margin:34px 0 10px}
.quiz>h3{font-family:var(--disp);font-size:26px;margin-bottom:4px}
.quiz>.hint{font-size:13px;color:var(--ink-soft);margin-bottom:16px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:14px}
.qcard .qnum{font:600 11px var(--mono);color:var(--amber);letter-spacing:1px}
.qcard .qtext{font-weight:600;margin:6px 0 14px}
.opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;font:400 14.5px var(--body);color:var(--ink);transition:border-color .15s,background .15s}
.opt:hover{border-color:var(--ink-soft)}
.opt .ol{font:600 12px var(--mono);color:var(--ink-soft);margin-top:2px}
.opt.correct{background:var(--accent-soft);border-color:var(--accent)}
.opt.correct .ol{color:var(--accent)}
.opt.wrong{background:var(--red-soft);border-color:var(--red)}
.opt.wrong .ol{color:var(--red)}
.opt:disabled{cursor:default}
.expl{display:none;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;font-size:14px}
.expl.show{display:block}
.expl .verdict{font-weight:700;margin-bottom:6px}
.expl .verdict.ok{color:var(--accent)}
.expl .verdict.no{color:var(--red)}
.expl .vi{margin-top:10px}
.qscore{font:600 13px var(--mono);color:var(--accent);background:var(--accent-soft);border:1px solid #BFDDD2;border-radius:8px;display:inline-block;padding:8px 14px;margin-top:6px}

/* misc */
.pagenav{display:flex;justify-content:space-between;gap:12px;margin:44px 0 0;padding-top:22px;border-top:1px solid var(--line)}
.pagenav a{flex:1;text-decoration:none;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;transition:border-color .15s}
.pagenav a:hover{border-color:var(--accent)}
.pagenav .lab{font:600 11px var(--body);letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft)}
.pagenav .nm{font-family:var(--disp);font-size:17px;margin-top:3px}
.pagenav a.next{text-align:right}
.markdone{display:inline-flex;align-items:center;gap:8px;font:600 13px var(--body);color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;margin-top:10px}
.markdone.done{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-soft)}

@media (max-width:960px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:290px;z-index:40;transform:translateX(-100%);transition:transform .25s}
  .side.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .mobilebar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;background:var(--side-bg);color:#fff;padding:12px 18px}
  .mobilebar button{background:#1B3243;color:#fff;border:1px solid #2C4658;border-radius:8px;font:600 13px var(--body);padding:8px 13px;cursor:pointer}
  .mobilebar .t{font-family:var(--disp);font-size:17px}
  .topicgrid{grid-template-columns:1fr}
  .wrap{padding:0 20px}
  .frow{grid-template-columns:1fr}
  table.vtab td.term{white-space:normal}
}
</style>
</head>
<body>
<div class="app">
  <nav class="side" id="side" aria-label="Topics">
    <div class="brand">
      <h1>CFA<span> L1</span> Study Hub</h1>
      <p>English notes · Vietnamese support · Practice</p>
    </div>
    <div class="globalbar">
      <button class="gbtn" id="btnAllVi" title="Show every Vietnamese translation">VI: show all</button>
      <button class="gbtn" id="btnVocabVi" title="Blur Vietnamese column in vocabulary tables (self-test)">Vocab: quiz me</button>
    </div>
    <div class="navsec">
      <div class="navlabel">Curriculum · 2026 weights</div>
      <div id="navlist"></div>
    </div>
  </nav>

  <div class="main">
    <div class="mobilebar">
      <button id="btnMenu" aria-label="Open menu">☰ Topics</button>
      <div class="t">CFA L1 Study Hub</div>
    </div>
    <div class="wrap" id="content"></div>
  </div>
</div>
<script>
/* =====================================================
   CFA LEVEL 1 STUDY HUB — content data
   Structure: TOPICS[] -> modules[] -> sections[{h,en,vi}]
   + formulas, vocab, quiz (3-option MCQ, CFA format)
   ===================================================== */
const TOPICS = [
/* ============ 01 ETHICS ============ */
{
id:'ethics', num:'01', name:'Ethical & Professional Standards', vi:'Đạo đức & Chuẩn mực nghề nghiệp', w:[15,20],
blurb:'The Code of Ethics, the seven Standards of Professional Conduct, and GIPS. The highest-weighted topic and a tie-breaker at the margin.',
intro:{
en:'Ethics is the single most important topic at Level 1: it carries a 15–20% weight, and CFA Institute applies an "ethics adjustment" for borderline candidates — a strong ethics score can push a marginal result to a pass. Questions are scenario-based: you must identify which Standard is violated (or that none is). Learn the seven Standards with their sub-sections and practice applying them to grey-area situations.',
vi:'Ethics là môn quan trọng nhất ở Level 1: chiếm 15–20% tổng điểm, và Viện CFA áp dụng "ethics adjustment" (điều chỉnh điểm đạo đức) cho các thí sinh ở ngưỡng đỗ/trượt — điểm Ethics tốt có thể kéo kết quả từ trượt thành đỗ. Câu hỏi thường ở dạng tình huống: bạn phải xác định Standard nào bị vi phạm (hoặc không vi phạm gì). Hãy học kỹ 7 Standards cùng các mục con và luyện áp dụng vào các tình huống "vùng xám".'
},
modules:[
{ title:'Code of Ethics & Professionalism (Standard I)', sections:[
{h:'The six components of the Code of Ethics', en:'<p>Members and candidates must:</p><ol><li><strong>Act with integrity, competence, diligence, and respect</strong>, and in an ethical manner with the public, clients, prospective clients, employers, employees, colleagues, and other market participants.</li><li><strong>Place the integrity of the profession and the interests of clients above their own</strong> personal interests.</li><li><strong>Use reasonable care and exercise independent professional judgment</strong> in investment analysis, recommendations, and actions.</li><li><strong>Practice and encourage others to practice</strong> in a professional and ethical manner that reflects credit on the profession.</li><li><strong>Promote the integrity and viability of global capital markets</strong> for the ultimate benefit of society.</li><li><strong>Maintain and improve professional competence</strong> and strive to maintain and improve the competence of other investment professionals.</li></ol>',
vi:'<p>Thành viên và ứng viên phải:</p><ol><li><strong>Hành động chính trực, có năng lực, cần mẫn và tôn trọng</strong>, cư xử có đạo đức với công chúng, khách hàng, khách hàng tiềm năng, chủ lao động, nhân viên, đồng nghiệp và các thành viên khác của thị trường.</li><li><strong>Đặt tính chính trực của nghề nghiệp và lợi ích khách hàng lên trên</strong> lợi ích cá nhân.</li><li><strong>Cẩn trọng hợp lý và giữ phán đoán chuyên môn độc lập</strong> khi phân tích, khuyến nghị và ra quyết định đầu tư.</li><li><strong>Hành nghề và khuyến khích người khác hành nghề</strong> một cách chuyên nghiệp, có đạo đức, làm rạng danh nghề nghiệp.</li><li><strong>Thúc đẩy tính chính trực và sự bền vững của thị trường vốn toàn cầu</strong> vì lợi ích tối hậu của xã hội.</li><li><strong>Duy trì và nâng cao năng lực chuyên môn</strong> của bản thân và của các chuyên gia đầu tư khác.</li></ol>'},
{h:'Standard I — Professionalism', en:'<ul><li><strong>I(A) Knowledge of the Law:</strong> comply with the <em>stricter</em> of applicable law or the Code &amp; Standards. Do not knowingly participate in violations; dissociate from illegal activity (reporting to regulators is encouraged but not required by the Code).</li><li><strong>I(B) Independence and Objectivity:</strong> do not offer, solicit, or accept gifts or compensation that could compromise independence. Modest gifts from clients are acceptable with disclosure to the employer; gifts from parties trying to influence research (e.g., issuers paying analysts) are the classic violation. Best practice for issuer-paid research: flat fee, disclosed.</li><li><strong>I(C) Misrepresentation:</strong> no untrue statements or omissions — includes guaranteeing investment returns and <strong>plagiarism</strong> (using others’ work without attribution; exception: recognized statistical sources like Bloomberg do not need citation).</li><li><strong>I(D) Misconduct:</strong> no dishonesty, fraud, or deceit that reflects adversely on professional reputation, integrity, or competence. Personal bankruptcy alone is not misconduct unless fraud was involved.</li></ul>',
vi:'<ul><li><strong>I(A) Hiểu biết pháp luật:</strong> tuân thủ quy định <em>nghiêm ngặt hơn</em> giữa luật hiện hành và Code &amp; Standards. Không cố ý tham gia vi phạm; phải tách mình khỏi hành vi phạm pháp (báo cáo cơ quan quản lý được khuyến khích nhưng Code không bắt buộc).</li><li><strong>I(B) Độc lập &amp; Khách quan:</strong> không đưa, gạ gẫm hay nhận quà/thù lao có thể ảnh hưởng tính độc lập. Quà nhỏ từ khách hàng có thể nhận nếu khai báo với công ty; quà từ bên muốn thao túng báo cáo phân tích (VD: doanh nghiệp trả tiền cho analyst) là vi phạm điển hình. Nghiên cứu do tổ chức phát hành trả tiền: nhận phí cố định (flat fee) và công bố.</li><li><strong>I(C) Trình bày sai lệch:</strong> không phát ngôn sai hoặc bỏ sót thông tin — bao gồm cam kết bảo đảm lợi nhuận đầu tư và <strong>đạo văn</strong> (dùng công trình người khác không trích nguồn; ngoại lệ: nguồn thống kê phổ biến như Bloomberg không cần trích).</li><li><strong>I(D) Hành vi sai trái:</strong> không gian dối, lừa đảo làm tổn hại danh tiếng, tính chính trực, năng lực nghề nghiệp. Phá sản cá nhân đơn thuần không phải misconduct trừ khi có gian lận.</li></ul>'}
]},
{ title:'Duties: Integrity of Capital Markets & Duties to Clients (Standards II–III)', sections:[
{h:'Standard II — Integrity of Capital Markets', en:'<ul><li><strong>II(A) Material Nonpublic Information (MNPI):</strong> members who possess information that is both <em>material</em> (would affect price / a reasonable investor’s decision) and <em>nonpublic</em> must not act or cause others to act on it. The <strong>mosaic theory</strong> is the key exception: conclusions built from public information plus <em>nonmaterial</em> nonpublic information are legitimate — even if the conclusion itself would be material.</li><li><strong>II(B) Market Manipulation:</strong> no transaction-based manipulation (e.g., trades to create artificial volume or price — "painting the tape") and no information-based manipulation (spreading false rumors, pump-and-dump). Intent matters: legitimate trading strategies that exploit inefficiencies are not manipulation.</li></ul>',
vi:'<ul><li><strong>II(A) Thông tin trọng yếu chưa công bố (MNPI):</strong> ai nắm thông tin vừa <em>trọng yếu</em> (ảnh hưởng giá / quyết định của nhà đầu tư hợp lý) vừa <em>chưa công khai</em> thì không được giao dịch hoặc xúi giục người khác giao dịch dựa trên đó. <strong>Mosaic theory</strong> là ngoại lệ quan trọng: kết luận được ghép từ thông tin công khai + thông tin chưa công khai nhưng <em>không trọng yếu</em> là hợp pháp — kể cả khi bản thân kết luận đó mang tính trọng yếu.</li><li><strong>II(B) Thao túng thị trường:</strong> cấm thao túng bằng giao dịch (tạo khối lượng/giá ảo — "painting the tape") và thao túng bằng thông tin (tung tin đồn thất thiệt, pump-and-dump). Ý định là mấu chốt: chiến lược giao dịch hợp pháp khai thác sự kém hiệu quả của thị trường không phải thao túng.</li></ul>'},
{h:'Standard III — Duties to Clients', en:'<ul><li><strong>III(A) Loyalty, Prudence, and Care:</strong> client interests come first — before the employer’s and your own. Soft dollars (brokerage paid with client commissions) must benefit the <em>client</em>. Proxies should be voted in clients’ interests.</li><li><strong>III(B) Fair Dealing:</strong> deal fairly and objectively with all clients when making recommendations or taking investment action. "Fairly" does not mean "equally" — premium service tiers are fine if disclosed and available to all who pay; but all clients must receive material recommendation changes before (or at the same time as) any trades.</li><li><strong>III(C) Suitability:</strong> in an advisory relationship, make a reasonable inquiry into the client’s investment experience, risk/return objectives, and constraints — documented in an <strong>Investment Policy Statement (IPS)</strong>, reviewed at least annually. Judge suitability in a total-portfolio context, not security by security.</li><li><strong>III(D) Performance Presentation:</strong> fair, accurate, and complete; no cherry-picking accounts or periods. GIPS compliance is recommended, not required.</li><li><strong>III(E) Preservation of Confidentiality:</strong> keep client information confidential unless the information concerns illegal activity, disclosure is required by law, or the client permits it. Cooperation with CFA Institute Professional Conduct investigations is allowed.</li></ul>',
vi:'<ul><li><strong>III(A) Trung thành, Thận trọng, Cẩn trọng:</strong> lợi ích khách hàng đứng trước lợi ích công ty và bản thân. Soft dollars (dịch vụ môi giới trả bằng hoa hồng của khách hàng) phải phục vụ lợi ích <em>khách hàng</em>. Quyền biểu quyết (proxy) phải bỏ phiếu vì lợi ích khách hàng.</li><li><strong>III(B) Đối xử công bằng:</strong> công bằng và khách quan với mọi khách hàng khi khuyến nghị hoặc giao dịch. "Công bằng" không có nghĩa "bằng nhau" — gói dịch vụ cao cấp được phép nếu công bố và ai trả phí đều mua được; nhưng mọi khách hàng phải nhận thay đổi khuyến nghị trọng yếu trước (hoặc cùng lúc) với việc thực hiện giao dịch.</li><li><strong>III(C) Tính phù hợp:</strong> trong quan hệ tư vấn, phải tìm hiểu kinh nghiệm đầu tư, mục tiêu rủi ro/lợi nhuận và các ràng buộc của khách — ghi trong <strong>IPS</strong>, rà soát tối thiểu hằng năm. Đánh giá suitability theo tổng thể danh mục, không theo từng chứng khoán riêng lẻ.</li><li><strong>III(D) Trình bày kết quả đầu tư:</strong> công bằng, chính xác, đầy đủ; không "cherry-pick" tài khoản hay giai đoạn đẹp. Tuân thủ GIPS là khuyến nghị, không bắt buộc.</li><li><strong>III(E) Bảo mật:</strong> giữ bí mật thông tin khách hàng trừ khi liên quan hoạt động phạm pháp, luật yêu cầu công bố, hoặc khách hàng cho phép. Được phép hợp tác với điều tra của CFA Institute Professional Conduct.</li></ul>'}
]},
{ title:'Duties to Employers, Investment Analysis, Conflicts, Responsibilities (Standards IV–VII)', sections:[
{h:'Standard IV — Duties to Employers', en:'<ul><li><strong>IV(A) Loyalty:</strong> do not harm the employer. While employed, you may <em>prepare</em> to leave (arrange to go independent) but may not take client lists, models, or solicit clients before resigning. Skills and experience in your head are yours to keep.</li><li><strong>IV(B) Additional Compensation Arrangements:</strong> no outside compensation that competes with the employer’s interest unless <em>written consent from all parties</em> (employer and the outside party) is obtained.</li><li><strong>IV(C) Responsibilities of Supervisors:</strong> supervisors must take steps to prevent and detect violations. If compliance systems are inadequate, decline supervisory responsibility (in writing) until they are fixed.</li></ul>',
vi:'<ul><li><strong>IV(A) Trung thành với chủ lao động:</strong> không gây hại cho công ty. Khi còn làm việc, bạn được <em>chuẩn bị</em> nghỉ (sắp xếp ra làm riêng) nhưng không được mang danh sách khách hàng, mô hình, hay lôi kéo khách trước khi nộp đơn nghỉ. Kỹ năng và kinh nghiệm trong đầu là của bạn.</li><li><strong>IV(B) Thu nhập bổ sung:</strong> không nhận thù lao bên ngoài cạnh tranh với lợi ích công ty trừ khi có <em>chấp thuận bằng văn bản của tất cả các bên</em>.</li><li><strong>IV(C) Trách nhiệm người giám sát:</strong> phải có biện pháp ngăn ngừa và phát hiện vi phạm. Nếu hệ thống compliance yếu, phải từ chối nhận trách nhiệm giám sát (bằng văn bản) cho tới khi được khắc phục.</li></ul>'},
{h:'Standards V, VI, VII — highlights', en:'<ul><li><strong>V(A) Diligence and Reasonable Basis:</strong> every recommendation needs a reasonable and adequate basis supported by research. Using third-party research is fine if you assess its rigor. Group research: you need not agree with the conclusion, but if the process was sound you may keep your name on the report.</li><li><strong>V(B) Communication with Clients:</strong> distinguish <em>fact</em> from <em>opinion</em>; disclose the basic format of the investment process and material changes to it; disclose significant limitations and risks.</li><li><strong>V(C) Record Retention:</strong> maintain records supporting analysis (CFA Institute recommends ≥7 years if no regulatory rule). Records belong to the <em>firm</em>, not the analyst.</li><li><strong>VI(A) Disclosure of Conflicts:</strong> disclose all matters that could impair independence — prominently and in plain language (e.g., board seats, stock ownership, referral relationships).</li><li><strong>VI(B) Priority of Transactions:</strong> client and employer transactions come before personal trades. Family accounts that are regular fee-paying client accounts must be treated like any other client — not disadvantaged.</li><li><strong>VI(C) Referral Fees:</strong> disclose to employer and clients any compensation received for referrals <em>before</em> entering the agreement.</li><li><strong>VII(A) Conduct in CFA Program:</strong> no cheating, no sharing exam content (even the general topic areas tested), no using the exam for personal gain.</li><li><strong>VII(B) Reference to CFA Institute/Designation:</strong> the CFA designation is used as an adjective, never a noun ("She is a CFA charterholder", not "She is a CFA"). No claims of superior performance from holding the charter. Candidates may state they are "a Level II candidate in the CFA Program" only if registered for the next exam.</li></ul>',
vi:'<ul><li><strong>V(A) Cần mẫn &amp; Cơ sở hợp lý:</strong> mọi khuyến nghị cần cơ sở nghiên cứu hợp lý, đầy đủ. Dùng nghiên cứu bên thứ ba được, nếu đã đánh giá độ tin cậy. Nghiên cứu nhóm: không cần đồng ý với kết luận, nhưng nếu quy trình chặt chẽ thì vẫn có thể để tên trên báo cáo.</li><li><strong>V(B) Trao đổi với khách hàng:</strong> phân biệt <em>sự kiện</em> và <em>quan điểm</em>; công bố quy trình đầu tư cơ bản và các thay đổi trọng yếu; nêu rõ hạn chế và rủi ro đáng kể.</li><li><strong>V(C) Lưu trữ hồ sơ:</strong> lưu tài liệu chứng minh phân tích (CFA Institute khuyến nghị ≥7 năm nếu không có quy định khác). Hồ sơ thuộc về <em>công ty</em>, không thuộc về analyst.</li><li><strong>VI(A) Công bố xung đột lợi ích:</strong> công bố rõ ràng, dễ hiểu mọi vấn đề có thể ảnh hưởng tính độc lập (ghế HĐQT, sở hữu cổ phiếu, quan hệ giới thiệu…).</li><li><strong>VI(B) Ưu tiên giao dịch:</strong> giao dịch cho khách hàng và công ty trước giao dịch cá nhân. Tài khoản người thân nếu là tài khoản khách hàng trả phí bình thường thì phải đối xử như mọi khách hàng khác — không được thiệt thòi.</li><li><strong>VI(C) Phí giới thiệu:</strong> công bố cho công ty và khách hàng mọi khoản thù lao giới thiệu <em>trước khi</em> ký thỏa thuận.</li><li><strong>VII(A) Ứng xử trong kỳ thi CFA:</strong> không gian lận, không chia sẻ nội dung đề (kể cả chủ đề chung được hỏi), không lợi dụng kỳ thi cho lợi ích cá nhân.</li><li><strong>VII(B) Sử dụng danh xưng CFA:</strong> CFA dùng như tính từ, không phải danh từ ("She is a CFA charterholder", không nói "She is a CFA"). Không tuyên bố charter đem lại kết quả đầu tư vượt trội. Ứng viên chỉ được nói "Level II candidate in the CFA Program" nếu đã đăng ký kỳ thi kế tiếp.</li></ul>'},
{h:'GIPS — Global Investment Performance Standards (overview)', en:'<p>GIPS are voluntary, ethical standards for calculating and presenting investment performance so that results are comparable across firms globally. Key ideas:</p><ul><li>Compliance is claimed <strong>firm-wide</strong> — a firm cannot claim GIPS compliance for only some products, and there is no partial compliance.</li><li>All actual, fee-paying, discretionary portfolios must be assigned to at least one <strong>composite</strong> (a group of portfolios with a similar strategy) — this prevents cherry-picking the best accounts.</li><li>Verification by an independent third party is <em>recommended</em>, not required, and applies to the whole firm.</li></ul>',
vi:'<p>GIPS là bộ chuẩn mực đạo đức tự nguyện về cách tính và trình bày kết quả đầu tư, giúp so sánh kết quả giữa các công ty trên toàn cầu. Ý chính:</p><ul><li>Tuyên bố tuân thủ ở cấp <strong>toàn công ty</strong> — không được tuyên bố tuân thủ cho một vài sản phẩm, không có "tuân thủ một phần".</li><li>Mọi danh mục thực, trả phí, có toàn quyền quản lý (discretionary) phải được xếp vào ít nhất một <strong>composite</strong> (nhóm danh mục cùng chiến lược) — ngăn việc chỉ khoe các tài khoản đẹp nhất.</li><li>Kiểm chứng độc lập (verification) là <em>khuyến nghị</em>, không bắt buộc, và áp dụng cho toàn công ty.</li></ul>'}
]}
],

quiz:[
{q:'An analyst combines public filings, industry data, and nonmaterial details gathered from conversations with a company’s suppliers to conclude the company will beat earnings estimates. She buys the stock. According to the Standards, she has:', opts:['violated Standard II(A) because her conclusion is material and nonpublic.','not violated Standard II(A) because of the mosaic theory.','violated Standard II(A) unless she first publishes her research.'], ans:1,
en:'B is correct. Under the mosaic theory, conclusions reached by combining public information with nonmaterial nonpublic information do not violate Standard II(A) — even if the conclusion itself would be material. There is no requirement to publish before trading on a mosaic-based conclusion.',
vi:'Đáp án B. Theo mosaic theory, kết luận được rút ra từ thông tin công khai + thông tin chưa công khai nhưng không trọng yếu thì không vi phạm Standard II(A) — kể cả khi bản thân kết luận là trọng yếu. Không có yêu cầu phải công bố nghiên cứu trước khi giao dịch.'},
{q:'A portfolio manager resigns on Friday. The following Monday she contacts, from memory, several former clients whose contact details are publicly available, to solicit business for her new firm. She signed no non-compete agreement. She has most likely:', opts:['violated Standard IV(A) Loyalty by soliciting former clients.','not violated the Standards.','violated Standard III(E) Confidentiality.'], ans:1,
en:'B is correct. After employment ends (and absent a non-compete agreement), contacting former clients using public information or memory does not violate IV(A). A violation would occur if she solicited clients before resigning or took the employer’s client list/records.',
vi:'Đáp án B. Sau khi nghỉ việc (và không có thỏa thuận không cạnh tranh), việc liên hệ khách hàng cũ bằng thông tin công khai hoặc trí nhớ không vi phạm IV(A). Vi phạm chỉ xảy ra nếu cô ấy lôi kéo khách trước khi nghỉ hoặc mang theo danh sách/hồ sơ khách hàng của công ty.'},
{q:'Which statement about the CFA designation is acceptable under Standard VII(B)?', opts:['"As a CFA, I achieve better returns than non-charterholders."','"John Smith, CFA, passed all three exams on his first attempts."','"John Smith is a CFA."'], ans:1,
en:'B is correct. Stating a factual accomplishment (passing all three levels on first attempts) is allowed. A implies superior performance from the charter — prohibited. C uses "CFA" as a noun; the marks must be used as an adjective.',
vi:'Đáp án B. Nêu sự kiện có thật (đỗ cả 3 level ngay lần đầu) là được phép. Đáp án A ngụ ý charter đem lại kết quả vượt trội — bị cấm. Đáp án C dùng "CFA" như danh từ; danh xưng phải dùng như tính từ.'},
{q:'A firm claims GIPS compliance. Which of the following is required?', opts:['Independent third-party verification of the performance record.','Inclusion of all actual, fee-paying, discretionary portfolios in at least one composite.','Compliance for its flagship equity product only.'], ans:1,
en:'B is correct. GIPS requires every actual, fee-paying, discretionary portfolio to be included in at least one composite so firms cannot cherry-pick. Verification is recommended but not required (A), and compliance must be firm-wide, never product-by-product (C).',
vi:'Đáp án B. GIPS yêu cầu mọi danh mục thực, trả phí, có toàn quyền quản lý phải nằm trong ít nhất một composite để tránh cherry-pick. Verification chỉ là khuyến nghị (A sai), và tuân thủ phải ở cấp toàn công ty, không theo từng sản phẩm (C sai).'},
{q:'The laws of Country X (where an analyst works) are stricter than the Code and Standards. The laws of her home Country Y are less strict. Under Standard I(A) she must follow:', opts:['the Code and Standards.','the law of Country X.','the law of Country Y.'], ans:1,
en:'B is correct. Standard I(A) requires compliance with the strictest applicable rule. Since the local law of Country X (where she works) is stricter than the Code and Standards, she must follow Country X law.',
vi:'Đáp án B. Standard I(A) yêu cầu tuân theo quy định nghiêm ngặt nhất áp dụng cho mình. Luật nước X (nơi làm việc) nghiêm hơn Code &amp; Standards nên phải theo luật nước X.'}
]
},
/* ============ 02 QUANTITATIVE METHODS ============ */
{
id:'quant', num:'02', name:'Quantitative Methods', vi:'Phương pháp định lượng', w:[6,9],
blurb:'Time value of money, statistics, probability, distributions, hypothesis testing and simple regression — the toolkit used by every other topic.',
intro:{
en:'Quant is the mathematical toolkit for the whole curriculum: rates of return, statistical measures, probability, sampling, hypothesis testing, and an introduction to simple linear regression. Master your financial calculator (TI BA II Plus or HP 12C) here — TVM keys, NPV/IRR, and statistics functions save enormous time on exam day.',
vi:'Quant là bộ công cụ toán cho toàn bộ chương trình: các loại tỷ suất sinh lời, thống kê mô tả, xác suất, chọn mẫu, kiểm định giả thuyết, và nhập môn hồi quy tuyến tính đơn. Hãy thành thạo máy tính tài chính (TI BA II Plus hoặc HP 12C) ngay từ môn này — các phím TVM, NPV/IRR và thống kê tiết kiệm rất nhiều thời gian khi thi.'
},
modules:[
{ title:'Time Value of Money & Rates of Return', sections:[
{h:'Interest rates and the TVM framework', en:'<p>An interest rate can be viewed as a <strong>required rate of return</strong>, a <strong>discount rate</strong>, or an <strong>opportunity cost</strong>. It decomposes as:</p><p><em>Required rate = real risk-free rate + inflation premium + default risk premium + liquidity premium + maturity premium.</em></p><p>Core mechanics: money grows at compound interest. A single cash flow: FV = PV × (1 + r)<sup>n</sup>. More frequent compounding raises the effective rate: the <strong>effective annual rate (EAR)</strong> converts a stated annual rate compounded m times per year into a true annual growth rate. With continuous compounding, FV = PV × e<sup>rn</sup>.</p><p><strong>Annuities:</strong> an ordinary annuity pays at the <em>end</em> of each period; an annuity due pays at the <em>beginning</em> (worth one extra period of interest: multiply by (1+r)). A <strong>perpetuity</strong> pays forever: PV = PMT / r.</p>',
vi:'<p>Lãi suất có thể hiểu là <strong>tỷ suất sinh lời yêu cầu</strong>, <strong>tỷ suất chiết khấu</strong>, hoặc <strong>chi phí cơ hội</strong>. Phân rã: <em>lãi suất yêu cầu = lãi suất phi rủi ro thực + bù đắp lạm phát + bù đắp rủi ro vỡ nợ + bù đắp thanh khoản + bù đắp kỳ hạn</em>.</p><p>Cơ chế lõi: tiền tăng trưởng theo lãi kép. Dòng tiền đơn: FV = PV × (1 + r)<sup>n</sup>. Ghép lãi càng nhiều lần thì lãi suất hiệu dụng càng cao: <strong>EAR</strong> quy đổi lãi suất công bố ghép m lần/năm về tốc độ tăng trưởng thực trong 1 năm. Ghép lãi liên tục: FV = PV × e<sup>rn</sup>.</p><p><strong>Niên kim (annuity):</strong> ordinary annuity trả cuối kỳ; annuity due trả đầu kỳ (giá trị cao hơn 1 kỳ lãi: nhân với (1+r)). <strong>Perpetuity</strong> trả vĩnh viễn: PV = PMT / r.</p>'},
{h:'Rates of return used in the curriculum', en:'<ul><li><strong>Holding period return (HPR):</strong> total return over the period, including income: (P<sub>1</sub> − P<sub>0</sub> + D) / P<sub>0</sub>.</li><li><strong>Arithmetic mean return:</strong> simple average — best for forecasting <em>next period’s</em> expected return.</li><li><strong>Geometric mean return:</strong> compound growth rate — best for measuring <em>past multi-period performance</em>. Geometric ≤ arithmetic; the gap widens with volatility.</li><li><strong>Money-weighted return (MWR / IRR):</strong> accounts for the timing and size of cash flows — measures the <em>investor’s</em> experience.</li><li><strong>Time-weighted return (TWR):</strong> removes the effect of cash flows — the standard for judging the <em>manager</em>.</li><li>Also know: gross vs net return, pre-tax vs after-tax, real vs nominal (1 + nominal = (1 + real)(1 + inflation)), and leveraged return.</li></ul>',
vi:'<ul><li><strong>HPR:</strong> tổng lợi suất trong kỳ, gồm cả thu nhập: (P<sub>1</sub> − P<sub>0</sub> + D) / P<sub>0</sub>.</li><li><strong>Trung bình cộng:</strong> phù hợp để dự báo lợi suất kỳ vọng <em>kỳ tới</em>.</li><li><strong>Trung bình nhân:</strong> tốc độ tăng trưởng kép — phù hợp đo <em>hiệu quả nhiều kỳ trong quá khứ</em>. Geometric ≤ arithmetic; chênh lệch càng lớn khi biến động càng cao.</li><li><strong>MWR (IRR):</strong> tính đến thời điểm và quy mô dòng tiền — đo trải nghiệm của <em>nhà đầu tư</em>.</li><li><strong>TWR:</strong> loại bỏ ảnh hưởng của dòng tiền — chuẩn mực đánh giá <em>nhà quản lý quỹ</em>.</li><li>Cần biết thêm: gross vs net, trước thuế vs sau thuế, thực vs danh nghĩa ((1 + danh nghĩa) = (1 + thực)(1 + lạm phát)), lợi suất có đòn bẩy.</li></ul>'}
], formulas:[
['Future value','FV = PV × (1 + r)^n',''],
['EAR','EAR = (1 + r/m)^m − 1','m = compounding periods per year; continuous: EAR = e^r − 1'],
['Perpetuity','PV = PMT / r',''],
['Ordinary annuity PV','PV = PMT × [1 − (1+r)^−n] / r','Annuity due: multiply by (1 + r)'],
['HPR','HPR = (P1 − P0 + D) / P0',''],
['Geometric mean','Rg = [(1+R1)(1+R2)…(1+Rn)]^(1/n) − 1',''],
['Real vs nominal','(1 + nominal) = (1 + real) × (1 + inflation)','']
]},
{ title:'Statistical Measures & Probability', sections:[
{h:'Central tendency, dispersion, and shape', en:'<ul><li><strong>Mean / median / mode:</strong> the median is robust to outliers; the mode is the most frequent value. Trimmed and winsorized means reduce outlier impact.</li><li><strong>Dispersion:</strong> range, mean absolute deviation, <strong>variance</strong> (average squared deviation; sample variance divides by n − 1) and <strong>standard deviation</strong>. Downside risk: <strong>target semideviation</strong> considers only deviations below a target.</li><li><strong>Coefficient of variation:</strong> CV = s / mean — risk per unit of return; enables comparison across assets with different scales.</li><li><strong>Skewness:</strong> positive (right) skew → long right tail, mean &gt; median &gt; mode. Negative (left) skew → long left tail, mean &lt; median &lt; mode; investors dislike negative skew (frequent small gains, occasional large losses).</li><li><strong>Kurtosis:</strong> leptokurtic (kurtosis &gt; 3, excess &gt; 0) means fatter tails → more extreme outcomes than the normal distribution predicts.</li><li><strong>Correlation:</strong> measures linear association, from −1 to +1. Correlation ≠ causation; beware spurious correlation and outliers.</li></ul>',
vi:'<ul><li><strong>Mean / median / mode:</strong> median ít bị ảnh hưởng bởi giá trị ngoại lai; mode là giá trị xuất hiện nhiều nhất. Trimmed/winsorized mean giảm tác động outlier.</li><li><strong>Độ phân tán:</strong> khoảng biến thiên, độ lệch tuyệt đối trung bình, <strong>phương sai</strong> (phương sai mẫu chia n − 1) và <strong>độ lệch chuẩn</strong>. Rủi ro phía dưới: <strong>target semideviation</strong> chỉ tính các sai lệch dưới mức mục tiêu.</li><li><strong>Hệ số biến thiên:</strong> CV = s / mean — rủi ro trên mỗi đơn vị lợi suất, dùng so sánh tài sản khác quy mô.</li><li><strong>Độ xiên (skewness):</strong> xiên phải → đuôi phải dài, mean &gt; median &gt; mode. Xiên trái → đuôi trái dài, mean &lt; median &lt; mode; nhà đầu tư không thích xiên trái (lãi nhỏ thường xuyên, thua lỗ lớn thi thoảng).</li><li><strong>Độ nhọn (kurtosis):</strong> leptokurtic (kurtosis &gt; 3) nghĩa là đuôi dày → xác suất kết cục cực đoan cao hơn phân phối chuẩn.</li><li><strong>Tương quan:</strong> đo quan hệ tuyến tính, từ −1 đến +1. Tương quan ≠ nhân quả; cẩn thận tương quan giả và outlier.</li></ul>'},
{h:'Probability essentials', en:'<ul><li><strong>Types:</strong> empirical (from data), a priori (from logic), subjective (from judgment).</li><li><strong>Rules:</strong> Addition: P(A or B) = P(A) + P(B) − P(AB). Multiplication: P(AB) = P(A|B) × P(B). Independence: P(A|B) = P(A).</li><li><strong>Total probability:</strong> P(A) = Σ P(A|S<sub>i</sub>)P(S<sub>i</sub>) across mutually exclusive, exhaustive scenarios.</li><li><strong>Bayes’ formula</strong> updates a prior probability after new information: P(Event|Info) = P(Info|Event) × P(Event) / P(Info).</li><li><strong>Expected value and variance</strong> of a random variable use probability weights. Portfolio expected return is the weighted average of asset returns; portfolio variance depends on weights, variances, and <em>covariances</em> — this is the mathematical basis of diversification.</li></ul>',
vi:'<ul><li><strong>Ba loại xác suất:</strong> thực nghiệm (từ dữ liệu), tiên nghiệm (từ suy luận), chủ quan (từ phán đoán).</li><li><strong>Quy tắc:</strong> Cộng: P(A hoặc B) = P(A) + P(B) − P(AB). Nhân: P(AB) = P(A|B) × P(B). Độc lập: P(A|B) = P(A).</li><li><strong>Xác suất toàn phần:</strong> P(A) = Σ P(A|S<sub>i</sub>)P(S<sub>i</sub>) trên các kịch bản loại trừ lẫn nhau và bao trùm.</li><li><strong>Công thức Bayes</strong> cập nhật xác suất tiên nghiệm khi có thông tin mới.</li><li><strong>Kỳ vọng và phương sai</strong> của biến ngẫu nhiên dùng trọng số xác suất. Lợi suất kỳ vọng danh mục = bình quân gia quyền lợi suất tài sản; phương sai danh mục phụ thuộc trọng số, phương sai và <em>hiệp phương sai</em> — nền tảng toán học của đa dạng hóa.</li></ul>'}
], formulas:[
['Sample variance','s² = Σ(xi − x̄)² / (n − 1)',''],
['Coefficient of variation','CV = s / x̄','Lower is better (less risk per unit of return)'],
['Covariance (2 assets)','Cov = ρ × σA × σB',''],
['Portfolio variance (2 assets)','σp² = wA²σA² + wB²σB² + 2wAwBCov(A,B)',''],
['Bayes','P(E|I) = P(I|E)·P(E) / P(I)','']
]},
{ title:'Distributions, Sampling & Hypothesis Testing', sections:[
{h:'Key distributions', en:'<ul><li><strong>Normal:</strong> symmetric, fully described by mean and variance. Confidence intervals: ~68% of outcomes within ±1σ, <strong>90% within ±1.65σ, 95% within ±1.96σ, 99% within ±2.58σ</strong>. A <strong>standard normal (z)</strong> variable: z = (x − μ)/σ.</li><li><strong>Lognormal:</strong> bounded below by zero, right-skewed — used to model asset <em>prices</em> (while continuously compounded <em>returns</em> are modeled as normal).</li><li><strong>Binomial:</strong> number of successes in n independent trials (used in binomial option pricing trees).</li><li><strong>Student’s t:</strong> like the normal but with fatter tails; used for small samples with unknown population variance; converges to normal as degrees of freedom rise.</li><li><strong>Chi-square and F:</strong> used to test variances.</li></ul>',
vi:'<ul><li><strong>Phân phối chuẩn:</strong> đối xứng, xác định hoàn toàn bởi mean và variance. Khoảng tin cậy: ~68% trong ±1σ, <strong>90% trong ±1.65σ, 95% trong ±1.96σ, 99% trong ±2.58σ</strong>. Biến chuẩn hóa: z = (x − μ)/σ.</li><li><strong>Lognormal:</strong> không âm, xiên phải — dùng mô hình hóa <em>giá</em> tài sản (còn <em>lợi suất</em> ghép liên tục được coi là chuẩn).</li><li><strong>Nhị thức:</strong> số lần thành công trong n phép thử độc lập (dùng trong cây định giá quyền chọn nhị thức).</li><li><strong>Student’s t:</strong> giống chuẩn nhưng đuôi dày hơn; dùng cho mẫu nhỏ, phương sai tổng thể chưa biết; hội tụ về chuẩn khi bậc tự do tăng.</li><li><strong>Chi bình phương và F:</strong> dùng kiểm định phương sai.</li></ul>'},
{h:'Sampling and the Central Limit Theorem', en:'<p>The <strong>Central Limit Theorem</strong>: for a sample size n ≥ 30, the distribution of the sample mean is approximately normal with mean μ and variance σ²/n — <em>regardless</em> of the population’s distribution. The <strong>standard error</strong> of the mean is σ/√n. Sampling methods: simple random, stratified (guarantees subgroup representation, lower sampling error), cluster, convenience, judgmental. Key biases: <strong>survivorship bias</strong> (dead funds excluded → performance overstated), <strong>look-ahead bias</strong> (using data not available at the time), <strong>data snooping</strong>, and time-period bias.</p>',
vi:'<p><strong>Định lý giới hạn trung tâm</strong>: với n ≥ 30, phân phối của trung bình mẫu xấp xỉ chuẩn với mean μ và phương sai σ²/n — <em>bất kể</em> phân phối tổng thể. <strong>Sai số chuẩn</strong> của trung bình mẫu là σ/√n. Phương pháp chọn mẫu: ngẫu nhiên đơn giản, phân tầng (bảo đảm đại diện từng nhóm, sai số thấp hơn), theo cụm, thuận tiện, phán đoán. Các thiên lệch: <strong>survivorship bias</strong> (loại quỹ đã chết → thổi phồng hiệu quả), <strong>look-ahead bias</strong> (dùng dữ liệu chưa có tại thời điểm đó), <strong>data snooping</strong>, thiên lệch giai đoạn thời gian.</p>'},
{h:'Hypothesis testing — the 6 steps', en:'<ol><li>State the hypotheses: the <strong>null (H₀)</strong> always contains the equality ("=", "≤", "≥"); the <strong>alternative (Hₐ)</strong> is what you hope to show.</li><li>Choose the test statistic (z, t, chi-square, F).</li><li>Set the significance level α (probability of a <strong>Type I error</strong> — rejecting a true null). A <strong>Type II error</strong> is failing to reject a false null; <strong>power</strong> = 1 − P(Type II).</li><li>State the decision rule (critical values; two-tailed for "≠", one-tailed for "&gt;" or "&lt;").</li><li>Compute the statistic from the sample.</li><li>Decide: reject H₀ if the statistic exceeds the critical value, or if the <strong>p-value</strong> &lt; α. The p-value is the smallest α at which H₀ can be rejected.</li></ol><p><em>Statistically significant ≠ economically meaningful</em> — transaction costs, taxes, and risk can erase a "significant" anomaly.</p>',
vi:'<ol><li>Phát biểu giả thuyết: <strong>H₀ (null)</strong> luôn chứa dấu bằng ("=", "≤", "≥"); <strong>Hₐ</strong> là điều bạn muốn chứng minh.</li><li>Chọn thống kê kiểm định (z, t, chi bình phương, F).</li><li>Chọn mức ý nghĩa α (xác suất <strong>sai lầm loại I</strong> — bác bỏ H₀ đúng). <strong>Sai lầm loại II</strong>: không bác bỏ H₀ sai; <strong>power</strong> = 1 − P(loại II).</li><li>Xác định quy tắc quyết định (giá trị tới hạn; hai đuôi cho "≠", một đuôi cho "&gt;" hoặc "&lt;").</li><li>Tính thống kê từ mẫu.</li><li>Kết luận: bác bỏ H₀ nếu thống kê vượt giá trị tới hạn, hoặc <strong>p-value</strong> &lt; α. P-value là mức α nhỏ nhất mà tại đó H₀ bị bác bỏ.</li></ol><p><em>Có ý nghĩa thống kê ≠ có ý nghĩa kinh tế</em> — chi phí giao dịch, thuế, rủi ro có thể xóa sạch một "anomaly" có ý nghĩa thống kê.</p>'}
], formulas:[
['Standard error of mean','SE = σ / √n',''],
['z-statistic','z = (x̄ − μ0) / (σ/√n)','Use t with s instead of σ when population variance unknown'],
['Confidence interval','x̄ ± z(α/2) × SE','z = 1.65 (90%), 1.96 (95%), 2.58 (99%)'],
['Sharpe ratio','(Rp − Rf) / σp','Excess return per unit of total risk']
]}
],

quiz:[
{q:'An investment offers a stated annual rate of 8% compounded quarterly. The effective annual rate (EAR) is closest to:', opts:['8.00%','8.24%','8.30%'], ans:1,
en:'B is correct. EAR = (1 + 0.08/4)^4 − 1 = (1.02)^4 − 1 = 1.08243 − 1 = 8.24%. More frequent compounding always raises the effective rate above the stated rate.',
vi:'Đáp án B. EAR = (1 + 0.08/4)^4 − 1 = (1.02)^4 − 1 = 8.24%. Ghép lãi càng nhiều lần thì lãi suất hiệu dụng càng cao hơn lãi suất công bố.'},
{q:'A fund returns +50% in year 1 and −50% in year 2. Its geometric mean annual return is closest to:', opts:['0.0%','−13.4%','−25.0%'], ans:1,
en:'B is correct. Geometric mean = [(1.50)(0.50)]^(1/2) − 1 = (0.75)^0.5 − 1 = 0.866 − 1 = −13.4%. The arithmetic mean would be 0%, illustrating why geometric mean is the right measure of multi-period compound performance.',
vi:'Đáp án B. Trung bình nhân = [(1.50)(0.50)]^(1/2) − 1 = √0.75 − 1 = −13.4%. Trung bình cộng là 0%, cho thấy vì sao trung bình nhân mới đo đúng hiệu quả kép nhiều kỳ.'},
{q:'Which measure is most appropriate for evaluating the skill of a portfolio manager who does not control the timing of client deposits and withdrawals?', opts:['Money-weighted rate of return','Time-weighted rate of return','Holding period return'], ans:1,
en:'B is correct. The time-weighted return removes the distorting effect of external cash flows, which the manager does not control. The money-weighted (IRR) return reflects the investor’s experience because it is sensitive to the size and timing of cash flows.',
vi:'Đáp án B. TWR loại bỏ ảnh hưởng của dòng tiền ra/vào — thứ nhà quản lý không kiểm soát. MWR (IRR) phản ánh trải nghiệm của nhà đầu tư vì nhạy cảm với quy mô và thời điểm dòng tiền.'},
{q:'A distribution of returns has a mean less than its median. The distribution is most likely:', opts:['negatively skewed.','positively skewed.','leptokurtic.'], ans:0,
en:'A is correct. With negative (left) skew, extreme losses pull the mean below the median: mean < median < mode. Positive skew is the opposite. Kurtosis describes tail fatness, not asymmetry.',
vi:'Đáp án A. Với xiên trái (negative skew), các khoản lỗ cực đoan kéo mean xuống dưới median: mean < median < mode. Xiên phải thì ngược lại. Kurtosis mô tả độ dày đuôi, không phải độ bất đối xứng.'},
{q:'A researcher tests H₀: μ ≤ 0 versus Hₐ: μ > 0 at a 5% significance level and obtains a p-value of 0.03. The most appropriate conclusion is to:', opts:['fail to reject the null hypothesis.','reject the null hypothesis.','accept the alternative hypothesis as proven.'], ans:1,
en:'B is correct. Since the p-value (0.03) is less than α (0.05), the null is rejected. Note that hypothesis testing never "proves" the alternative — it only provides evidence against the null (C overstates the conclusion).',
vi:'Đáp án B. Vì p-value (0.03) nhỏ hơn α (0.05) nên bác bỏ H₀. Lưu ý kiểm định không bao giờ "chứng minh" Hₐ — chỉ cung cấp bằng chứng chống lại H₀ (đáp án C nói quá).'}
]
},

{
id:'econ', num:'03', name:'Economics', vi:'Kinh tế học', w:[6,9],
blurb:'Micro (demand, elasticity, market structures), macro (business cycles, money, fiscal & monetary policy) and currency exchange rates.',
intro:{
en:'Economics at Level 1 covers firm-level microeconomics (market structures, breakeven and shutdown analysis), the macro environment (business cycles, unemployment, inflation, monetary and fiscal policy), geopolitics and trade, and the mechanics of currency exchange rates. Focus on the logic and definitions — the calculations are light compared with FSA or Fixed Income.',
vi:'Kinh tế học ở Level 1 gồm vi mô cấp doanh nghiệp (cấu trúc thị trường, phân tích hòa vốn và điểm đóng cửa), môi trường vĩ mô (chu kỳ kinh tế, thất nghiệp, lạm phát, chính sách tiền tệ và tài khóa), địa chính trị – thương mại, và cơ chế tỷ giá hối đoái. Tập trung vào logic và định nghĩa — phần tính toán nhẹ hơn FSA hay Fixed Income.'
},
modules:[
{ title:'Firms & Market Structures', sections:[
{h:'Breakeven and shutdown points', en:'<p>In the <strong>short run</strong>, a firm should continue operating as long as price covers <strong>average variable cost (AVC)</strong> — fixed costs are sunk. It shuts down when P &lt; AVC. In the <strong>long run</strong>, price must cover <strong>average total cost (ATC)</strong>; otherwise the firm exits. Breakeven: P = ATC (zero economic profit — note that zero <em>economic</em> profit still includes a normal return on capital).</p>',
vi:'<p>Trong <strong>ngắn hạn</strong>, doanh nghiệp nên tiếp tục hoạt động khi giá còn bù được <strong>chi phí biến đổi bình quân (AVC)</strong> — chi phí cố định là chi phí chìm. Đóng cửa khi P &lt; AVC. Trong <strong>dài hạn</strong>, giá phải bù được <strong>tổng chi phí bình quân (ATC)</strong>; nếu không doanh nghiệp rời ngành. Hòa vốn: P = ATC (lợi nhuận kinh tế bằng 0 — lưu ý lợi nhuận kinh tế bằng 0 vẫn bao gồm mức sinh lời bình thường trên vốn).</p>'},
{h:'The four market structures', en:'<table class="simple"><tr><th>Structure</th><th>Sellers</th><th>Product</th><th>Barriers</th><th>Pricing power</th></tr><tr><td><strong>Perfect competition</strong></td><td>Many</td><td>Homogeneous</td><td>Very low</td><td>None (price taker); demand is perfectly elastic; P = MR = MC in equilibrium</td></tr><tr><td><strong>Monopolistic competition</strong></td><td>Many</td><td>Differentiated</td><td>Low</td><td>Some; heavy advertising; zero economic profit in long run</td></tr><tr><td><strong>Oligopoly</strong></td><td>Few</td><td>Similar or differentiated</td><td>High</td><td>Significant; interdependent pricing (kinked demand, Cournot, game theory/collusion)</td></tr><tr><td><strong>Monopoly</strong></td><td>One</td><td>Unique</td><td>Very high</td><td>Full; produces where MR = MC, prices above MC; may face regulation</td></tr></table><p>Concentration measures: the N-firm concentration ratio and the <strong>Herfindahl–Hirschman Index (HHI)</strong> = Σ(market share²). Neither directly captures barriers to entry or contestability.</p>',
vi:'<p>Bốn cấu trúc: <strong>cạnh tranh hoàn hảo</strong> (nhiều người bán, sản phẩm đồng nhất, không có sức mạnh định giá, P = MR = MC); <strong>cạnh tranh độc quyền</strong> (nhiều người bán, sản phẩm khác biệt, quảng cáo mạnh, lợi nhuận kinh tế dài hạn bằng 0); <strong>độc quyền nhóm</strong> (ít người bán, định giá phụ thuộc lẫn nhau — đường cầu gãy, Cournot, lý thuyết trò chơi/thông đồng); <strong>độc quyền</strong> (một người bán, rào cản rất cao, sản xuất tại MR = MC và định giá trên MC, có thể bị quản lý giá).</p><p>Đo mức độ tập trung: tỷ lệ tập trung N công ty và chỉ số <strong>HHI</strong> = Σ(thị phần²). Cả hai đều không phản ánh trực tiếp rào cản gia nhập.</p>'}
]},
{ title:'Business Cycles, Inflation & Policy', sections:[
{h:'The business cycle and indicators', en:'<p>Phases: <strong>trough → expansion → peak → contraction</strong>. Typical patterns: early expansion — sales up, inventories deliberately rebuilt, hiring resumes; late cycle — inflation accelerates, central banks tighten. <strong>Unemployment</strong> is a lagging indicator (firms fire last and hire back last); the stock market and inventory-to-sales ratios are leading indicators. Credit cycles (lending standards, spreads) often amplify business cycles.</p><p><strong>Unemployment types:</strong> frictional (between jobs), structural (skills mismatch), cyclical (demand shortfall). The participation rate can distort the headline rate — discouraged workers leaving the labor force lowers unemployment without any hiring.</p>',
vi:'<p>Các pha: <strong>đáy → mở rộng → đỉnh → thu hẹp</strong>. Đặc trưng: đầu chu kỳ — doanh số tăng, chủ động tích lại tồn kho, tuyển dụng trở lại; cuối chu kỳ — lạm phát tăng tốc, NHTW thắt chặt. <strong>Thất nghiệp</strong> là chỉ báo trễ (doanh nghiệp sa thải sau cùng và tuyển lại sau cùng); thị trường chứng khoán và tỷ lệ tồn kho/doanh số là chỉ báo dẫn dắt. Chu kỳ tín dụng thường khuếch đại chu kỳ kinh tế.</p><p><strong>Các loại thất nghiệp:</strong> ma sát (đang chuyển việc), cơ cấu (lệch kỹ năng), chu kỳ (thiếu cầu). Tỷ lệ tham gia lao động có thể bóp méo con số thất nghiệp — người lao động nản lòng rời lực lượng lao động làm tỷ lệ thất nghiệp giảm dù không ai được tuyển.</p>'},
{h:'Monetary and fiscal policy', en:'<ul><li><strong>Monetary policy</strong> (central bank): policy rate, reserve requirements, open market operations. <em>Contractionary</em> when the policy rate is above the neutral rate. Effective central banks are independent, credible, and transparent (inflation targeting, commonly ~2%). Limitations: <strong>liquidity traps</strong>, banks unwilling to lend, and the inability of policy to fix structural (supply-side) problems. Quantitative easing is used when rates approach zero.</li><li><strong>Fiscal policy</strong> (government): spending and taxation. Expansionary = larger deficit. Tools differ in impact: spending has the largest multiplier; tax cuts leak into saving. Problems: <strong>lags</strong> (recognition, action, impact), crowding out of private investment, and political constraints.</li><li>Policy mix: both expansionary → strong growth, likely higher rates later; tight money + loose fiscal → high real rates and a bigger public sector.</li></ul>',
vi:'<ul><li><strong>Chính sách tiền tệ</strong> (NHTW): lãi suất điều hành, dự trữ bắt buộc, nghiệp vụ thị trường mở. <em>Thắt chặt</em> khi lãi suất điều hành cao hơn lãi suất trung tính. NHTW hiệu quả cần độc lập, đáng tin cậy, minh bạch (mục tiêu lạm phát, thường ~2%). Hạn chế: <strong>bẫy thanh khoản</strong>, ngân hàng ngại cho vay, và không xử lý được vấn đề cơ cấu (phía cung). QE dùng khi lãi suất về gần 0.</li><li><strong>Chính sách tài khóa</strong> (chính phủ): chi tiêu và thuế. Mở rộng = thâm hụt lớn hơn. Chi tiêu có số nhân lớn nhất; giảm thuế bị "rò rỉ" vào tiết kiệm. Vấn đề: <strong>độ trễ</strong> (nhận biết, hành động, tác động), chèn lấn đầu tư tư nhân, ràng buộc chính trị.</li><li>Kết hợp: cả hai cùng mở rộng → tăng trưởng mạnh, lãi suất sau đó có thể tăng; tiền tệ chặt + tài khóa lỏng → lãi suất thực cao, khu vực công phình to.</li></ul>'}
]},
{ title:'Exchange Rates', sections:[
{h:'Quotes, real rates, and forward rates', en:'<p>An exchange rate is stated as <strong>price currency / base currency</strong>: USD/EUR = 1.10 means 1 euro costs 1.10 dollars. If USD/EUR rises, the euro (base) <em>appreciates</em>. The <strong>real exchange rate</strong> adjusts the nominal rate for relative price levels and measures relative purchasing power. Cross rates chain two quotes together.</p><p><strong>Forward rates</strong> are set by covered interest rate parity — arbitrage, not forecasts: F/S = (1 + i<sub>price</sub>) / (1 + i<sub>base</sub>). The currency with the <em>higher</em> interest rate trades at a <strong>forward discount</strong>. Points: forward premium/discount quoted as (F − S), often in pips.</p><p>Regimes range from free float and managed float to pegs, currency boards, and dollarization. Capital restrictions and fixed regimes trade policy autonomy for stability (the "impossible trinity": free capital flow, fixed exchange rate, independent monetary policy — pick two).</p>',
vi:'<p>Tỷ giá được yết theo <strong>đồng tiền định giá / đồng tiền cơ sở</strong>: USD/EUR = 1.10 nghĩa là 1 euro giá 1.10 USD. USD/EUR tăng → euro (đồng cơ sở) <em>lên giá</em>. <strong>Tỷ giá thực</strong> điều chỉnh tỷ giá danh nghĩa theo mặt bằng giá tương đối, đo sức mua tương đối. Tỷ giá chéo ghép hai cặp tỷ giá.</p><p><strong>Tỷ giá kỳ hạn</strong> được xác định bởi ngang giá lãi suất có phòng hộ (covered interest rate parity) — là kết quả của arbitrage, không phải dự báo: F/S = (1 + i<sub>định giá</sub>) / (1 + i<sub>cơ sở</sub>). Đồng tiền có lãi suất <em>cao hơn</em> giao dịch với <strong>forward discount</strong>.</p><p>Cơ chế tỷ giá: thả nổi tự do, thả nổi có quản lý, neo tỷ giá, currency board, đô la hóa. "Bộ ba bất khả thi": tự do dòng vốn, tỷ giá cố định, chính sách tiền tệ độc lập — chỉ chọn được hai.</p>'}
], formulas:[
['Covered interest parity','F = S × (1 + i_price) / (1 + i_base)','F, S quoted as price/base'],
['HHI','HHI = Σ (market share_i)²',''],
['Fisher relation','(1 + nominal) = (1 + real)(1 + expected inflation)','Approx: nominal ≈ real + inflation'],
['Own-price elasticity','%ΔQd / %ΔP','|E| > 1 elastic; revenue falls when price rises']
]}
],
vocab:[

['substitute / complement','Positive / negative cross-price elasticity goods.','hàng thay thế / bổ sung'],

['stagflation','High inflation combined with stagnant growth and high unemployment.','lạm phát đình trệ'],
['hyperinflation','Extremely rapid, out-of-control inflation.','siêu lạm phát'],

quiz:[
{q:'In the short run, a perfectly competitive firm should shut down production when the market price falls below its:', opts:['average total cost.','average variable cost.','marginal cost.'], ans:1,
en:'B is correct. In the short run, fixed costs are sunk, so the firm operates as long as price covers average variable cost. Below AVC, every unit produced deepens the loss. P < ATC only forces exit in the long run.',
vi:'Đáp án B. Trong ngắn hạn chi phí cố định là chi phí chìm, nên doanh nghiệp còn hoạt động khi giá bù được AVC. Dưới AVC, càng sản xuất càng lỗ thêm. P < ATC chỉ buộc rời ngành trong dài hạn.'},
{q:'Which unemployment indicator behaves as a lagging indicator of the business cycle?', opts:['The unemployment rate','Stock market indices','Average weekly hours worked in manufacturing'], ans:0,
en:'A is correct. Firms are slow to fire in downturns and slow to rehire in recoveries, so the unemployment rate lags the cycle. Equity indices and average weekly hours are leading indicators.',
vi:'Đáp án A. Doanh nghiệp chậm sa thải khi suy thoái và chậm tuyển lại khi phục hồi, nên tỷ lệ thất nghiệp là chỉ báo trễ. Chỉ số chứng khoán và số giờ làm việc bình quân tuần là chỉ báo dẫn dắt.'},
{q:'The spot rate is 1.2000 USD/EUR. One-year interest rates are 3% in the US and 1% in the eurozone. The one-year forward USD/EUR rate is closest to:', opts:['1.1767','1.2000','1.2238'], ans:2,
en:'C is correct. F = S × (1 + i_USD)/(1 + i_EUR) = 1.2000 × 1.03/1.01 = 1.2238. The euro (lower-rate, base currency) trades at a forward premium; the higher-rate currency (USD) trades at a forward discount.',
vi:'Đáp án C. F = 1.2000 × 1.03/1.01 = 1.2238. Đồng euro (lãi suất thấp, đồng cơ sở) có forward premium; đồng lãi suất cao (USD) có forward discount.'},
{q:'A central bank facing an economy in a liquidity trap will find that expansionary monetary policy is:', opts:['highly effective, because rates can fall further.','largely ineffective, because demand for money is extremely elastic.','effective only if combined with currency appreciation.'], ans:1,
en:'B is correct. In a liquidity trap, people hoard additional money at near-zero rates instead of spending or investing, so further monetary easing has little effect on demand — a key argument for fiscal stimulus in deep recessions.',
vi:'Đáp án B. Trong bẫy thanh khoản, người dân giữ tiền thay vì chi tiêu/đầu tư khi lãi suất gần 0, nên nới lỏng tiền tệ thêm gần như không kích thích được tổng cầu — lý do chính để dùng kích thích tài khóa trong suy thoái sâu.'}
]
},
/* ============ 04 FSA ============ */
{
id:'fsa', num:'04', name:'Financial Statement Analysis', vi:'Phân tích báo cáo tài chính', w:[11,14],
blurb:'The three statements, revenue and expense recognition, inventories, long-lived assets, cash flows, ratios and financial analysis techniques.',
intro:{
en:'FSA is one of the heaviest and most calculation-rich topics. You must know how the income statement, balance sheet, and cash flow statement link together; how accounting choices (FIFO vs LIFO, depreciation methods, capitalizing vs expensing) change reported numbers; and how to compute and interpret the classic ratio families. Expect many "which effect on which statement" questions.',
vi:'FSA là một trong những môn nặng nhất và nhiều tính toán nhất. Bạn phải nắm cách ba báo cáo (KQKD, CĐKT, LCTT) liên kết với nhau; cách các lựa chọn kế toán (FIFO vs LIFO, phương pháp khấu hao, vốn hóa vs ghi nhận chi phí) làm thay đổi số liệu; và cách tính, diễn giải các nhóm chỉ số kinh điển. Đề thi có rất nhiều câu dạng "ảnh hưởng gì lên báo cáo nào".'
},
modules:[
{ title:'The Three Statements & Recognition Principles', sections:[
{h:'How the statements connect', en:'<ul><li><strong>Income statement:</strong> Revenue − Expenses = Net income, over a <em>period</em>. Built on <strong>accrual accounting</strong>: revenue is recognized when the performance obligation is satisfied (goods/services transferred), not when cash arrives — the 5-step model of IFRS 15 / ASC 606.</li><li><strong>Balance sheet:</strong> Assets = Liabilities + Equity, at a <em>point in time</em>. Ending equity = beginning equity + net income − dividends + other comprehensive income + net share issuance.</li><li><strong>Cash flow statement:</strong> reconciles beginning to ending cash across operating (CFO), investing (CFI), and financing (CFF) activities. Net income ≠ cash: accruals (receivables, payables, inventory) drive the gap.</li><li>Under <strong>IFRS</strong>, interest paid may be CFO or CFF and dividends received CFO or CFI; under <strong>US GAAP</strong>, interest paid/received and dividends received are CFO, dividends paid are CFF.</li></ul>',
vi:'<ul><li><strong>Báo cáo KQKD:</strong> Doanh thu − Chi phí = LN ròng, trong một <em>kỳ</em>. Dựa trên <strong>kế toán dồn tích</strong>: doanh thu ghi nhận khi nghĩa vụ thực hiện được hoàn thành (hàng hóa/dịch vụ được chuyển giao), không phải khi thu tiền — mô hình 5 bước của IFRS 15 / ASC 606.</li><li><strong>Bảng CĐKT:</strong> Tài sản = Nợ + VCSH, tại một <em>thời điểm</em>. VCSH cuối kỳ = đầu kỳ + LN ròng − cổ tức + thu nhập toàn diện khác + phát hành CP ròng.</li><li><strong>Báo cáo LCTT:</strong> đối chiếu tiền đầu kỳ và cuối kỳ qua ba hoạt động: kinh doanh (CFO), đầu tư (CFI), tài chính (CFF). LN ròng ≠ tiền: các khoản dồn tích (phải thu, phải trả, tồn kho) tạo ra chênh lệch.</li><li>Theo <strong>IFRS</strong>, lãi vay trả có thể vào CFO hoặc CFF, cổ tức nhận vào CFO hoặc CFI; theo <strong>US GAAP</strong>, lãi vay trả/nhận và cổ tức nhận vào CFO, cổ tức trả vào CFF.</li></ul>'},
{h:'CFO: indirect method adjustments', en:'<p>The indirect method starts from net income and adjusts to cash from operations:</p><ul><li><strong>Add back</strong> non-cash expenses (depreciation, amortization) and losses on asset sales; <strong>subtract</strong> gains on asset sales (they belong in CFI).</li><li><strong>Working capital:</strong> an <em>increase</em> in a current operating <em>asset</em> (receivables, inventory) <em>uses</em> cash → subtract. An <em>increase</em> in a current operating <em>liability</em> (payables, accrued expenses) <em>provides</em> cash → add.</li></ul><p><strong>Free cash flow to the firm:</strong> FCFF = CFO + interest × (1 − tax rate) − fixed capital investment (under US GAAP). FCFE = CFO − FCInv + net borrowing.</p>',
vi:'<p>Phương pháp gián tiếp đi từ LN ròng và điều chỉnh về dòng tiền hoạt động:</p><ul><li><strong>Cộng lại</strong> chi phí không dùng tiền (khấu hao) và lỗ bán tài sản; <strong>trừ</strong> lãi bán tài sản (thuộc CFI).</li><li><strong>Vốn lưu động:</strong> <em>tăng</em> tài sản ngắn hạn hoạt động (phải thu, tồn kho) <em>tiêu tốn</em> tiền → trừ. <em>Tăng</em> nợ ngắn hạn hoạt động (phải trả) <em>tạo ra</em> tiền → cộng.</li></ul><p><strong>Dòng tiền tự do:</strong> FCFF = CFO + lãi vay × (1 − thuế suất) − đầu tư TSCĐ (theo US GAAP). FCFE = CFO − FCInv + vay ròng.</p>'}
]},
{ title:'Inventories & Long-Lived Assets', sections:[
{h:'FIFO vs LIFO vs weighted average', en:'<p>When input prices are <strong>rising</strong> (and inventory levels stable):</p><table class="simple"><tr><th></th><th>FIFO</th><th>LIFO (US GAAP only)</th></tr><tr><td>COGS</td><td>Lower (old cheap costs)</td><td>Higher (recent expensive costs)</td></tr><tr><td>Gross profit / net income</td><td>Higher</td><td>Lower</td></tr><tr><td>Ending inventory</td><td>Higher, closer to current cost</td><td>Lower, outdated</td></tr><tr><td>Taxes paid</td><td>Higher</td><td>Lower → higher CFO</td></tr></table><p>LIFO is <em>prohibited under IFRS</em>. The <strong>LIFO reserve</strong> (disclosed) converts LIFO figures to FIFO for comparison: FIFO inventory = LIFO inventory + LIFO reserve. Inventory is carried at the lower of cost and net realizable value (IFRS); write-down reversals are allowed under IFRS but prohibited under US GAAP.</p>',
vi:'<p>Khi giá đầu vào <strong>tăng</strong> (tồn kho ổn định): FIFO cho COGS thấp hơn (giá vốn cũ rẻ) → LN cao hơn, tồn kho cuối kỳ cao hơn và sát giá hiện hành, nhưng thuế nộp nhiều hơn. LIFO cho COGS cao hơn → LN thấp hơn, tồn kho lỗi thời, thuế thấp hơn → CFO cao hơn.</p><p>LIFO <em>bị cấm theo IFRS</em> (chỉ US GAAP cho phép). <strong>LIFO reserve</strong> (được thuyết minh) dùng để quy đổi LIFO về FIFO: tồn kho FIFO = tồn kho LIFO + LIFO reserve. Tồn kho ghi theo giá thấp hơn giữa giá gốc và giá trị thuần có thể thực hiện (IFRS); IFRS cho phép hoàn nhập giảm giá tồn kho, US GAAP thì không.</p>'},
{h:'Capitalizing vs expensing; depreciation; impairment', en:'<ul><li><strong>Capitalizing</strong> a cost (recording it as an asset, then depreciating) versus <strong>expensing</strong> it immediately: capitalizing raises current-period profit, assets, equity, and CFO (the outflow shows in CFI), and smooths earnings. Interest incurred during construction is capitalized.</li><li><strong>Depreciation:</strong> straight-line = (cost − salvage)/useful life; double-declining balance front-loads expense (2/life × beginning book value, salvage not in the formula but book value never falls below salvage). Accelerated methods lower early profits but not cash.</li><li><strong>Impairment:</strong> under IFRS, impaired when carrying amount &gt; recoverable amount (higher of fair value less costs to sell and value in use); reversals allowed. US GAAP uses a two-step test based on undiscounted cash flows; reversals prohibited. Revaluation upward of PP&amp;E is permitted only under IFRS.</li></ul>',
vi:'<ul><li><strong>Vốn hóa</strong> chi phí (ghi thành tài sản rồi khấu hao) so với <strong>ghi chi phí ngay</strong>: vốn hóa làm tăng lợi nhuận kỳ hiện tại, tài sản, VCSH và CFO (dòng tiền ra nằm ở CFI), và làm mượt lợi nhuận. Lãi vay trong quá trình xây dựng được vốn hóa.</li><li><strong>Khấu hao:</strong> đường thẳng = (nguyên giá − giá trị thu hồi)/thời gian sử dụng; số dư giảm dần kép dồn chi phí vào các năm đầu (2/thời gian × giá trị sổ sách đầu kỳ). Khấu hao nhanh làm giảm lợi nhuận đầu kỳ nhưng không ảnh hưởng dòng tiền.</li><li><strong>Suy giảm giá trị:</strong> IFRS — suy giảm khi giá trị ghi sổ &gt; giá trị có thể thu hồi (cao hơn giữa giá trị hợp lý trừ chi phí bán và giá trị sử dụng); được hoàn nhập. US GAAP — kiểm tra 2 bước theo dòng tiền chưa chiết khấu; cấm hoàn nhập. Đánh giá tăng PP&amp;E chỉ được phép theo IFRS.</li></ul>'}
]},
{ title:'Financial Ratios & Analysis', sections:[
{h:'The ratio families', en:'<table class="simple"><tr><th>Family</th><th>Key ratios</th></tr><tr><td><strong>Activity</strong></td><td>Inventory turnover = COGS/avg inventory; Receivables turnover = revenue/avg receivables; DOH = 365/inventory turnover; DSO = 365/receivables turnover; Cash conversion cycle = DOH + DSO − days payables</td></tr><tr><td><strong>Liquidity</strong></td><td>Current ratio = CA/CL; Quick ratio = (cash + ST investments + receivables)/CL; Cash ratio</td></tr><tr><td><strong>Solvency</strong></td><td>Debt-to-equity; Debt-to-assets; Financial leverage = avg assets/avg equity; Interest coverage = EBIT/interest</td></tr><tr><td><strong>Profitability</strong></td><td>Gross/operating/net margin; ROA = NI/avg assets; ROE = NI/avg equity</td></tr></table>',
vi:'<p>Bốn nhóm chỉ số: <strong>Hoạt động</strong> (vòng quay tồn kho = COGS/tồn kho bình quân; vòng quay phải thu; DOH; DSO; chu kỳ chuyển đổi tiền = DOH + DSO − số ngày phải trả); <strong>Thanh khoản</strong> (current ratio, quick ratio, cash ratio); <strong>Khả năng trả nợ dài hạn</strong> (nợ/VCSH, nợ/tài sản, đòn bẩy tài chính, khả năng trả lãi = EBIT/lãi vay); <strong>Sinh lời</strong> (biên gộp/hoạt động/ròng, ROA, ROE).</p>'},
{h:'DuPont decomposition of ROE', en:'<p>The 3-factor DuPont: <strong>ROE = Net profit margin × Asset turnover × Financial leverage</strong> = (NI/Revenue) × (Revenue/Assets) × (Assets/Equity). The 5-factor version splits the margin into tax burden (NI/EBT), interest burden (EBT/EBIT), and EBIT margin. DuPont reveals <em>why</em> ROE changed: profitability, efficiency, or simply more debt. Rising ROE driven only by leverage is lower quality than ROE driven by margins or turnover.</p>',
vi:'<p>DuPont 3 nhân tố: <strong>ROE = Biên LN ròng × Vòng quay tài sản × Đòn bẩy tài chính</strong> = (NI/Doanh thu) × (Doanh thu/Tài sản) × (Tài sản/VCSH). Bản 5 nhân tố tách biên lợi nhuận thành gánh nặng thuế (NI/EBT), gánh nặng lãi vay (EBT/EBIT) và biên EBIT. DuPont cho biết <em>vì sao</em> ROE thay đổi: nhờ sinh lời, hiệu quả sử dụng tài sản, hay chỉ vì vay nợ nhiều hơn. ROE tăng chỉ nhờ đòn bẩy có chất lượng thấp hơn ROE tăng nhờ biên lợi nhuận hoặc vòng quay.</p>'}
], formulas:[
['ROE (3-factor DuPont)','ROE = NPM × Asset turnover × Leverage','(NI/Rev)(Rev/Assets)(Assets/Equity)'],
['Cash conversion cycle','CCC = DOH + DSO − Days payables','Shorter = less cash tied up'],
['Interest coverage','EBIT / Interest expense',''],
['FCFF','FCFF = CFO + Int(1 − t) − FCInv','US GAAP classification'],
['Basic EPS','(NI − preferred dividends) / weighted avg shares','Diluted EPS adds effect of options/convertibles if dilutive'],
['Quick ratio','(Cash + ST investments + Receivables) / CL','Excludes inventory']
]}
],
vocab:[

['performance obligation','A promise to transfer a distinct good or service (IFRS 15).','nghĩa vụ thực hiện'],

['LIFO reserve','Difference between FIFO and LIFO inventory values, disclosed by LIFO firms.','dự trữ LIFO'],
